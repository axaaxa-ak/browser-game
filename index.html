<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Global Brawl: Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:Arial,sans-serif;user-select:none}
canvas{display:block}
#homePanel{position:absolute;inset:0;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;padding:10px;overflow-y:auto;z-index:20;color:#fff;gap:7px}
#homePanel.hidden{display:none!important}
h1{color:#ffcc00;font-size:19px;text-align:center}
.row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.mbtn{padding:6px 12px;background:#1a1a1a;border:2px solid #555;border-radius:6px;color:#aaa;cursor:pointer;font-size:11px}
.mbtn.on,.mbtn:hover{border-color:#ffcc00;color:#ffcc00}
.fbtn{padding:3px 8px;background:#111;border:1px solid #444;border-radius:4px;color:#777;cursor:pointer;font-size:10px}
.fbtn.on{border-color:#4af;color:#4af}
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;max-width:640px;width:100%}
.cbtn{padding:7px 3px;background:#151515;border:2px solid #333;border-radius:6px;cursor:pointer;text-align:center;color:#fff;transition:.12s}
.cbtn:hover{border-color:#ffcc00}.cbtn.sel{border-color:#0af}
.cbtn .sy{font-size:15px;font-weight:bold;display:block}
.cbtn .nm{font-size:9px;font-weight:bold;display:block}
.cbtn .tp{font-size:8px;color:#777;display:block}
.cbtn .sk{font-size:7px;color:#a6a;display:block}
.sbtn{padding:10px 32px;font-size:14px;cursor:pointer;background:#ffcc00;border:none;border-radius:8px;color:#000;font-weight:bold}
.sec{width:100%;max-width:640px;background:#0d0d0d;border:1px solid #333;border-radius:6px;padding:7px}
.sec h3{color:#ffcc00;font-size:11px;margin-bottom:5px}
.slabel{font-size:9px;color:#888;margin-bottom:3px;display:block}
.overlay{position:absolute;inset:0;display:none;justify-content:center;align-items:center;z-index:30;flex-direction:column;color:#fff;text-align:center}
.overlay.show{display:flex;pointer-events:all}
.ovbg{background:rgba(0,0,0,.8);padding:22px 28px;border-radius:12px}
.rbtn{margin-top:10px;padding:9px 24px;font-size:13px;cursor:pointer;background:#ffcc00;border:none;border-radius:8px;color:#000;font-weight:bold}
#scoreBar{position:absolute;top:0;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);padding:3px 14px;border-radius:0 0 7px 7px;color:#fff;font-size:13px;font-weight:bold;z-index:15;display:none}
</style>
</head>
<body>
<div id="homePanel">
  <h1>★ GLOBAL BRAWL: PRO ★</h1>
  <div class="row" id="modeRow"></div>
  <div class="sec"><h3>キャラタイプ絞り込み</h3><div class="row" id="filterRow"></div></div>
  <div class="cgrid" id="charGrid"></div>
  <div class="sec" id="teamSec" style="display:none">
    <h3>セレクトモード — チーム設定</h3>
    <span class="slabel">味方1</span><div class="cgrid" id="a1g" style="grid-template-columns:repeat(5,1fr)"></div>
    <span class="slabel" style="margin-top:5px">味方2</span><div class="cgrid" id="a2g" style="grid-template-columns:repeat(5,1fr)"></div>
    <span class="slabel" style="margin-top:5px">敵1</span><div class="cgrid" id="e1g" style="grid-template-columns:repeat(5,1fr)"></div>
    <span class="slabel" style="margin-top:5px">敵2</span><div class="cgrid" id="e2g" style="grid-template-columns:repeat(5,1fr)"></div>
    <span class="slabel" style="margin-top:5px">敵3</span><div class="cgrid" id="e3g" style="grid-template-columns:repeat(5,1fr)"></div>
  </div>
  <button class="sbtn" id="startBtn">スタート</button>
</div>
<div id="scoreBar"></div>
<div class="overlay" id="deadOv"><div class="ovbg"><h2 id="deadTtl" style="font-size:34px;color:#f44"></h2><p id="deadMsg" style="font-size:15px;margin-top:7px"></p><button class="rbtn" id="deadRBtn" style="display:none" onclick="location.reload()">タイトルへ</button></div></div>
<div class="overlay" id="winOv"><div class="ovbg"><h2 id="winTtl" style="font-size:34px;color:#ffcc00"></h2><p id="winMsg" style="font-size:15px;margin-top:7px"></p><button class="rbtn" onclick="location.reload()">タイトルへ</button></div></div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// CONSTANTS & CONFIG
// ─────────────────────────────────────────────
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const W={w:5000,h:5000};
const TEAM={P:0,A:1,E:2,N:3};

// Speed tiers (px/frame)
const SPD={u2:7.5,u:6.0,f:4.8,mf:4.0,n:3.2,s:2.4,vs:1.8};

// Character definitions from spreadsheet
const CHARS={
  soviet:{name:'ソビエト連邦',type:'コントローラー',sym:'★',col:'#aa0000',sz:62,spd:SPD.s,hp:15000,am:1,rt:90,spMax:4500,spName:'赤い津波',
    atkRanges:[320,220,900], // per phase
    desc:'HPが多く移動が遅い。3段攻撃と召喚'},
  usa:{name:'アメリカ',type:'アタッカー',sym:'A',col:'#3a6090',sz:48,spd:SPD.n,hp:11000,am:3,rt:55,spMax:4000,spName:'空爆',atkRange:1100,
    desc:'5連射・長射程。特殊は地点空爆'},
  uk:{name:'イギリス',type:'スナイパー',sym:'K',col:'#012169',sz:26,spd:SPD.f,hp:6700,am:3,rt:110,spMax:3000,spName:'英海峡',atkRange:1300,
    desc:'超高火力1発。小さく速い'},
  france:{name:'フランス',type:'タンク',sym:'F',col:'#002395',sz:38,spd:SPD.n,hp:12500,am:3,rt:50,spMax:3500,spName:'革命',atkRange:200,
    desc:'塹壕を生成しダメージゾーン化'},
  germany:{name:'ドイツ',type:'アタッカー',sym:'G',col:'#555',sz:38,spd:SPD.mf,hp:8000,am:3,rt:90,spMax:3500,spName:'電撃作戦',atkRange:650,
    desc:'15連射バースト。戦車搭乗'},
  japan:{name:'日本',type:'アサシン',sym:'J',col:'#ddd',sz:36,spd:SPD.u,hp:8600,am:2,rt:45,spMax:3000,spName:'大和魂',
    atkRanges:[550,500],desc:'超高速突進アサシン'},
  italy:{name:'イタリア',type:'アタッカー',sym:'I',col:'#009246',sz:38,spd:SPD.f,hp:7600,am:1,rt:340,spMax:3500,spName:'美食家',atkRange:90,
    desc:'ピザカッター近接。弾薬1'},
  china:{name:'中国',type:'アタッカー',sym:'C',col:'#DE2910',sz:46,spd:SPD.n,hp:13500,am:3,rt:100,spMax:3500,spName:'ゲリラ戦',atkRange:750,
    desc:'星5発チャージ→一斉射出'},
  canada:{name:'カナダ',type:'サポーター',sym:'M',col:'#c00',sz:46,spd:SPD.vs,hp:14000,am:3,rt:100,spMax:4000,spName:'シロップの海',atkRange:500,
    isThrown:true,desc:'カエデ投げ。超高HP'},
  finland:{name:'フィンランド',type:'スナイパー',sym:'S',col:'#003580',sz:36,spd:SPD.f,hp:7200,am:3,rt:90,spMax:3000,spName:'白い死神',atkRange:2200,
    desc:'超長射程スナイパー。吹雪フィールド'},
  belgium:{name:'ベルギー',type:'サポーター',sym:'B',col:'#FDDA24',sz:26,spd:SPD.mf,hp:8000,am:3,rt:90,spMax:3500,spName:'手刈り',atkRange:700,
    desc:'チョコ/ワッフル交互射撃'},
  netherlands:{name:'オランダ',type:'アタッカー',sym:'N',col:'#FF6200',sz:26,spd:SPD.f,hp:8350,am:1,rt:55,spMax:3000,spName:'洪水線',atkRange:180,
    desc:'干拓→洪水の2段地形変化'},
  luxembourg:{name:'ルクセンブルク',type:'アサシン',sym:'L',col:'#EF3340',sz:16,spd:SPD.u2,hp:5000,am:3,rt:55,spMax:2500,spName:'空挺降下',atkRange:250,
    isThrown:true,desc:'突進スタン。垂直ジャンプ可能'}
};
const CKEYS=Object.keys(CHARS);
const TYPES=['全て','アタッカー','アサシン','スナイパー','タンク','サポーター','コントローラー'];

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
let gMode='normal';
let gState='home';
let player=null,allies=[],enemies=[];
let allUnits=[];
let projectiles=[],areas=[],items=[],walls=[];
let tiles=[]; // tile overlay system
let ball=null;
let cam={x:2500,y:2500};
let FC=0;
let sovietBots=[];
let koRound=1,koWins=[0,0];
let soccerScore=[0,0];
let brAlive=0;
let selectedMode='normal';
let selectedChar='usa';
let selectTeam={a1:'random',a2:'random',e1:'random',e2:'random',e3:'random'};
let spTarget={x:2500,y:2500};

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
window.addEventListener('resize',resize);resize();
function dst(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function dst2(ax,ay,bx,by){return(ax-bx)**2+(ay-by)**2;}
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function rnd(a){return a[0|Math.random()*a.length];}
function ptInR(x,y,rx,ry,rw,rh){return x>=rx&&x<=rx+rw&&y>=ry&&y<=ry+rh;}
function rcOv(wx,wy,ww,wh,cx,cy,r){const nx=clamp(cx,wx,wx+ww),ny=clamp(cy,wy,wy+wh);return(cx-nx)**2+(cy-ny)**2<r*r;}

function foes(actor){
  if(!actor)return[];
  if(gMode==='br')return allUnits.filter(a=>a!==actor&&!a.dead);
  if(actor.team===TEAM.E)return[player,...allies].filter(a=>a&&!a.dead);
  return enemies.filter(a=>!a.dead);
}
function frds(actor){
  if(!actor)return[];
  if(gMode==='br')return[];
  if(actor.team===TEAM.E)return enemies.filter(a=>!a.dead&&a!==actor);
  return[player,...allies].filter(a=>a&&!a.dead&&a!==actor);
}

const REC=[.20,.15,.15,.10,.10,.10,.10,.05,.05];

// ─────────────────────────────────────────────
// TILE SYSTEM (for Netherlands & France)
// ─────────────────────────────────────────────
const TILE_SZ=80; // px per tile
// tiles array: {gx,gy,type,timer,ownerId}
// types: 'normal','reclaim','flood','trench'
function tileAt(wx,wy){return tiles.find(t=>t.gx===wx&&t.gy===wy)||null;}
function worldToTile(x,y){return{gx:Math.floor(x/TILE_SZ)*TILE_SZ,gy:Math.floor(y/TILE_SZ)*TILE_SZ};}
function setTile(x,y,type,ownerId,dur){
  const{gx,gy}=worldToTile(x,y);
  const ex=tiles.findIndex(t=>t.gx===gx&&t.gy===gy);
  if(ex>=0)tiles[ex]={gx,gy,type,ownerId,timer:dur};
  else tiles.push({gx,gy,type,ownerId,timer:dur});
}
function updateTiles(){
  tiles.forEach(t=>{t.timer--;});
  tiles=tiles.filter(t=>t.timer>0);
}
function drawTiles(){
  tiles.forEach(t=>{
    if(t.type==='reclaim'){ctx.fillStyle='rgba(255,160,40,.18)';ctx.strokeStyle='rgba(255,160,40,.4)';}
    else if(t.type==='flood'){ctx.fillStyle='rgba(30,100,210,.28)';ctx.strokeStyle='rgba(80,160,255,.5)';}
    else if(t.type==='trench'){ctx.fillStyle='rgba(139,100,30,.3)';ctx.strokeStyle='rgba(180,140,60,.5)';}
    else return;
    ctx.lineWidth=1;
    ctx.fillRect(t.gx,t.gy,TILE_SZ,TILE_SZ);
    ctx.strokeRect(t.gx,t.gy,TILE_SZ,TILE_SZ);
  });
}
function tilesUnderActor(actor){
  const r=actor.sz;
  const x0=Math.floor((actor.x-r)/TILE_SZ)*TILE_SZ;
  const x1=Math.floor((actor.x+r)/TILE_SZ)*TILE_SZ;
  const y0=Math.floor((actor.y-r)/TILE_SZ)*TILE_SZ;
  const y1=Math.floor((actor.y+r)/TILE_SZ)*TILE_SZ;
  return tiles.filter(t=>(t.gx===x0||t.gx===x1)&&(t.gy===y0||t.gy===y1));
}

// ─────────────────────────────────────────────
// MAP
// ─────────────────────────────────────────────
function mkW(x,y,w,h,brk,hp=Infinity){return{x,y,w,h,brk,hp,maxHp:isFinite(hp)?hp:Infinity,active:true};}
let soccerBounds=null;

function buildMap(type){
  walls=[];tiles=[];
  if(type==='soccer'){buildSoccerMap();return;}
  if(type==='br'){buildBRMap();return;}
  const BW=30;
  // Boundary
  [mkW(0,0,W.w,BW,false),mkW(0,W.h-BW,W.w,BW,false),mkW(0,0,BW,W.h,false),mkW(W.w-BW,0,BW,W.h,false)].forEach(w=>walls.push(w));
  // Solid
  [[1700,1700,80,700],[3220,1700,80,700],[1700,2700,80,700],[3220,2700,80,700],
   [2100,1300,800,80],[2100,3620,800,80],[2350,2350,300,300],
   [1200,1200,60,300],[3740,3500,60,300],[1200,3500,300,60],[3500,1200,300,60]]
    .forEach(([x,y,w,h])=>walls.push(mkW(x,y,w,h,false)));
  // Breakable (bullet-pass-through, characters blocked)
  [[1300,2100,60,500],[3640,2100,60,500],[2000,1600,500,60],[2000,3340,500,60],
   [2550,1950,60,350],[2390,2700,350,60],[1500,1500,60,200],[3440,3300,60,200],
   [2900,1400,200,60],[1400,3540,200,60],[2000,2480,200,60],[2800,2480,200,60]]
    .forEach(([x,y,w,h])=>walls.push(mkW(x,y,w,h,true,2000)));
}

function buildSoccerMap(){
  soccerBounds=null;
  const fw=4200,fh=2600,ox=(W.w-fw)/2,oy=(W.h-fh)/2,gh=500;
  const gy0=oy+fh/2-gh/2,gy1=oy+fh/2+gh/2;
  soccerBounds={ox,oy,fw,fh,gy0,gy1};
  const BW=30;
  // Top/bottom
  walls.push(mkW(ox,oy,fw,BW,false));
  walls.push(mkW(ox,oy+fh-BW,fw,BW,false));
  // Left wall (with goal gap)
  walls.push(mkW(ox,oy,BW,gy0-oy,false));
  walls.push(mkW(ox,gy1,BW,oy+fh-gy1,false));
  // Right wall (with goal gap)
  walls.push(mkW(ox+fw-BW,oy,BW,gy0-oy,false));
  walls.push(mkW(ox+fw-BW,gy1,BW,oy+fh-gy1,false));
}

function buildBRMap(){
  const BW=30;
  [mkW(0,0,W.w,BW,false),mkW(0,W.h-BW,W.w,BW,false),mkW(0,0,BW,W.h,false),mkW(W.w-BW,0,BW,W.h,false)].forEach(w=>walls.push(w));
  [[900,900,80,500],[2000,700,500,80],[3100,900,80,500],[4000,1100,400,80],
   [700,2500,80,600],[1600,2000,400,80],[2500,2500,80,400],[3500,2000,500,80],
   [900,3400,80,500],[2000,3100,500,80],[3100,3400,80,500],[4000,2800,400,80],
   [1800,1800,60,200],[2700,1500,200,60],[3400,3000,60,200],[1500,3000,200,60],
   [2200,2200,150,150],[2600,2700,150,60],[1700,2400,60,150],[3200,2400,150,60]]
    .forEach(([x,y,w,h])=>walls.push(mkW(x,y,w,h,false)));
}

function wallColSolid(nx,ny,sz){
  for(let w of walls){
    if(!w.active||w.hp<=0)continue;
    if(nx+sz>w.x&&nx-sz<w.x+w.w&&ny+sz>w.y&&ny-sz<w.y+w.h)return w;
  }
  return null;
}
function wallColBullet(x,y){
  // Only solid (non-breakable) walls stop bullets
  for(let w of walls){
    if(!w.active||w.hp<=0||w.brk)continue;
    if(ptInR(x,y,w.x,w.y,w.w,w.h))return w;
  }
  return null;
}

// ─────────────────────────────────────────────
// PROJECTILES
// ─────────────────────────────────────────────
class Bullet{
  constructor(x,y,ang,spd,range,dmg,owner,r=7,col='#ffe040'){
    this.x=x;this.y=y;this.sx=x;this.sy=y;this.ang=ang;this.spd=spd;
    this.range=range;this.dmg=dmg;this.owner=owner;this.r=r;this.col=col;
    this.active=true;this.trail=[];
  }
  update(){
    this.trail.push({x:this.x,y:this.y});if(this.trail.length>5)this.trail.shift();
    this.x+=Math.cos(this.ang)*this.spd;this.y+=Math.sin(this.ang)*this.spd;
    if(dst2(this.x,this.y,this.sx,this.sy)>this.range**2){this.active=false;return;}
    if(wallColBullet(this.x,this.y)){this.active=false;return;}
    for(let f of foes(this.owner)){
      if(!f.dead&&dst2(this.x,this.y,f.x,f.y)<(f.sz+this.r)**2){f.takeDmg(this.dmg,this.owner);this.active=false;return;}
    }
  }
  draw(){
    if(this.trail.length>1){
      ctx.save();ctx.globalAlpha=.4;ctx.strokeStyle=this.col;ctx.lineWidth=this.r*.7;ctx.lineCap='round';
      ctx.beginPath();this.trail.forEach((t,i)=>i===0?ctx.moveTo(t.x,t.y):ctx.lineTo(t.x,t.y));ctx.stroke();ctx.restore();
    }
    ctx.fillStyle=this.col;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();
    // glow
    ctx.save();ctx.globalAlpha=.3;ctx.fillStyle=this.col;ctx.beginPath();ctx.arc(this.x,this.y,this.r*2,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}
class FadeBullet extends Bullet{
  update(){
    this.trail.push({x:this.x,y:this.y});if(this.trail.length>4)this.trail.shift();
    this.x+=Math.cos(this.ang)*this.spd;this.y+=Math.sin(this.ang)*this.spd;
    if(dst2(this.x,this.y,this.sx,this.sy)>this.range**2){this.active=false;return;}
    if(wallColBullet(this.x,this.y)){this.active=false;return;}
    const ratio=Math.sqrt(dst2(this.x,this.y,this.sx,this.sy))/this.range;
    for(let f of foes(this.owner)){
      if(!f.dead&&dst2(this.x,this.y,f.x,f.y)<(f.sz+this.r)**2){
        f.takeDmg(this.dmg*(1-ratio*.5),this.owner);this.active=false;return;
      }
    }
  }
}
class ExpBullet extends Bullet{
  constructor(x,y,ang,spd,range,dmg,owner,er,col='#ff8800'){super(x,y,ang,spd,range,dmg,owner,10,col);this.er=er;}
  update(){
    this.x+=Math.cos(this.ang)*this.spd;this.y+=Math.sin(this.ang)*this.spd;
    let hit=dst2(this.x,this.y,this.sx,this.sy)>this.range**2;
    if(wallColBullet(this.x,this.y))hit=true;
    for(let f of foes(this.owner)){if(!f.dead&&dst2(this.x,this.y,f.x,f.y)<(f.sz+12)**2){hit=true;break;}}
    if(hit){
      areas.push(new Area(this.x,this.y,'expl',this.owner,this.er,this.dmg*.8,18));
      walls.forEach(w=>{if(w.brk&&w.active&&w.hp>0&&rcOv(w.x,w.y,w.w,w.h,this.x,this.y,this.er))w.hp-=1200;});
      this.active=false;
    }
  }
  draw(){ctx.fillStyle=this.col;ctx.beginPath();ctx.arc(this.x,this.y,10,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ffcc00';ctx.lineWidth=2;ctx.stroke();}
}
class Boomerang{
  constructor(x,y,ang,spd,range,dmg,owner){
    this.x=x;this.y=y;this.sx=x;this.sy=y;this.ang=ang;this.spd=spd;
    this.range=range;this.dmg=dmg;this.owner=owner;this.active=true;this.ret=false;this.hs=new Set();this.rot=0;
  }
  update(){
    this.rot+=.22;
    if(!this.ret){this.x+=Math.cos(this.ang)*this.spd;this.y+=Math.sin(this.ang)*this.spd;if(dst2(this.x,this.y,this.sx,this.sy)>this.range**2)this.ret=true;}
    else{
      const a=Math.atan2(this.owner.y-this.y,this.owner.x-this.x);
      this.x+=Math.cos(a)*this.spd;this.y+=Math.sin(a)*this.spd;
      if(dst2(this.x,this.y,this.owner.x,this.owner.y)<45**2){this.owner.atkPhase=0;this.active=false;return;}
    }
    for(let f of foes(this.owner)){
      if(!f.dead&&!this.hs.has(f)&&dst2(this.x,this.y,f.x,f.y)<(f.sz+14)**2){f.takeDmg(this.dmg,this.owner);this.hs.add(f);}
    }
  }
  draw(){
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.fillStyle='#ccc';ctx.strokeStyle='#888';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(0,0,16,6,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();
  }
}

// Thrown projectile - parabolic arc, reaches target after travelFrames
class Thrown{
  constructor(sx,sy,tx,ty,owner,areaType,radius,dmg,baseTF=40){
    this.sx=sx;this.sy=sy;this.tx=tx;this.ty=ty;
    this.x=sx;this.y=sy;this.owner=owner;
    this.areaType=areaType;this.radius=radius;this.dmg=dmg;
    // travel time proportional to distance
    const d=Math.hypot(tx-sx,ty-sy);
    this.tf=Math.round(baseTF*(d/400)); // ~40 frames per 400px
    this.tf=clamp(this.tf,15,90);
    this.f=0;this.active=true;
  }
  update(){
    this.f++;
    const t=this.f/this.tf;
    this.x=this.sx+(this.tx-this.sx)*t;
    this.y=this.sy+(this.ty-this.sy)*t;
    if(this.f>=this.tf){
      this.active=false;
      areas.push(new Area(this.tx,this.ty,this.areaType,this.owner,this.radius,this.dmg,
        this.areaType==='maple'?180:this.areaType==='lux_land'?20:300));
    }
  }
  draw(){
    const t=this.f/this.tf;
    const arcH=Math.sin(t*Math.PI)*50;
    const dx=this.tx-this.sx,dy=this.ty-this.sy;
    // perpendicular lift
    const drawX=this.x,drawY=this.y-arcH;
    ctx.save();ctx.translate(drawX,drawY);ctx.rotate(this.f*.18);
    if(this.areaType==='maple'){ctx.fillStyle='#d44';ctx.font='bold 20px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('M',0,0);}
    else if(this.areaType==='lux_land'){ctx.fillStyle='#EF3340';ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}
    ctx.restore();
    // shadow on ground
    ctx.save();ctx.globalAlpha=.25;ctx.fillStyle='#000';ctx.beginPath();
    const sz=8*(1-t*.5);ctx.ellipse(this.x,this.y,sz*2,sz,0,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

class Area{
  constructor(x,y,type,owner,radius,dmg,dur,ang,ref){
    this.x=x;this.y=y;this.type=type;this.owner=owner;
    this.radius=radius;this.dmg=dmg;this.dur=dur;
    this.ang=ang||0;this.ref=ref;
    this.f=0;this.active=true;this.hs=new Set();
    this.follow=(type==='pizza'||type==='channel'||type==='bliz');
    this.extra={};
  }
  update(){
    this.f++;if(this.f>this.dur){this.active=false;return;}
    if(this.follow&&this.owner){if(this.owner.dead&&this.type!=='bliz'){this.active=false;return;}this.x=this.owner.x;this.y=this.owner.y;}
    const T=this.type,fo=foes(this.owner),fr=frds(this.owner);
    if(T==='shock'||T==='expl'){
      fo.forEach(f=>{if(!f.dead&&!this.hs.has(f)&&dst(this,f)<this.radius+f.sz){f.takeDmg(this.dmg,this.owner);this.hs.add(f);}});
      if(T==='expl')walls.forEach(w=>{if(w.brk&&w.active&&w.hp>0&&rcOv(w.x,w.y,w.w,w.h,this.x,this.y,this.radius))w.hp-=800;});
    }else if(T==='slash'){
      fo.forEach(f=>{if(!f.dead&&!this.hs.has(f)){const a=Math.atan2(f.y-this.y,f.x-this.x);const da=Math.abs(((a-this.ang+Math.PI*3)%(Math.PI*2))-Math.PI);if(dst(this,f)<this.radius+f.sz&&da<Math.PI/1.7){f.takeDmg(this.dmg,this.owner);this.hs.add(f);}}});
    }else if(T==='pizza'){
      if(this.f%15===0)fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz)f.takeDmg(this.dmg,this.owner);});
    }else if(T==='channel'){
      projectiles.forEach(p=>{if(p.owner&&p.owner.team!==this.owner.team&&dst({x:p.x,y:p.y},this)<this.radius)p.active=false;});
      if(this.f%18===0)fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz){f.takeDmg(this.dmg,this.owner);const a=Math.atan2(f.y-this.y,f.x-this.x);f.x+=Math.cos(a)*12;f.y+=Math.sin(a)*12;}});
    }else if(T==='maple'){
      if(this.f%27===0){
        fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz){f.takeDmg(this.dmg,this.owner);f.slowF=.5;f.slowT=60;}});
        fr.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz)f.hp=Math.min(f.maxHp,f.hp+750);});
      }
    }else if(T==='syrup'){
      if(this.f%20===0){
        fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz){f.slowF=.45;f.slowT=90;}});
        fr.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz){const k='h'+f.id;if(!this.extra[k]){f.hp=Math.min(f.maxHp,f.hp+6500);this.extra[k]=true;}else f.hp=Math.min(f.maxHp,f.hp+250);}});
      }
    }else if(T==='bliz'){
      if(this.f%60===0)fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius)f.takeDmg(this.dmg,this.owner);});
      fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius){f.slowF=.55;f.slowT=90;}});
    }else if(T==='wflag'){
      // Damage debuff applied in takeDmg
      if(this.f>=this.dur-5){fr.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius){f.hp=f.maxHp;f.x=f.team===TEAM.E?4350:650;f.y=2500;}});}
    }else if(T==='lux_land'){
      if(!this.hs.size)fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz){f.takeDmg(this.dmg,this.owner);f.state={t:'stun',f:90};this.hs.add(f);}});
    }else if(T==='flood_zone'){
      fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius){f.slowF=.5;f.slowT=40;}});
    }
  }
  draw(){
    const pr=1-this.f/this.dur;const T=this.type;ctx.save();
    if(T==='shock'){ctx.strokeStyle=`rgba(255,200,0,${pr*.9})`;ctx.lineWidth=8;ctx.beginPath();ctx.arc(this.x,this.y,this.radius*(1.1-pr*.1),0,Math.PI*2);ctx.stroke();}
    else if(T==='expl'){const r=this.radius*(1.3-pr*.3);const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r);g.addColorStop(0,`rgba(255,220,60,${pr})`);g.addColorStop(1,'rgba(255,60,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);ctx.fill();}
    else if(T==='slash'){ctx.translate(this.x,this.y);ctx.rotate(this.ang);ctx.fillStyle=`rgba(255,255,160,${pr*.65})`;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,this.radius,-Math.PI/1.7,Math.PI/1.7);ctx.closePath();ctx.fill();ctx.strokeStyle=`rgba(255,255,200,${pr*.5})`;ctx.lineWidth=2;ctx.stroke();}
    else if(T==='pizza'){ctx.translate(this.x,this.y);ctx.rotate(this.f*.32);ctx.strokeStyle='rgba(255,80,60,.9)';ctx.lineWidth=11;ctx.beginPath();ctx.arc(0,0,this.radius,0,Math.PI*2);ctx.stroke();}
    else if(T==='channel'){ctx.strokeStyle=`rgba(100,180,255,${pr*.7})`;ctx.lineWidth=18;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.stroke();}
    else if(T==='wflag'){ctx.strokeStyle=`rgba(255,255,255,${pr*.35})`;ctx.lineWidth=3;ctx.setLineDash([9,9]);ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='26px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('F',this.x,this.y);}
    else if(T==='maple'){ctx.fillStyle=`rgba(200,60,0,${pr*.4})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();ctx.fillStyle='#c44';ctx.font='bold 20px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('M',this.x,this.y);}
    else if(T==='syrup'){ctx.fillStyle=`rgba(180,100,10,${pr*.45})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();}
    else if(T==='bliz'){
      ctx.fillStyle='rgba(180,220,255,.15)';ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(200,235,255,.45)';ctx.lineWidth=3;ctx.stroke();
      for(let i=0;i<8;i++){const a=this.f*.04+i*Math.PI/4,r2=this.radius*.7*(0.5+.5*Math.sin(this.f*.03+i));ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.arc(this.x+Math.cos(a)*r2,this.y+Math.sin(a)*r2,4,0,Math.PI*2);ctx.fill();}
    }
    else if(T==='strike_mk'){ctx.strokeStyle=`rgba(255,40,40,${pr})`;ctx.lineWidth=3;ctx.setLineDash([7,7]);ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=`rgba(255,40,40,${pr*.22})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();}
    else if(T==='lux_land'){ctx.fillStyle=`rgba(239,51,64,${pr*.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius*(1.2-pr*.2),0,Math.PI*2);ctx.fill();}
    else if(T==='flood_zone'){ctx.fillStyle=`rgba(30,100,210,${pr*.3})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(80,160,255,${pr*.5})`;ctx.lineWidth=2;ctx.stroke();}
    ctx.restore();
  }
}

class HealItem{
  constructor(x,y,team,amount,id){this.x=x;this.y=y;this.team=team;this.amount=amount;this.active=true;this.r=26;this.f=320;this.id=id||Math.random();}
  update(){this.f--;if(this.f<=0)this.active=false;}
  apply(a){if(!this.active)return;a.hp=Math.min(a.maxHp,a.hp+this.amount);this.active=false;}
  draw(){const p=this.f/320;ctx.fillStyle=`rgba(80,255,120,${p*.6})`;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 17px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('+',this.x,this.y);}
}

// ─────────────────────────────────────────────
// SOCCER BALL
// ─────────────────────────────────────────────
class Ball{
  constructor(x,y){this.x=x;this.y=y;this.vx=0;this.vy=0;this.r=22;this.rot=0;}
  update(){
    const b=soccerBounds;
    this.x+=this.vx;this.y+=this.vy;this.rot+=Math.hypot(this.vx,this.vy)*.04;
    this.vx*=.96;this.vy*=.96;
    if(!b)return;
    // Wall bounce (top/bottom)
    if(this.y-this.r<b.oy){this.y=b.oy+this.r;this.vy=Math.abs(this.vy);}
    if(this.y+this.r>b.oy+b.fh){this.y=b.oy+b.fh-this.r;this.vy=-Math.abs(this.vy);}
    // Side walls with goal gap
    if(this.x-this.r<b.ox){
      if(this.y>=b.gy0&&this.y<=b.gy1){scoreSoccer(0);return;}// Player team scores
      this.x=b.ox+this.r;this.vx=Math.abs(this.vx);
    }
    if(this.x+this.r>b.ox+b.fw){
      if(this.y>=b.gy0&&this.y<=b.gy1){scoreSoccer(1);return;}// Enemy scores
      this.x=b.ox+b.fw-this.r;this.vx=-Math.abs(this.vx);
    }
    // Characters push ball
    const all=[player,...allies,...enemies].filter(a=>a&&!a.dead);
    for(let a of all){
      const d=dst(a,this);
      if(d<a.sz+this.r){
        const ang=Math.atan2(this.y-a.y,this.x-a.x);
        const push=Math.hypot(a.vx||0,a.vy||0)+1.5;
        this.vx+=Math.cos(ang)*push;this.vy+=Math.sin(ang)*push;
        const ov=a.sz+this.r-d+1;this.x+=Math.cos(ang)*ov;this.y+=Math.sin(ang)*ov;
      }
    }
  }
  kick(ang,power){this.vx=Math.cos(ang)*power;this.vy=Math.sin(ang)*power;}
  draw(){
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.fillStyle='#fff';ctx.strokeStyle='#222';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#333';for(let i=0;i<5;i++){const a=i*Math.PI*2/5;ctx.beginPath();ctx.arc(Math.cos(a)*this.r*.55,Math.sin(a)*this.r*.55,4,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
}

function scoreSoccer(scoringTeam){
  // scoringTeam=0: player/ally scored in enemy goal (right side)
  // scoringTeam=1: enemy scored in player goal (left side)
  soccerScore[scoringTeam]++;
  const sb=document.getElementById('scoreBar');
  sb.textContent=`味方 ${soccerScore[0]} - ${soccerScore[1]} 敵`;
  if(soccerScore[scoringTeam]>=2){
    gState='gameEnd';
    showWin(scoringTeam===0?'VICTORY!':'DEFEAT',scoringTeam===0?'サッカー勝利！':'サッカー敗北...');
    return;
  }
  resetBall();
}
function resetBall(){
  if(!soccerBounds)return;
  const b=soccerBounds;
  ball=new Ball(b.ox+b.fw/2,b.oy+b.fh/2);
}

// ACTOR
// ─────────────────────────────────────────────
let _aid=0;
class Actor{
  constructor(x,y,team,type){
    this.x=x;this.y=y;this.team=team;this.type=type;
    const c=CHARS[type];
    this.hp=c.hp;this.maxHp=c.hp;this.sz=c.sz;this.spd=c.spd;
    this.ammo=c.am;this.maxAmmo=c.am;this.rt0=c.rt;this.reloadT=0;
    this.spGauge=0;this.spMax=c.spMax;
    this.dead=false;this.respawnT=0;
    this.atkPhase=0;this.atkCD=0;
    this.state=null;
    this.atkMult=1;this.spdMult=1;this.reloadMult=1;
    this.slowF=1;this.slowT=0;
    this.invisible=false;this.shield=0;
    this.poisonT=0;this.poisonDmg=350;
    this.silenced=0;this.speedBoost=0;
    this.hitFlash=0;
    this.inTank=false;this.tankHp=0;this.tankHits=0;
    this.yamato=false;this.yamatoInv=false;this.yamatoInvT=0;
    this.blizzard=false;this.spTimer=0;
    this.nextBelShot='choco';
    this.id=_aid++;
    this.lastDmgT=0;this.recStep=0;this.recActive=false;this._recIv=null;
    // AI
    this.aiT=0;this.lastEngageT=0;this.aiMode='advance'; // advance/fight/retreat
    this.isBot=false;this.vx=0;this.vy=0;// for ball push
  }
  get reloadTime(){return this.rt0/this.reloadMult;}
  get effSpd(){return this.spd*this.spdMult*(this.slowT>0?this.slowF:1)*(this.speedBoost>0?1.25:1);}
  addSP(v){if(this.isBot)return;this.spGauge=Math.min(this.spMax,this.spGauge+v);}

  takeDmg(dmg,src){
    if(this.dead)return;
    if(this.yamatoInv)return;
    // wflag debuff
    let m=1;
    for(let a of areas){if(a.type==='wflag'&&a.owner&&a.owner.team!==this.team&&dst(this,a)<a.radius)m*=.75;}
    // trench tile: attacker's dmg reduced
    if(src){
      const st=tilesUnderActor(src);
      if(st.some(t=>t.type==='trench'&&t.ownerId!==src.id))m*=.6;
    }
    let d=dmg*m;
    if(this.shield>0){const ab=Math.min(this.shield,d);this.shield-=ab;d-=ab;}
    if(d<=0)return;
    // Yamato 1HP survival
    if(this.yamato&&this.hp-d<=0&&!this.yamatoInv){
      this.hp=1;this.yamatoInv=true;this.yamatoInvT=60;if(src)src.addSP(d*.3);return;
    }
    this.hp-=d;this.hitFlash=8;
    this.lastDmgT=Date.now();this.recActive=false;if(this._recIv){clearInterval(this._recIv);this._recIv=null;}
    if(src&&src!==this)src.addSP(d*.4);
    if(this.hp<=0){this.hp=0;this.die();}
  }

  die(){
    this.dead=true;
    const noRespawn=gMode==='knockout'||gMode==='br';
    this.respawnT=noRespawn?Infinity:5000;
    if(this.yamato&&this.team===TEAM.P&&!noRespawn)this.respawnT=3000;
    this.state=null;this.inTank=false;this.yamato=false;this.yamatoInv=false;
    this.blizzard=false;this.invisible=false;
    this.atkMult=1;this.spdMult=1;this.reloadMult=1;
    if(this.team===TEAM.P){
      showDead(!noRespawn);
    }
    checkEnd();
  }

  respawn(){
    const c=CHARS[this.type];
    this.hp=c.hp;this.maxHp=c.hp;this.dead=false;this.respawnT=0;
    this.atkPhase=0;this.atkCD=0;this.ammo=c.am;this.reloadT=0;
    this.spGauge=0;this.state=null;this.poisonT=0;this.silenced=0;
    this.atkMult=1;this.spdMult=1;this.reloadMult=1;this.slowF=1;this.slowT=0;
    this.invisible=false;this.shield=0;this.hitFlash=0;this.inTank=false;this.tankHp=0;
    this.yamato=false;this.yamatoInv=false;this.blizzard=false;
    this.lastDmgT=0;this.recActive=false;this.aiMode='advance';
    const b=soccerBounds;
    if(gMode==='soccer'&&b){
      if(this.team===TEAM.P||this.team===TEAM.A){this.x=b.ox+b.fw*.28+Math.random()*60;this.y=b.oy+b.fh*.5+(Math.random()-.5)*300;}
      else{this.x=b.ox+b.fw*.72+Math.random()*60;this.y=b.oy+b.fh*.5+(Math.random()-.5)*300;}
    }else{
      const sx=(this.team===TEAM.P||this.team===TEAM.A)?650:4350;
      this.x=sx+Math.random()*300-150;this.y=2500+Math.random()*600-300;
    }
    if(this.team===TEAM.P)hideDead();
  }

  move(ax,ay){
    if(this.dead)return;
    if(this.state&&(this.state.t==='stun'||this.state.t==='jp_charge'))return;
    const sp=this.effSpd;
    this.vx=ax*sp;this.vy=ay*sp;
    let nx=clamp(this.x+this.vx,this.sz+32,W.w-this.sz-32);
    let ny=clamp(this.y+this.vy,this.sz+32,W.h-this.sz-32);
    if(!wallColSolid(nx,this.y,this.sz))this.x=nx;
    if(!wallColSolid(this.x,ny,this.sz))this.y=ny;
  }

  // ── ATTACKS ──
  atk(ang){
    if(this.dead||this.atkCD>0||this.silenced>0)return;
    // Soccer: kick ball if nearby, else attack normally
    if(gMode==='soccer'){
      if(ball){
        const bd=dst(this,ball);
        if(bd<this.sz+ball.r+30&&this.ammo>0){
          ball.kick(ang,24);this.ammo--;this.atkCD=18;return;
        }
      }
    }
    const T=this.type;
    if(T==='soviet')this.sovAtk(ang);
    else if(T==='usa')this.usaAtk(ang);
    else if(T==='uk')this.ukAtk(ang);
    else if(T==='france')this.fraAtk(ang);
    else if(T==='germany'){if(this.inTank)this.tankAtk(ang);else this.gerAtk(ang);}
    else if(T==='japan')this.jpAtk(ang);
    else if(T==='italy')this.itaAtk(ang);
    else if(T==='china')this.chiAtk(ang);
    else if(T==='canada')this.canAtk(ang);
    else if(T==='finland'){if(this.blizzard)this.finSMG(ang);else this.finSnipe(ang);}
    else if(T==='belgium')this.belAtk(ang);
    else if(T==='netherlands')this.nlAtk();
    else if(T==='luxembourg')this.luxAtk(ang);
  }
  sovAtk(ang){
    const ph=this.atkPhase%3;
    if(ph===0){areas.push(new Area(this.x+Math.cos(ang)*130,this.y+Math.sin(ang)*130,'shock',this,220,1600,16,ang));this.atkCD=55;}
    else if(ph===1){areas.push(new Area(this.x,this.y,'slash',this,180,2200,14,ang));this.atkCD=45;}
    else{projectiles.push(new Boomerang(this.x,this.y,ang,7,750,1800*this.atkMult,this));this.atkCD=90;}
    this.atkPhase++;
  }
  usaAtk(ang){if(this.ammo<=0)return;for(let i=0;i<5;i++){const a=ang+(i-2)*.09;projectiles.push(new Bullet(this.x,this.y,a,20,1100,450*this.atkMult,this,7,'#ffe040'));}this.ammo--;this.atkCD=22;}
  ukAtk(ang){if(this.ammo<=0)return;projectiles.push(new Bullet(this.x,this.y,ang,22,1300,2600*this.atkMult,this,10,'#88aaff'));this.ammo--;this.atkCD=50;}
  fraAtk(ang){
    // Create trench tiles in front (3 tiles)
    for(let i=-1;i<=1;i++){
      const tx=this.x+Math.cos(ang)*180+Math.cos(ang+Math.PI/2)*i*TILE_SZ;
      const ty=this.y+Math.sin(ang)*180+Math.sin(ang+Math.PI/2)*i*TILE_SZ;
      setTile(tx,ty,'trench',this.id,600);
    }
    // Slash effect
    areas.push(new Area(this.x,this.y,'slash',this,160,1800,10,ang));
    this.atkCD=48;
  }
  gerAtk(ang){
    if(this.ammo<=0)return;
    for(let i=0;i<15;i++){setTimeout(()=>{if(!this.dead){const sp=(Math.random()-.5)*.6;projectiles.push(new FadeBullet(this.x,this.y,ang+sp,18,650,250*this.atkMult,this,6,'#ffee66'));}},i*35);}
    this.ammo--;this.atkCD=110;
  }
  tankAtk(ang){
    if(this.ammo<=0)return;
    projectiles.push(new ExpBullet(this.x,this.y,ang,10,950,2500*this.atkMult,this,160,'#ff8800'));
    this.ammo--;this.atkCD=90;this.tankHits++;this.addSP(500);
  }
  jpAtk(ang){
    const ph=this.atkPhase%2;
    if(ph===0){this.state={t:'jp_charge',f:16,ang,dashHit:false};}
    else{areas.push(new Area(this.x,this.y,'slash',this,240,2500*this.atkMult,14,ang));projectiles.push(new Bullet(this.x,this.y,ang,16,600,800*this.atkMult,this,8,'#eee'));this.atkCD=60;}
    this.atkPhase++;
  }
  itaAtk(ang){if(this.ammo<=0)return;areas.push(new Area(this.x,this.y,'pizza',this,88,2200*this.atkMult,300,ang,this));this.ammo--;this.atkCD=28;}
  chiAtk(ang){if(this.state&&this.state.t==='chi_ch')return;this.state={t:'chi_ch',f:15,ang};this.atkCD=80;}
  canAtk(ang){
    if(this.ammo<=0)return;
    const tx=spTarget.x,ty=spTarget.y;
    projectiles.push(new Thrown(this.x,this.y,tx,ty,this,'maple',90,1050*this.atkMult));
    this.ammo--;this.atkCD=70;
  }
  finSnipe(ang){if(this.ammo<=0)return;projectiles.push(new Bullet(this.x,this.y,ang,32,2200,3300*this.atkMult,this,10,'#88ccff'));this.ammo--;this.atkCD=100;}
  finSMG(ang){
    if(this.ammo<=0)return;
    for(let i=0;i<20;i++){setTimeout(()=>{if(!this.dead){const sp=(Math.random()-.5)*.9;projectiles.push(new Bullet(this.x,this.y,ang+sp,16,320,450*this.atkMult,this,5,'#aaddff'));}},i*44);}
    this.ammo--;this.atkCD=85;
  }
  belAtk(ang){
    if(this.ammo<=0)return;
    const shot=this.nextBelShot;this.nextBelShot=Math.random()<.5?'choco':'waffle';
    if(shot==='choco'){const b=new Bullet(this.x,this.y,ang,15,700,0,this,8,'#8B4513');b.bChoco=true;b.belOwner=this;projectiles.push(b);}
    else{const b=new Bullet(this.x,this.y,ang,15,700,1600*this.atkMult,this,9,'#ffcc88');b.bWaffle=true;b.belOwner=this;projectiles.push(b);}
    this.ammo--;this.atkCD=50;
  }
  nlAtk(){
    // Reclaim tiles in radius
    const r=180;
    for(let dx=-r;dx<=r;dx+=TILE_SZ){for(let dy=-r;dy<=r;dy+=TILE_SZ){if(dx*dx+dy*dy<r*r)setTile(this.x+dx,this.y+dy,'reclaim',this.id,1200);}}
    areas.push(new Area(this.x,this.y,'shock',this,180,2100,14,0));this.atkCD=55;
  }
  luxAtk(ang){
    if(this.ammo<=0)return;
    this.state={t:'lux_dash',f:14,ang,hit:false};this.ammo--;this.atkCD=45;
  }

  // ── SPECIALS ──
  special(ang){
    if(this.dead||this.spGauge<this.spMax)return;
    this.spGauge=0;
    // Soccer special kick
    if(gMode==='soccer'){if(ball){const bd=dst(this,ball);if(bd<this.sz+ball.r+40){ball.kick(ang,40);this.atkCD=10;}}return;}
    const T=this.type;
    if(T==='soviet')this.spSov();
    else if(T==='usa')this.spUSA(ang);
    else if(T==='uk')this.spUK();
    else if(T==='france')this.spFra(ang);
    else if(T==='germany'){if(this.inTank)this.spTank(ang);else this.spGer();}
    else if(T==='japan')this.spJP();
    else if(T==='italy')this.spIta();
    else if(T==='china')this.spChi();
    else if(T==='canada')this.spCan(ang);
    else if(T==='finland')this.spFin(ang);
    else if(T==='belgium')this.spBel(ang);
    else if(T==='netherlands')this.spNL();
    else if(T==='luxembourg')this.spLux(ang);
  }
  spSov(){
    while(sovietBots.length>=15){const mi=sovietBots.reduce((a,b,i,arr)=>b.hp<arr[a].hp?i:a,0);sovietBots[mi].hp=0;sovietBots[mi].dead=true;sovietBots.splice(mi,1);}
    for(let i=0;i<3;i++){const bx=this.x+(Math.random()-.5)*200,by=this.y+(Math.random()-.5)*200;const bot=new SovietBot(bx,by,this.team,this);sovietBots.push(bot);if(this.team===TEAM.E)enemies.push(bot);else allies.push(bot);}
  }
  spUSA(ang){const tx=spTarget.x,ty=spTarget.y;areas.push(new Area(tx,ty,'strike_mk',this,280,0,60));setTimeout(()=>{for(let i=0;i<14;i++){const ox=(Math.random()-.5)*340,oy=(Math.random()-.5)*340;const ax=tx+ox,ay=ty+oy;areas.push(new Area(ax,ay,'expl',this,150,5500,18));walls.forEach(w=>{if(w.brk&&w.active&&w.hp>0&&rcOv(w.x,w.y,w.w,w.h,ax,ay,150))w.hp-=2000;});}},1000);}
  spUK(){areas.push(new Area(this.x,this.y,'channel',this,200,850,240));}
  spFra(ang){const tx=this.x+Math.cos(ang)*320,ty=this.y+Math.sin(ang)*320;areas.push(new Area(tx,ty,'wflag',this,270,0,480,ang));}
  spGer(){this.inTank=true;this.tankHp=this.hp*1.5;this.sz=66;this.spd=CHARS['germany'].spd*.8;this.tankHits=0;this.spTimer=900;}
  spTank(ang){if(this.tankHits<2)return;const tx=spTarget.x,ty=spTarget.y;areas.push(new Area(tx,ty,'strike_mk',this,220,0,60));setTimeout(()=>{for(let i=0;i<7;i++){const ox=(Math.random()-.5)*220,oy=(Math.random()-.5)*220;const ax=tx+ox,ay=ty+oy;areas.push(new Area(ax,ay,'expl',this,160,4500,18));walls.forEach(w=>{if(w.brk&&w.active&&w.hp>0&&rcOv(w.x,w.y,w.w,w.h,ax,ay,160))w.hp-=2000;});}},1000);this.tankHits=0;}
  spJP(){this.yamato=true;this.atkMult=1.5;this.spdMult=1.25;this.reloadMult=1.5;this.yamatoInv=false;this.spTimer=360;}
  spIta(){for(let i=0;i<4;i++){const a=i*Math.PI/2;items.push(new HealItem(this.x+Math.cos(a)*180,this.y+Math.sin(a)*180,this.team,2000,Math.random()));}}
  spChi(){this.invisible=true;this.spdMult*=1.75;this.spTimer=240;}
  spCan(ang){const tx=spTarget.x,ty=spTarget.y;for(let i=0;i<10;i++){const a=i*Math.PI*2/10;areas.push(new Area(tx+Math.cos(a)*200,ty+Math.sin(a)*200,'syrup',this,130,120,480));}}
  spFin(ang){this.blizzard=true;areas.push(new Area(this.x,this.y,'bliz',this,560,550,600,0,this));this.spTimer=600;}
  spBel(ang){areas.push(new Area(this.x,this.y,'slash',this,180,3200,14,ang));const la=areas[areas.length-1];la.silenceOnHit=true;}
  spNL(){// Convert reclaim tiles to flood zones
    const myTiles=tiles.filter(t=>t.type==='reclaim'&&t.ownerId===this.id);
    myTiles.forEach(t=>{t.type='flood';t.timer=420;});
    areas.push(new Area(this.x,this.y,'flood_zone',this,300,0,420));}
  spLux(ang){const tx=spTarget.x,ty=spTarget.y;projectiles.push(new Thrown(this.x,this.y,tx,ty,this,'lux_land',140,3300,30));this.invisible=true;setTimeout(()=>{this.x=tx;this.y=ty;this.invisible=false;},500);}

  update(){
    if(this.dead){if(isFinite(this.respawnT)){this.respawnT-=16.67;if(this.respawnT<=0)this.respawn();}return;}
    // State machine
    if(this.state){
      const s=this.state;
      if(s.t==='stun'){s.f--;if(s.f<=0)this.state=null;}
      else if(s.t==='jp_charge'){
        s.f--;
        const a=s.ang;let nx=clamp(this.x+Math.cos(a)*16,this.sz+32,W.w-this.sz-32),ny=clamp(this.y+Math.sin(a)*16,this.sz+32,W.h-this.sz-32);
        if(!wallColSolid(nx,this.y,this.sz))this.x=nx;if(!wallColSolid(this.x,ny,this.sz))this.y=ny;
        if(!s.dashHit){for(let f of foes(this)){if(!f.dead&&dst(this,f)<this.sz+f.sz+10){f.takeDmg(1500*this.atkMult,this);s.dashHit=true;break;}}}
        if(s.f<=0){areas.push(new Area(this.x,this.y,'slash',this,120,2000*this.atkMult,12,a));this.state=null;}
      }
      else if(s.t==='chi_ch'){s.f--;if(s.f<=0){const a=s.ang;for(let i=0;i<5;i++){const da=(i-2)*.18;projectiles.push(new Bullet(this.x,this.y,a+da,18,750,750*this.atkMult,this,7,'#ffee00'));}this.state=null;}}
      else if(s.t==='lux_dash'){
        s.f--;
        const a=s.ang;let nx=clamp(this.x+Math.cos(a)*18,this.sz+32,W.w-this.sz-32),ny=clamp(this.y+Math.sin(a)*18,this.sz+32,W.h-this.sz-32);
        if(!wallColSolid(nx,this.y,this.sz))this.x=nx;if(!wallColSolid(this.x,ny,this.sz))this.y=ny;
        if(!s.hit){for(let f of foes(this)){if(!f.dead&&dst(this,f)<this.sz+f.sz+8){f.takeDmg(2200*this.atkMult,this);f.state={t:'stun',f:60};const a2=Math.atan2(f.y-this.y,f.x-this.x);f.x+=Math.cos(a2)*15;f.y+=Math.sin(a2)*15;this.hp=Math.min(this.maxHp,this.hp+800);s.hit=true;break;}}}
        if(s.f<=0)this.state=null;
      }
    }
    // Buff timers
    if(this.spTimer>0){
      this.spTimer--;
      if(this.spTimer<=0){
        if(this.inTank){this.inTank=false;this.sz=CHARS['germany'].sz;this.spd=CHARS['germany'].spd;}
        if(this.yamato){this.yamato=false;this.atkMult=1;this.spdMult=1;this.reloadMult=1;}
        if(this.invisible&&this.type==='china'){this.invisible=false;this.spdMult=1;}
        if(this.blizzard)this.blizzard=false;
      }
    }
    if(this.yamatoInv){this.yamatoInvT--;if(this.yamatoInvT<=0)this.yamatoInv=false;}
    // Status
    if(this.slowT>0)this.slowT--;
    if(this.silenced>0)this.silenced--;
    if(this.speedBoost>0)this.speedBoost--;
    if(this.poisonT>0){this.poisonT--;if(this.poisonT%60===0){this.hp=Math.max(1,this.hp-this.poisonDmg);if(this.hp<=0)this.die();}}
    // Reload
    if(this.ammo<this.maxAmmo){this.reloadT++;if(this.reloadT>=this.reloadTime){this.ammo++;this.reloadT=0;}}
    if(this.atkCD>0)this.atkCD--;
    if(this.hitFlash>0)this.hitFlash--;
    // Tile effects
    const myTiles=tilesUnderActor(this);
    myTiles.forEach(t=>{
      if(t.type==='flood'&&t.ownerId!==this.id){this.slowF=.5;this.slowT=40;}
    });
    // Item pickup
    items.forEach(it=>{if(it.active&&(it.team===this.team||gMode==='br')&&dst(this,it)<it.r+this.sz)it.apply(this);});
    // Natural recovery
    const now=Date.now();
    if(!this.recActive&&this.lastDmgT>0&&now-this.lastDmgT>5000&&this.hp<this.maxHp&&!this.dead){
      this.recActive=true;this.recStep=0;
      this._recIv=setInterval(()=>{
        if(this.dead||!this.recActive||this.hp>=this.maxHp){this.recActive=false;clearInterval(this._recIv);this._recIv=null;return;}
        if(this.recStep>=REC.length){this.recActive=false;clearInterval(this._recIv);this._recIv=null;return;}
        this.hp=Math.min(this.maxHp,this.hp+this.maxHp*REC[this.recStep++]);
      },1000);
    }
  }

  drawSelf(){
    if(this.dead)return;
    if(this.invisible&&this.team===TEAM.E)return;
    // Blizzard hides allies from enemy POV (simplified: hide if in bliz owned by enemy)
    if(this.team!==TEAM.E){for(let a of areas){if(a.type==='bliz'&&a.owner&&a.owner.team===TEAM.E&&dst(this,a)<a.radius)return;}}
    ctx.save();ctx.translate(this.x,this.y);
    if(this.hitFlash>0)ctx.globalAlpha=.5+.5*(this.hitFlash%2);
    if(this.inTank){ctx.fillStyle='#666';ctx.beginPath();ctx.ellipse(0,0,this.sz+14,this.sz+10,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#999';ctx.lineWidth=3;ctx.stroke();}
    ctx.beginPath();ctx.arc(0,0,this.sz,0,Math.PI*2);
    let col=CHARS[this.type].col;
    if(this.invisible)col='rgba(180,180,180,.25)';
    else if(this.poisonT>0)col='#3a3';
    else if(this.yamatoInv)col='#ffdd00';
    ctx.fillStyle=col;ctx.fill();
    const tc=this.team===TEAM.P?'#0ff':this.team===TEAM.A?'#0f0':this.team===TEAM.E?'#f44':'#fff';
    ctx.strokeStyle=tc;ctx.lineWidth=3;ctx.stroke();
    if(this.shield>0){ctx.strokeStyle='rgba(100,150,255,.8)';ctx.lineWidth=5;ctx.beginPath();ctx.arc(0,0,this.sz+7,0,Math.PI*2);ctx.stroke();}
    ctx.fillStyle=this.hitFlash>0?'#faa':'#fff';
    ctx.font=`bold ${Math.max(10,Math.floor(this.sz*.48))}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(CHARS[this.type].sym,0,0);
    // Yamato glow
    if(this.yamato){ctx.strokeStyle='rgba(255,220,0,.7)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,0,this.sz+11+Math.sin(FC*.2)*3,0,Math.PI*2);ctx.stroke();}
    ctx.restore();
    this.drawHUD();
  }

  drawHUD(){
    const c=CHARS[this.type];const bw=84,bx=this.x-bw/2,by=this.y-this.sz-44;
    // Name
    ctx.fillStyle='#ccc';ctx.font='8px Arial';ctx.textAlign='center';ctx.fillText(c.name,this.x,by-5);
    // HP bar
    ctx.fillStyle='#111';ctx.fillRect(bx,by,bw,8);
    const hr=this.hp/this.maxHp;ctx.fillStyle=hr>.5?'#2ecc71':hr>.25?'#f39c12':'#e74c3c';ctx.fillRect(bx,by,bw*hr,8);
    ctx.fillStyle='#fff';ctx.font='7px Arial';ctx.textAlign='center';ctx.fillText(Math.ceil(this.hp),this.x,by+6);
    if(this.shield>0){ctx.fillStyle='rgba(100,150,255,.5)';ctx.fillRect(bx,by,bw*Math.min(1,this.shield/this.maxHp),8);}
    // Ammo dots
    const am=this.maxAmmo,sw=(bw-(am-1)*2)/am;
    for(let i=0;i<am;i++){
      const sx=bx+i*(sw+2);
      ctx.fillStyle=i<this.ammo?'#f1c40f':'#333';ctx.fillRect(sx,by+10,sw,5);
      if(i===this.ammo&&this.ammo<am){ctx.fillStyle='#888';ctx.fillRect(sx,by+10,sw*(this.reloadT/this.reloadTime),5);}
    }
    // SP bar
    ctx.fillStyle='#222';ctx.fillRect(bx,by+17,bw,3);
    ctx.fillStyle=this.spGauge>=this.spMax?'#d8b4fe':'#7c3aed';ctx.fillRect(bx,by+17,bw*(this.spGauge/this.spMax),3);
    // Belgium next shot
    if(this.type==='belgium'){ctx.fillStyle='#fc0';ctx.font='7px Arial';ctx.textAlign='center';ctx.fillText('次:'+( this.nextBelShot==='choco'?'チョコ':'ワッフル'),this.x,by+24);}
    if(this.poisonT>0){ctx.fillStyle='#5f5';ctx.font='7px Arial';ctx.textAlign='left';ctx.fillText('毒',bx,by+24);}
  }

  // ── AI ──
  aiUpdate(){
    if(this.dead)return;
    this.aiT++;
    const fo=foes(this).filter(f=>!f.dead);
    const fr=frds(this).filter(f=>!f.dead);

    // --- Soccer AI ---
    if(gMode==='soccer'){
      if(!ball)return;
      const bd=dst(this,ball);
      const goalX=this.team===TEAM.E?
        (soccerBounds?soccerBounds.ox:800):
        (soccerBounds?soccerBounds.ox+soccerBounds.fw:4200);
      const goalY=soccerBounds?(soccerBounds.gy0+soccerBounds.gy1)/2:2500;

      if(bd<this.sz+ball.r+40){
        // Has ball: kick toward goal
        const ang=Math.atan2(goalY-this.y,goalX-this.x)+(Math.random()-.5)*.3;
        if(this.atkCD<=0){ball.kick(ang,22);this.atkCD=20;}
      }else{
        // Go to ball
        const ang=Math.atan2(ball.y-this.y,ball.x-this.x);
        this.move(Math.cos(ang),Math.sin(ang));
        // Attack nearby foes
        if(fo.length>0&&this.aiT%30===0){const near=fo.reduce((a,b)=>dst(this,b)<dst(this,a)?b:a);const d=dst(this,near);if(d<700)this.atk(Math.atan2(near.y-this.y,near.x-this.x));}
      }
      if(this.spGauge>=this.spMax){const ang=Math.atan2(goalY-this.y,goalX-this.x);this.special(ang);}
      return;
    }

    // --- Normal AI ---
    if(!fo.length){
      // Patrol toward enemy base
      const px=this.team===TEAM.E?1500:3500,py=2500;
      const ang=Math.atan2(py-this.y,px-this.x);this.move(Math.cos(ang),Math.sin(ang));return;
    }
    let near=fo.reduce((a,b)=>dst(this,b)<dst(this,a)?b:a);
    const d=dst(this,near);const ang=Math.atan2(near.y-this.y,near.x-this.x);
    const hpRatio=this.hp/this.maxHp;
    const allyCount=fr.length;

    // Determine mode
    const stalemate=this.aiT-this.lastEngageT>240; // 4s without engaging
    if(hpRatio<.3){this.aiMode='retreat';}
    else if(hpRatio>.6||stalemate){this.aiMode='advance';}
    else{this.aiMode='fight';}

    // Front wall position (start of match or when ally is ahead)
    const frontX=this.team===TEAM.E?3000:2000;
    const atFront=this.team===TEAM.E?this.x<frontX:this.x>frontX;
    const allyAtFront=fr.some(f=>this.team===TEAM.E?f.x<frontX:f.x>frontX);

    if(this.aiMode==='advance'||(!atFront&&!allyAtFront)){
      // Push forward
      const fwdX=this.team===TEAM.E?frontX-200:frontX+200;
      const fwdAng=Math.atan2(near.y-this.y,fwdX-this.x);
      this.move(Math.cos(fwdAng),Math.sin(fwdAng));
    }else if(this.aiMode==='retreat'){
      const retX=this.team===TEAM.E?4000:1000;
      const retAng=Math.atan2(2500-this.y,retX-this.x);this.move(Math.cos(retAng),Math.sin(retAng));
    }else{
      // Fight mode: dodge bullets, maintain distance
      let dodge=null;
      for(let p of projectiles){
        if(p.owner&&p.owner.team===this.team)continue;
        if(dst({x:p.x,y:p.y},this)<200){dodge=ang+Math.PI/2*(Math.random()>.5?1:-1);break;}
      }
      if(dodge!==null)this.move(Math.cos(dodge),Math.sin(dodge));
      else if(d>280)this.move(Math.cos(ang),Math.sin(ang));
      else if(d<130)this.move(-Math.cos(ang),-Math.sin(ang));
      else{if(this.aiT%50<25)this.move(Math.cos(ang+Math.PI/2),Math.sin(ang+Math.PI/2));else this.move(Math.cos(ang-Math.PI/2),Math.sin(ang-Math.PI/2));}
    }

    // Attack
    if(this.atkCD<=0&&d<850){
      this.atk(ang);this.lastEngageT=this.aiT;
    }
    // Special (ai always knows target location)
    if(this.spGauge>=this.spMax){
      spTarget={x:near.x+(Math.random()-.5)*100,y:near.y+(Math.random()-.5)*100};
      this.special(ang);
    }
    // AI Canada/Luxembourg needs spTarget
    if(this.type==='canada'||this.type==='luxembourg'){spTarget={x:near.x,y:near.y};}
  }
}

// Soviet Bot
class SovietBot extends Actor{
  constructor(x,y,team,master){
    super(x,y,team,'usa');this.master=master;this.hp=1200;this.maxHp=1200;this.sz=18;this.spd=4.2;
    this.isBot=true;this.maxAmmo=99;this.ammo=99;this.rt0=50;
  }
  aiUpdate(){
    if(this.dead)return;this.aiT++;
    const dm=dst(this,this.master);
    if(dm>300){const a=Math.atan2(this.master.y-this.y,this.master.x-this.x);this.move(Math.cos(a),Math.sin(a));return;}
    const fo=foes(this).filter(f=>!f.dead&&!f.isBot);
    if(!fo.length)return;
    const near=fo.reduce((a,b)=>dst(this,b)<dst(this,a)?b:a);
    const ang=Math.atan2(near.y-this.y,near.x-this.x);
    const d=dst(this,near);
    if(d>200)this.move(Math.cos(ang),Math.sin(ang));
    if(this.aiT%38===0&&d<600)projectiles.push(new Bullet(this.x,this.y,ang,16,550,500,this,6,'#ffaa00'));
  }
  drawSelf(){
    if(this.dead)return;ctx.save();ctx.translate(this.x,this.y);
    ctx.beginPath();ctx.arc(0,0,this.sz,0,Math.PI*2);ctx.fillStyle='#a00';ctx.fill();
    ctx.strokeStyle=this.team===TEAM.E?'#f44':'#0f0';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',0,0);ctx.restore();
    const bw=38,bx=this.x-bw/2,by=this.y-this.sz-14;
    ctx.fillStyle='#111';ctx.fillRect(bx,by,bw,4);ctx.fillStyle='#e44';ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),4);
  }
}

// ATTACK RANGE INDICATOR
// ─────────────────────────────────────────────
function drawRangeIndicator(actor,ang,isSpecial){
  if(!actor||actor.dead)return;
  const T=actor.type;const c=CHARS[T];
  ctx.save();ctx.globalAlpha=.18;
  if(isSpecial){
    // Special: just show target marker
    ctx.fillStyle='#c4f';ctx.beginPath();ctx.arc(spTarget.x,spTarget.y,80,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=.5;ctx.strokeStyle='#c4f';ctx.lineWidth=2;ctx.setLineDash([6,6]);
    ctx.beginPath();ctx.moveTo(actor.x,actor.y);ctx.lineTo(spTarget.x,spTarget.y);ctx.stroke();ctx.setLineDash([]);
  }else{
    const phase=actor.atkPhase%( c.atkRanges?c.atkRanges.length:1);
    const range=c.atkRanges?c.atkRanges[phase]:(c.atkRange||300);
    if(T==='japan'||T==='italy'||T==='luxembourg'||T==='france'||T==='netherlands'){
      // Arc/cone
      ctx.fillStyle='#ff8';ctx.translate(actor.x,actor.y);ctx.rotate(ang);
      ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,range,-Math.PI/2,Math.PI/2);ctx.closePath();ctx.fill();
    }else if(c.isThrown){
      // Thrown: circle around target
      ctx.fillStyle='#4cf';ctx.beginPath();ctx.arc(spTarget.x,spTarget.y,120,0,Math.PI*2);ctx.fill();
    }else{
      // Directional beam
      ctx.fillStyle='#ff8';ctx.translate(actor.x,actor.y);ctx.rotate(ang);
      const w=T==='usa'?60:T==='germany'?80:20;
      ctx.beginPath();ctx.rect(0,-w/2,range,w);ctx.fill();
    }
  }
  ctx.restore();
}

function showDead(canRespawn){
  document.getElementById('deadOv').classList.add('show');
  document.getElementById('deadTtl').textContent=gMode==='knockout'?'KNOCK OUT!':(gMode==='br'?'ELIMINATED!':'DEFEATED');
  if(canRespawn){document.getElementById('deadMsg').textContent='リスポーン中...';document.getElementById('deadRBtn').style.display='none';}
  else{document.getElementById('deadMsg').textContent=gMode==='br'?`生存者${allUnits.filter(a=>!a.dead).length}人`:'このラウンド復帰不可';document.getElementById('deadRBtn').style.display='block';}
}
function hideDead(){document.getElementById('deadOv').classList.remove('show');}
function showWin(t,m){document.getElementById('winOv').classList.add('show');document.getElementById('winTtl').textContent=t;document.getElementById('winMsg').textContent=m;}

function checkEnd(){
  if(gState!=='play')return;
  if(gMode==='br'){
    const al=allUnits.filter(a=>!a.dead);brAlive=al.length;
    if(al.length===1){gState='gameEnd';showWin(al[0]===player?'WINNER!':'ELIMINATED',al[0]===player?'バトルロワイヤル優勝！':'敗北...');}
    else if(al.length===0){gState='gameEnd';showWin('DRAW','全員同時敗退');}return;
  }
  if(gMode==='knockout'){
    const pa=[player,...allies].filter(a=>a&&!a.dead).length;
    const ea=enemies.filter(a=>!a.dead).length;
    if(pa===0){koWins[1]++;endKO(false);}else if(ea===0){koWins[0]++;endKO(true);}return;
  }
  if(enemies.filter(a=>!a.dead).length===0){gState='gameEnd';showWin('VICTORY!','敵チームを全滅！');}
}
function endKO(pw){
  gState='roundEnd';
  const sb=document.getElementById('scoreBar');sb.textContent=`ラウンド${koRound} — 味方${koWins[0]}-${koWins[1]}敵`;
  if(koWins[0]>=2){gState='gameEnd';showWin('MATCH WIN!','2勝先取！');return;}
  if(koWins[1]>=2){gState='gameEnd';showWin('MATCH LOSS','敵の勝利...');return;}
  setTimeout(()=>{koRound++;areas=[];projectiles=[];items=[];tiles=[];sovietBots=[];[player,...allies,...enemies].forEach(a=>{if(a)a.respawn();});hideDead();gState='play';},3000);
}

const stk={mv:{a:false,bx:0,by:0,cx:0,cy:0,id:null},at:{a:false,bx:0,by:0,cx:0,cy:0,id:null},sp:{a:false,bx:0,by:0,cx:0,cy:0,id:null}};
const keys={};
function zone(x,y){if(x<innerWidth*.4)return'mv';if(y<innerHeight*.38)return'sp';return'at';}
canvas.addEventListener('touchstart',e=>{e.preventDefault();for(let t of e.changedTouches){const z=zone(t.clientX,t.clientY);if(!stk[z].a)asgn(stk[z],t);}},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();for(let t of e.changedTouches)for(const k of['mv','at','sp'])if(stk[k].id===t.identifier){stk[k].cx=t.clientX;stk[k].cy=t.clientY;}},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  for(let t of e.changedTouches)for(const k of['mv','at','sp'])if(stk[k].id===t.identifier){
    if(k==='at'&&player&&!player.dead){const dx=stk.at.cx-stk.at.bx,dy=stk.at.cy-stk.at.by;if(Math.hypot(dx,dy)>12){const ang=Math.atan2(dy,dx);player.atk(ang);}}
    if(k==='sp'&&player&&!player.dead){const dx=stk.sp.cx-stk.sp.bx,dy=stk.sp.cy-stk.sp.by;if(Math.hypot(dx,dy)>10){const ang=Math.atan2(dy,dx);updSP(ang,Math.hypot(dx,dy));player.special(ang);}}
    stk[k].a=false;stk[k].id=null;
  }
},{passive:false});
function asgn(s,t){s.a=true;s.bx=t.clientX;s.by=t.clientY;s.cx=t.clientX;s.cy=t.clientY;s.id=t.identifier;}
function updSP(ang,mag){if(!player)return;const d=Math.min(mag/38*1600,1600);spTarget={x:player.x+Math.cos(ang)*d,y:player.y+Math.sin(ang)*d};}
canvas.addEventListener('mousedown',e=>{if(!player||player.dead||gState!=='play')return;const cx=innerWidth/2,cy=innerHeight/2;const ang=Math.atan2(e.clientY-cy,e.clientX-cx);if(e.button===2){updSP(ang,600);player.special(ang);}else player.atk(ang);});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('mousemove',e=>{if(gState!=='play'||!player||player.dead)return;const cx=innerWidth/2,cy=innerHeight/2;const ang=Math.atan2(e.clientY-cy,e.clientX-cx);const d=Math.hypot(e.clientX-cx,e.clientY-cy);updSP(ang,d*2);});
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>delete keys[e.key]);

function buildSG(gid,slot){
  const g=document.getElementById(gid);g.innerHTML='';
  const rb=document.createElement('div');rb.className='cbtn sel';rb.style.fontSize='8px';rb.textContent='ランダム';

}

function pk(ex=[]){return rnd(CKEYS.filter(k=>!ex.includes(k)));}
function startGame(){
  document.getElementById('homePanel').classList.add('hidden');
  gMode=selectedMode;gState='play';
  koRound=1;koWins=[0,0];soccerScore=[0,0];sovietBots=[];soccerBounds=null;
  projectiles=[];areas=[];items=[];allUnits=[];tiles=[];walls=[];
  const sb=document.getElementById('scoreBar');
  if(gMode==='knockout'){sb.style.display='block';sb.textContent='ラウンド1 — 味方0-0敵';}
  else if(gMode==='soccer'){sb.style.display='block';sb.textContent='味方 0 - 0 敵';}
  else sb.style.display='none';
  if(gMode==='br'){startBR();return;}
  if(gMode==='soccer'){startSoccer();return;}
  buildMap('normal');
  player=new Actor(650,2500,TEAM.P,selectedChar);const used=[selectedChar];
  const a1=gMode==='select'&&selectTeam.a1!=='random'?selectTeam.a1:pk(used);used.push(a1);
  const a2=gMode==='select'&&selectTeam.a2!=='random'?selectTeam.a2:pk(used);used.push(a2);
  allies=[new Actor(650,2200,TEAM.A,a1),new Actor(650,2800,TEAM.A,a2)];
  const e1=gMode==='select'&&selectTeam.e1!=='random'?selectTeam.e1:pk(used);used.push(e1);
  const e2=gMode==='select'&&selectTeam.e2!=='random'?selectTeam.e2:pk(used);used.push(e2);
  const e3=gMode==='select'&&selectTeam.e3!=='random'?selectTeam.e3:pk(used);
  enemies=[new Actor(4350,2200,TEAM.E,e1),new Actor(4350,2500,TEAM.E,e2),new Actor(4350,2800,TEAM.E,e3)];
  cam={x:650,y:2500};requestAnimationFrame(loop);
}
function startBR(){
  buildMap('br');
  const types=shuffle([...CKEYS]).slice(0,10);
  allUnits=[];
  player=new Actor(1200+Math.random()*2600,1200+Math.random()*2600,TEAM.N,types[0]);allUnits.push(player);
  for(let i=1;i<10;i++){const a=new Actor(1200+Math.random()*2600,1200+Math.random()*2600,TEAM.N,types[i]);allUnits.push(a);}
  brAlive=10;cam={x:player.x,y:player.y};

}
function startSoccer(){
  buildMap('soccer');
  const b=soccerBounds;
  const cx=b.ox+b.fw/2,cy=b.oy+b.fh/2;
  player=new Actor(cx-b.fw*.22,cy,TEAM.P,selectedChar);const used=[selectedChar];
  const a1=pk(used);used.push(a1);const a2=pk(used);used.push(a2);
  allies=[new Actor(cx-b.fw*.25,cy-200,TEAM.A,a1),new Actor(cx-b.fw*.25,cy+200,TEAM.A,a2)];
  const e1=pk(used);used.push(e1);const e2=pk(used);used.push(e2);const e3=pk(used);
  enemies=[new Actor(cx+b.fw*.22,cy,TEAM.E,e1),new Actor(cx+b.fw*.25,cy-200,TEAM.E,e2),new Actor(cx+b.fw*.25,cy+200,TEAM.E,e3)];
  ball=new Ball(cx,cy);cam={x:cx,y:cy};
  requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────
function loop(){
  if(gState!=='play'&&gState!=='roundEnd'){requestAnimationFrame(loop);return;}
  FC++;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Camera
  if(player&&!player.dead){cam.x+=(player.x-cam.x)*.1;cam.y+=(player.y-cam.y)*.1;}
  if(gMode==='soccer'&&soccerBounds){const b=soccerBounds;cam.x=b.ox+b.fw/2;cam.y=b.oy+b.fh/2;}
  ctx.save();ctx.translate(canvas.width/2-cam.x,canvas.height/2-cam.y);

  // Background
  ctx.fillStyle='#111622';ctx.fillRect(0,0,W.w,W.h);
  ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=1;
  for(let x=0;x<=W.w;x+=200){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,W.h);ctx.stroke();}
  for(let y=0;y<=W.h;y+=200){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W.w,y);ctx.stroke();}

  // Soccer field
  if(gMode==='soccer'&&soccerBounds){
    const b=soccerBounds;
    ctx.fillStyle='#1a4a1a';ctx.fillRect(b.ox,b.oy,b.fw,b.fh);
    // Stripes
    for(let i=0;i<8;i++){ctx.fillStyle=i%2?'rgba(255,255,255,.03)':'rgba(0,0,0,.03)';ctx.fillRect(b.ox+i*(b.fw/8),b.oy,b.fw/8,b.fh);}
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=5;ctx.strokeRect(b.ox,b.oy,b.fw,b.fh);
    ctx.beginPath();ctx.moveTo(b.ox+b.fw/2,b.oy);ctx.lineTo(b.ox+b.fw/2,b.oy+b.fh);ctx.stroke();
    ctx.beginPath();ctx.arc(b.ox+b.fw/2,b.oy+b.fh/2,120,0,Math.PI*2);ctx.stroke();
    ctx.lineWidth=8;ctx.strokeStyle='#ffcc00';
    ctx.strokeRect(b.ox-30,b.gy0,30,b.gy1-b.gy0);
    ctx.strokeRect(b.ox+b.fw,b.gy0,30,b.gy1-b.gy0);
  }

  // Tiles
  drawTiles();

  // Walls
  walls.forEach(w=>{
    if(!w.active||w.hp<=0)return;
    if(w.brk){const r=isFinite(w.maxHp)?w.hp/w.maxHp:1;ctx.fillStyle=`rgb(${Math.round(140*r+30)},${Math.round(90*r+20)},${Math.round(40*r)})`;}
    else ctx.fillStyle='#2e3050';
    ctx.fillRect(w.x,w.y,w.w,w.h);
    if(!w.brk){ctx.strokeStyle='rgba(100,110,180,.4)';ctx.lineWidth=1;ctx.strokeRect(w.x,w.y,w.w,w.h);}
    if(w.brk&&isFinite(w.maxHp)){ctx.fillStyle='rgba(255,140,40,.5)';ctx.fillRect(w.x,w.y,w.w*(w.hp/w.maxHp),Math.min(5,w.h));}
  });

  // Areas, items, ball
  areas.forEach(a=>a.draw());
  items.forEach(it=>it.draw());
  if(ball)ball.draw();
  projectiles.forEach(p=>p.draw());

  // Range indicators
  if(gState==='play'){
    if(stk.at.a&&player&&!player.dead){const dx=stk.at.cx-stk.at.bx,dy=stk.at.cy-stk.at.by;if(Math.hypot(dx,dy)>12)drawRangeIndicator(player,Math.atan2(dy,dx),false);}
    if(stk.sp.a&&player&&!player.dead){drawRangeIndicator(player,0,true);}
    // PC: show range when not sticks
    if(!stk.at.a&&!stk.sp.a&&player&&!player.dead){
      const cx2=innerWidth/2,cy2=innerHeight/2;
      // Draw attack range always on PC
    }
  }

  // Characters
  const bots=sovietBots.filter(b=>!b.dead);
  if(gMode==='br')allUnits.forEach(a=>a.drawSelf());
  else{allies.forEach(a=>a.drawSelf());bots.forEach(b=>b.drawSelf());enemies.forEach(e=>e.drawSelf());if(player)player.drawSelf();}

  ctx.restore();

  // === UPDATE ===
  if(gState==='play'){
    // Player input
    if(player&&!player.dead){
      let ax=0,ay=0;
      if(keys['w']||keys['ArrowUp'])ay=-1;if(keys['s']||keys['ArrowDown'])ay=1;
      if(keys['a']||keys['ArrowLeft'])ax=-1;if(keys['d']||keys['ArrowRight'])ax=1;
      if(ax||ay){const l=Math.hypot(ax,ay);player.move(ax/l,ay/l);}
      if(stk.mv.a){const dx=stk.mv.cx-stk.mv.bx,dy=stk.mv.cy-stk.mv.by;const l=Math.hypot(dx,dy);if(l>12)player.move(dx/l,dy/l);}
      if(stk.at.a){const dx=stk.at.cx-stk.at.bx,dy=stk.at.cy-stk.at.by;if(Math.hypot(dx,dy)>18&&FC%20===0&&['usa','germany','finland'].includes(player.type))player.atk(Math.atan2(dy,dx));}
      if(stk.sp.a){const dx=stk.sp.cx-stk.sp.bx,dy=stk.sp.cy-stk.sp.by;if(Math.hypot(dx,dy)>8)updSP(Math.atan2(dy,dx),Math.hypot(dx,dy));}
    }
    const acts=gMode==='br'?allUnits:[player,...allies,...enemies,...sovietBots].filter(a=>a);
    acts.forEach(a=>a.update());
    const ais=gMode==='br'?allUnits.filter(a=>a!==player):[...allies,...enemies,...sovietBots].filter(a=>a);
    ais.forEach(a=>a.aiUpdate());

    // Soccer ball
    if(ball)ball.update();

    // Belgium bullet effects
    projectiles.forEach(p=>{
      if(p.bChoco){
        for(let f of foes(p.belOwner)){if(!f.dead&&dst2(p.x,p.y,f.x,f.y)<(f.sz+8)**2){f.poisonT=300;f.poisonDmg=350;p.active=false;return;}}
        for(let fr of frds(p.belOwner)){if(!fr.dead&&dst2(p.x,p.y,fr.x,fr.y)<(fr.sz+8)**2){fr.speedBoost=120;p.active=false;return;}}
      }else if(p.bWaffle){
        for(let fr of frds(p.belOwner)){if(!fr.dead&&dst2(p.x,p.y,fr.x,fr.y)<(fr.sz+9)**2){fr.shield=Math.min(fr.maxHp*.3,fr.shield+1000);p.active=false;return;}}
      }
    });

    // Belgium silence area
    areas.forEach(a=>{if(a.silenceOnHit&&a.hs.size>0)a.hs.forEach(f=>{f.silenced=180;});});

    projectiles.forEach(p=>p.update());projectiles=projectiles.filter(p=>p.active);
    areas.forEach(a=>a.update());areas=areas.filter(a=>a.active);
    items.forEach(it=>it.update());items=items.filter(it=>it.active);
    updateTiles();
    sovietBots=sovietBots.filter(b=>!b.dead);
    if(gMode==='br'&&FC%60===0){const al=allUnits.filter(a=>!a.dead).length;document.getElementById('scoreBar').style.display='block';document.getElementById('scoreBar').textContent=`生存者: ${al}/10`;}
  }

  // HUD
  drawStick(95,canvas.height-120,stk.mv,'#4af','移動');
  drawStick(canvas.width-110,canvas.height-120,stk.at,'#ff4','通常攻撃');
  drawSPBtn(canvas.width-70,68,stk.sp);
  drawMM();
  if(player&&!player.dead)drawSPBar();
  requestAnimationFrame(loop);
}

function drawStick(x,y,s,col,lbl){
  ctx.save();ctx.globalAlpha=.55;
  ctx.beginPath();ctx.arc(x,y,48,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.3)';ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();
  if(s.a){const ang=Math.atan2(s.cy-s.by,s.cx-s.bx);const d=Math.min(38,Math.hypot(s.cx-s.bx,s.cy-s.by));ctx.beginPath();ctx.arc(x+Math.cos(ang)*d,y+Math.sin(ang)*d,17,0,Math.PI*2);ctx.fillStyle=col+'88';ctx.fill();}
  ctx.globalAlpha=1;ctx.fillStyle='#aaa';ctx.font='10px Arial';ctx.textAlign='center';ctx.fillText(lbl,x,y+63);ctx.restore();
}
function drawSPBtn(x,y,s){
  const ready=player&&player.spGauge>=player.spMax;
  ctx.save();ctx.globalAlpha=.75;
  ctx.beginPath();ctx.arc(x,y,38,0,Math.PI*2);ctx.fillStyle=ready?'rgba(200,100,255,.35)':'rgba(0,0,0,.3)';ctx.fill();
  ctx.strokeStyle=ready?'#d8b4fe':'#a06';ctx.lineWidth=2.5;ctx.stroke();
  if(s.a){ctx.fillStyle='rgba(200,100,255,.6)';ctx.beginPath();ctx.arc(x,y,19,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;ctx.fillStyle=ready?'#d8b4fe':'#888';ctx.font=ready?'bold 9px Arial':'8px Arial';ctx.textAlign='center';
  ctx.fillText('特殊',x,y+4);if(ready)ctx.fillText('OK!',x,y+15);ctx.restore();
}
function drawMM(){
  const mw=95,mh=95,mx=14,my=14;
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(mx,my,mw,mh);ctx.strokeStyle='#445';ctx.lineWidth=1;ctx.strokeRect(mx,my,mw,mh);
  const sx=mw/W.w,sy=mh/W.h;
  ctx.fillStyle='#445';walls.forEach(w=>{if(w.active&&w.hp>0)ctx.fillRect(mx+w.x*sx,my+w.y*sy,Math.max(1,w.w*sx),Math.max(1,w.h*sy));});
  const dot=(a,c)=>{if(!a||a.dead)return;ctx.fillStyle=c;ctx.beginPath();ctx.arc(mx+a.x*sx,my+a.y*sy,3.5,0,Math.PI*2);ctx.fill();};
  if(gMode==='br')allUnits.forEach(a=>dot(a,a===player?'#0ff':'#f88'));
  else{dot(player,'#0ff');allies.forEach(a=>dot(a,'#0f0'));enemies.forEach(e=>dot(e,'#f44'));sovietBots.forEach(b=>dot(b,b.team===TEAM.E?'#f44':'#4f4'));}
  if(ball){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(mx+ball.x*sx,my+ball.y*sy,4,0,Math.PI*2);ctx.fill();}
}
function drawSPBar(){
  if(!player||player.dead)return;
  const gw=148,gh=11,gx=canvas.width-gw-14,gy=118;
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(gx-3,gy-3,gw+6,gh+28);
  ctx.fillStyle='#222';ctx.fillRect(gx,gy,gw,gh);
  const r=player.spGauge/player.spMax;ctx.fillStyle=r>=1?'#d8b4fe':'#7c3aed';ctx.fillRect(gx,gy,gw*r,gh);
  ctx.fillStyle=r>=1?'#fff':'#aaa';ctx.font='10px Arial';ctx.textAlign='left';
  ctx.fillText(r>=1?`✦ ${CHARS[player.type].spName}`:`SP: ${Math.floor(r*100)}% — ${CHARS[player.type].spName}`,gx,gy+gh+12);
}

buildHomeUI();
</script>
