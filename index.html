<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Brawl Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Courier New', sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- ゲーム設定 ---
        const WORLD = { w: 3000, h: 3000, grid: 100 };
        const RESPAWN_MS = 5000;

        const CHAR_CONFIG = {
            soviet: { hp: 8000, speed: 2.8, size: 55, color: "#cc0000", symbol: "★", reload: 2200 },
            usa: { hp: 4500, speed: 4.5, size: 40, color: "#3c3b6e", symbol: "|||", reload: 1800 }
            // 他の国も同様のデータ構造で追加可能
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- クラス定義 ---

        class Wall {
            constructor(x, y, w, h, type) {
                this.x = x; this.y = y; this.w = w; this.h = h;
                this.type = type; // 0:破壊不可, 1:弾貫通, 2:破壊可能
                this.hp = 1500;
                this.alive = true;
            }
            draw(camX, camY) {
                if (!this.alive) return;
                ctx.fillStyle = this.type === 0 ? "#444" : (this.type === 1 ? "rgba(100,200,100,0.4)" : "#8b4513");
                ctx.strokeStyle = "#000";
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.strokeRect(this.x, this.y, this.w, this.h);
            }
        }

        class Bullet {
            constructor(x, y, angle, speed, range, dmg, owner, color="yellow") {
                this.x = x; this.y = y; this.sx = x; this.sy = y;
                this.angle = angle; this.speed = speed; this.range = range;
                this.dmg = dmg; this.owner = owner; this.color = color;
                this.active = true;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                if (Math.hypot(this.x - this.sx, this.y - this.sy) > this.range) this.active = false;
                
                // 壁衝突
                for (let w of walls) {
                    if (!w.alive || w.type === 1) continue;
                    if (this.x > w.x && this.x < w.x+w.w && this.y > w.y && this.y < w.y+w.h) {
                        if (w.type === 2) w.hp -= this.dmg;
                        if (w.hp <= 0) w.alive = false;
                        this.active = false;
                    }
                }
            }
        }

        class Actor {
            constructor(x, y, team, type) {
                this.x = x; this.y = y; this.team = team; this.type = type;
                const conf = CHAR_CONFIG[type];
                this.hp = conf.hp; this.maxHp = conf.hp;
                this.speed = conf.speed; this.size = conf.size;
                this.ammo = 3; this.ult = 0;
                this.lastReload = Date.now();
                this.dead = false; this.deathT = 0;
                this.atkStep = 0;
            }

            update(angle, moving) {
                if (this.dead) {
                    if (Date.now() - this.deathT > RESPAWN_MS) {
                        this.dead = false; this.hp = this.maxHp; this.x = (this.team==="player"?500:2500);
                    }
                    return;
                }

                // リロード
                if (this.ammo < 3 && Date.now() - this.lastReload > CHAR_CONFIG[this.type].reload) {
                    this.ammo++; this.lastReload = Date.now();
                }

                if (moving) {
                    let nextX = this.x + Math.cos(angle) * this.speed;
                    let nextY = this.y + Math.sin(angle) * this.speed;
                    
                    // 壁衝突判定（スライド移動対応）
                    if (!this.isColliding(nextX, this.y)) this.x = nextX;
                    if (!this.isColliding(this.x, nextY)) this.y = nextY;
                }
            }

            isColliding(nx, ny) {
                if (nx < 0 || nx > WORLD.w || ny < 0 || ny > WORLD.h) return true;
                for (let w of walls) {
                    if (!w.alive) continue;
                    if (nx+this.size/2 > w.x && nx-this.size/2 < w.x+w.w && 
                        ny+this.size/2 > w.y && ny-this.size/2 < w.y+w.h) return true;
                }
                return false;
            }

            draw() {
                if (this.dead) return;
                const conf = CHAR_CONFIG[this.type];
                
                // 足元の国マーク
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.beginPath(); ctx.arc(0, 0, this.size, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.fill();
                ctx.fillStyle = conf.color; ctx.font = "bold 20px Arial";
                ctx.textAlign = "center"; ctx.fillText(conf.symbol, 0, 7);
                ctx.restore();

                // 頭上UI
                ctx.fillStyle = "white"; ctx.textAlign = "center";
                ctx.fillText(`HP: ${Math.floor(this.hp)}`, this.x, this.y - this.size - 20);
                // 弾数表示
                for(let i=0; i<3; i++) {
                    ctx.fillStyle = i < this.ammo ? "#ffee00" : "#555";
                    ctx.fillRect(this.x - 25 + i*18, this.y - this.size - 10, 15, 5);
                }
            }
        }

        // --- インスタンス生成 ---
        let player = new Actor(500, 1500, "player", "soviet");
        let enemies = [new Actor(2500, 1500, "enemy", "usa")];
        let bullets = [];
        let walls = [
            new Wall(1000, 500, 80, 2000, 0),
            new Wall(1400, 1200, 400, 60, 1),
            new Wall(1200, 1000, 150, 150, 2)
        ];

        // --- スティック管理 ---
        let sticks = {
            move: { active: false, id: null, bx: 0, by: 0, cx: 0, cy: 0 },
            atk:  { active: false, id: null, bx: 0, by: 0, cx: 0, cy: 0 },
            ult:  { active: false, id: null, bx: 0, by: 0, cx: 0, cy: 0 }
        };

        canvas.addEventListener("touchstart", (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < canvas.width / 2) startStick('move', t);
                else if (t.clientY > canvas.height / 2) startStick('atk', t);
                else startStick('ult', t);
            }
        });

        function startStick(k, t) {
            sticks[k].active = true; sticks[k].id = t.identifier;
            sticks[k].bx = sticks[k].cx = t.clientX; sticks[k].by = sticks[k].cy = t.clientY;
        }

        canvas.addEventListener("touchmove", (e) => {
            for (let t of e.changedTouches) {
                for (let k in sticks) if (sticks[k].id === t.identifier) {
                    sticks[k].cx = t.clientX; sticks[k].cy = t.clientY;
                }
            }
        });

        canvas.addEventListener("touchend", (e) => {
            for (let t of e.changedTouches) {
                for (let k in sticks) if (sticks[k].id === t.identifier) {
                    if (k !== 'move') fire(player, sticks[k], k === 'ult');
                    sticks[k].active = false; sticks[k].id = null;
                }
            }
        });

        function fire(a, s, isUlt) {
            if (a.dead || (!isUlt && a.ammo <= 0) || (isUlt && a.ult < 100)) return;
            const angle = Math.atan2(s.cy - s.by, s.cx - s.bx);
            
            // ソビエト通常攻撃ロジック
            if (a.type === 'soviet' && !isUlt) {
                if (a.atkStep === 0) bullets.push(new Bullet(a.x, a.y, angle, 10, 300, 800, a));
                else if (a.atkStep === 1) bullets.push(new Bullet(a.x, a.y, angle, 12, 250, 1000, a));
                else bullets.push(new Bullet(a.x, a.y, angle, 15, 600, 1200, a));
                a.atkStep = (a.atkStep + 1) % 3;
            } else if (isUlt) {
                // 特殊攻撃（暫定：巨大弾）
                bullets.push(new Bullet(a.x, a.y, angle, 8, 800, 2000, a, "orange"));
                a.ult = 0;
            } else {
                bullets.push(new Bullet(a.x, a.y, angle, 14, 500, 400, a));
            }
            if (!isUlt) a.ammo--;
        }

        // --- メインループ ---
        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. AIロジック（壁回避）
            enemies.forEach(en => {
                if (en.dead) return en.update(0, false);
                let dist = Math.hypot(player.x - en.x, player.y - en.y);
                let angle = Math.atan2(player.y - en.y, player.x - en.x);
                
                // 壁回避：進行方向に壁があるか先読み
                if (en.isColliding(en.x + Math.cos(angle)*20, en.y + Math.sin(angle)*20)) {
                    angle += Math.PI / 2; // 横に避ける
                }
                
                if (dist > 400) en.update(angle, true);
                else if (Math.random() < 0.05) fire(en, {bx:0,by:0,cx:Math.cos(angle),cy:Math.sin(angle)}, false);
            });

            // 2. プレイヤー更新
            if (sticks.move.active) {
                player.update(Math.atan2(sticks.move.cy-sticks.move.by, sticks.move.cx-sticks.move.bx), true);
            } else { player.update(0, false); }

            // 3. 描画（カメラ）
            ctx.save();
            ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);
            
            // 床
            ctx.fillStyle = "#1a331a"; ctx.fillRect(0,0,WORLD.w,WORLD.h);
            ctx.strokeStyle = "#142614";
            for(let x=0; x<WORLD.w; x+=WORLD.grid) {
                ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,WORLD.h); ctx.stroke();
            }

            // 弾軌道ガイド（エイム）
            ['atk', 'ult'].forEach(k => {
                if (sticks[k].active) {
                    const angle = Math.atan2(sticks[k].cy-sticks[k].by, sticks[k].cx-sticks[k].bx);
                    ctx.setLineDash([10, 10]); ctx.strokeStyle = k==='ult'?"rgba(255,0,0,0.5)":"rgba(255,255,255,0.3)";
                    ctx.beginPath(); ctx.moveTo(player.x, player.y);
                    ctx.lineTo(player.x + Math.cos(angle)*500, player.y + Math.sin(angle)*500);
                    ctx.stroke(); ctx.setLineDash([]);
                }
            });

            walls.forEach(w => w.draw());
            
            bullets = bullets.filter(b => {
                b.update();
                let targets = b.owner.team === 'player' ? enemies : [player];
                for (let t of targets) {
                    if (!t.dead && Math.hypot(b.x-t.x, b.y-t.y) < t.size) {
                        t.hp -= b.dmg;
                        if (b.owner.team === 'player') b.owner.ult = Math.min(100, b.owner.ult + 8);
                        if (t.hp <= 0) { t.dead = true; t.deathT = Date.now(); }
                        return false;
                    }
                }
                ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill();
                return b.active;
            });

            player.draw();
            enemies.forEach(e => e.draw());
            ctx.restore();

            // 4. 固定UIスティック
            drawStick('move', sticks.move, "#fff");
            drawStick('atk', sticks.atk, "#ffee00");
            drawStick('ult', sticks.ult, player.ult >= 100 ? "#f00" : "#555", player.ult);

            requestAnimationFrame(loop);
        }

        function drawStick(k, s, color, progress = null) {
            const x = k==='move' ? 120 : (canvas.width - 120);
            const y = k==='ult' ? 120 : (canvas.height - 150);
            
            ctx.beginPath(); ctx.arc(x, y, 60, 0, Math.PI*2);
            ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.stroke();
            
            if (progress !== null) {
                ctx.beginPath(); ctx.arc(x, y, 60, -Math.PI/2, -Math.PI/2 + (Math.PI*2*(progress/100)));
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 8; ctx.stroke();
            }

            if (s.active) {
                const dx = s.cx - s.bx; const dy = s.cy - s.by;
                const dist = Math.min(Math.hypot(dx, dy), 60);
                const ang = Math.atan2(dy, dx);
                ctx.beginPath(); ctx.arc(x + Math.cos(ang)*dist, y + Math.sin(ang)*dist, 30, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.fill();
            }
        }

        loop();
    </script>
</body>
</html>
