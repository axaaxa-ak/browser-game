<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Global Brawl: Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;overflow:hidden;touch-action:none;font-family:'Arial Rounded MT Bold',Arial,sans-serif;user-select:none}
canvas{display:block}
/* ── HOME ── */
#home{position:absolute;inset:0;background:linear-gradient(160deg,#1a0a2e,#0a1a2e);display:flex;flex-direction:column;align-items:center;padding:10px;overflow-y:auto;z-index:20;color:#fff;gap:6px}
#home.H{display:none!important}
.htitle{color:#ffcc00;font-size:20px;text-align:center;font-weight:900;text-shadow:0 3px 0 #aa6600,0 0 20px #ffaa00}
.mrow{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.mbtn{padding:6px 11px;background:rgba(255,255,255,.08);border:2px solid #555;border-radius:20px;color:#aaa;cursor:pointer;font-size:10px;font-weight:bold}
.mbtn.on,.mbtn:hover{border-color:#ffcc00;color:#ffcc00;background:rgba(255,204,0,.12)}
.fbtn{padding:3px 9px;background:rgba(255,255,255,.06);border:1.5px solid #444;border-radius:12px;color:#666;cursor:pointer;font-size:9px;font-weight:bold}
.fbtn.on{border-color:#4af;color:#4af;background:rgba(68,170,255,.1)}
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;max-width:620px;width:100%}
.cbtn{padding:8px 3px;background:rgba(255,255,255,.05);border:2.5px solid #333;border-radius:10px;cursor:pointer;text-align:center;transition:.12s}
.cbtn:hover{border-color:#ffcc00;transform:scale(1.04)}.cbtn.sel{border-color:#0af;background:rgba(0,170,255,.12)}
.cbtn .sy{font-size:16px;font-weight:bold;display:block;color:#fff}
.cbtn .nm{font-size:9px;font-weight:bold;display:block;color:#ddd}
.cbtn .tp{font-size:7px;color:#777;display:block}
.cbtn .sk{font-size:7px;color:#b09;display:block}
.sbtn{padding:12px 36px;font-size:16px;cursor:pointer;background:linear-gradient(180deg,#ffee44,#ffaa00);border:none;border-radius:24px;color:#5a2d00;font-weight:900;text-shadow:0 1px 0 rgba(255,255,255,.4);box-shadow:0 4px 0 #aa6600,0 6px 12px rgba(0,0,0,.4)}
.sbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #aa6600}
.sec{width:100%;max-width:620px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:8px}
.sec h3{color:#ffcc00;font-size:10px;margin-bottom:5px;font-weight:900}
.sl{font-size:9px;color:#666;margin-bottom:3px;display:block}
/* ── OVERLAYS ── */
.ov{position:absolute;inset:0;display:none;justify-content:center;align-items:center;z-index:30;flex-direction:column;color:#fff;text-align:center}
.ov.show{display:flex;pointer-events:all}
.ovb{background:rgba(0,0,0,.88);padding:22px 30px;border-radius:16px;border:2px solid rgba(255,255,255,.15)}
.rbtn{margin-top:12px;padding:10px 26px;font-size:14px;cursor:pointer;background:linear-gradient(180deg,#ffee44,#ffaa00);border:none;border-radius:20px;color:#5a2d00;font-weight:900}
#sb{position:absolute;top:0;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);padding:4px 18px;border-radius:0 0 12px 12px;color:#fff;font-size:14px;font-weight:bold;z-index:15;display:none}
/* ── PRE-MATCH ── */
#pm{position:absolute;inset:0;background:linear-gradient(160deg,#1a0a2e,#0a1a2e);display:none;justify-content:center;align-items:center;flex-direction:column;z-index:25;color:#fff}
#pm h2{color:#ffcc00;font-size:22px;margin-bottom:16px;font-weight:900;text-shadow:0 3px 0 #aa6600}
.pmrow{display:flex;gap:24px;margin-bottom:20px;align-items:center}
.pmteam{text-align:center}
.pmteam h3{font-size:12px;margin-bottom:8px;font-weight:bold}
.pmchars{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:240px}
.pmchar{padding:8px;background:rgba(255,255,255,.07);border-radius:10px;border:2px solid #333;text-align:center;min-width:52px}
.pmchar .psy{font-size:20px;display:block}
.pmchar .pnm{font-size:8px;color:#aaa;display:block;margin-top:2px}
#pmc{font-size:56px;font-weight:900;color:#ffcc00;text-shadow:0 4px 0 #aa6600}
</style>
</head>
<body>
<div id="home">
  <div class="htitle">⭐ GLOBAL BRAWL: PRO ⭐</div>
  <div class="mrow" id="modeRow"></div>
  <div class="sec"><h3>タイプ絞り込み</h3><div class="mrow" id="filterRow"></div></div>
  <div class="cgrid" id="charGrid"></div>
  <div class="sec" id="teamSec" style="display:none">
    <h3>セレクトモード</h3>
    <span class="sl">味方1</span><div class="cgrid" id="a1g"></div>
    <span class="sl" style="margin-top:5px">味方2</span><div class="cgrid" id="a2g"></div>
    <span class="sl" style="margin-top:5px">敵1</span><div class="cgrid" id="e1g"></div>
    <span class="sl" style="margin-top:5px">敵2</span><div class="cgrid" id="e2g"></div>
    <span class="sl" style="margin-top:5px">敵3</span><div class="cgrid" id="e3g"></div>
  </div>
  <button class="sbtn" id="startBtn">PLAY!</button>
</div>
<div id="sb"></div>
<div id="pm">
  <h2>GLOBAL BRAWL: PRO</h2>
  <div class="pmrow">
    <div class="pmteam"><h3 style="color:#5df">味方チーム</h3><div class="pmchars" id="pmA"></div></div>
    <div style="font-size:28px;color:#f55;font-weight:900">VS</div>
    <div class="pmteam"><h3 style="color:#f55">敵チーム</h3><div class="pmchars" id="pmE"></div></div>
  </div>
  <div id="pmc">3</div>
</div>
<div class="ov" id="deadOv"><div class="ovb"><h2 id="dTtl" style="font-size:32px;color:#f44"></h2><p id="dMsg" style="font-size:14px;margin-top:7px"></p><button class="rbtn" id="dRBtn" style="display:none" onclick="location.reload()">タイトルへ</button></div></div>
<div class="ov" id="winOv"><div class="ovb"><h2 id="wTtl" style="font-size:32px;color:#ffcc00"></h2><p id="wMsg" style="font-size:14px;margin-top:7px"></p><button class="rbtn" onclick="location.reload()">タイトルへ</button></div></div>
<canvas id="canvas"></canvas>
<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const TEAM={P:0,A:1,E:2,N:3};
const TILE=80;
const SPD={u2:5.0,u:4.4,f:3.8,mf:3.3,n:2.9,s:2.5,vs:2.2};

// Character data (from spreadsheet)
const CD={
  soviet:{name:'ソビエト',type:'コントローラー',sym:'★',col:'#cc1111',sz:60,spd:SPD.s,hp:14500,am:3,rt:90,spMax:4500,spName:'赤い津波',color2:'#880000'},
  usa:   {name:'アメリカ',type:'アタッカー',sym:'A',col:'#3a6090',sz:46,spd:SPD.n,hp:11000,am:3,rt:55,spMax:4000,spName:'空爆',color2:'#1a3060'},
  uk:    {name:'イギリス',type:'スナイパー',sym:'K',col:'#1133aa',sz:24,spd:SPD.f,hp:6700,am:3,rt:110,spMax:3000,spName:'英海峡',color2:'#002299'},
  france:{name:'フランス',type:'タンク',sym:'F',col:'#2244cc',sz:38,spd:SPD.n,hp:12500,am:3,rt:50,spMax:3500,spName:'革命',color2:'#001199'},
  germany:{name:'ドイツ',type:'アタッカー',sym:'G',col:'#666',sz:38,spd:SPD.mf,hp:8000,am:3,rt:90,spMax:3500,spName:'電撃作戦',color2:'#333'},
  japan: {name:'日本',type:'アサシン',sym:'J',col:'#eee',sz:36,spd:SPD.f,hp:8600,am:2,rt:90,spMax:3000,spName:'大和魂',color2:'#ccc'},
  italy: {name:'イタリア',type:'アタッカー',sym:'I',col:'#009246',sz:38,spd:SPD.f,hp:7600,am:1,rt:340,spMax:3500,spName:'美食家',color2:'#006030'},
  china: {name:'中国',type:'アタッカー',sym:'C',col:'#DD2020',sz:46,spd:SPD.n,hp:13500,am:3,rt:100,spMax:3500,spName:'ゲリラ戦',color2:'#990000'},
  canada:{name:'カナダ',type:'サポーター',sym:'M',col:'#cc0000',sz:46,spd:SPD.vs,hp:14000,am:3,rt:100,spMax:4000,spName:'シロップの海',color2:'#880000'},
  finland:{name:'フィンランド',type:'スナイパー',sym:'S',col:'#114488',sz:36,spd:SPD.n,hp:7200,am:3,rt:90,spMax:3000,spName:'白い死神',color2:'#002266'},
  belgium:{name:'ベルギー',type:'サポーター',sym:'B',col:'#ddaa00',sz:26,spd:SPD.mf,hp:8000,am:3,rt:90,spMax:3500,spName:'手刈り',color2:'#886600'},
  netherlands:{name:'オランダ',type:'アタッカー',sym:'N',col:'#ee5500',sz:26,spd:SPD.u2,hp:9900,am:1,rt:55,spMax:3000,spName:'洪水線',color2:'#993300'},
  luxembourg:{name:'ルクセンブルク',type:'アサシン',sym:'L',col:'#EF3340',sz:16,spd:SPD.u2,hp:6000,am:3,rt:55,spMax:2500,spName:'空挺降下',color2:'#aa1122'}
};
const CKEYS=Object.keys(CD);
const TYPES=['全て','アタッカー','アサシン','スナイパー','タンク','サポーター','コントローラー'];

// World sizes
const WN={w:2000,h:2800};
const WSC={w:3200,h:2000};
const WBR={w:3600,h:3600};
let W=WN;

// ═══════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════
let gMode='normal',gState='home';
let player=null,allies=[],enemies=[],allUnits=[];
let projectiles=[],areas=[],items=[],walls=[],tiles=[];
let ball=null,soccerBounds=null;
let cam={x:1000,y:1400};
let FC=0;
let sovietBots=[];
let koRound=1,koWins=[0,0];
let soccerScore=[0,0];
let killLog=[],dmgNums=[];
let spTarget={x:1000,y:1400};
let selMode='normal',selChar='usa';
let selTeam={a1:'random',a2:'random',e1:'random',e2:'random',e3:'random'};
let crystals={p:null,e:null};
let terrGauge={p:0,e:0};
let pointScore={p:0,e:0};
let unitPoints={};
let mapKey='normalA';
let curFilter='全て';
const REC=[.20,.15,.15,.10,.10,.10,.10,.05,.05];

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
window.addEventListener('resize',resize);resize();
const dst=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const dst2=(ax,ay,bx,by)=>(ax-bx)**2+(ay-by)**2;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;};
const rnd=a=>a[0|Math.random()*a.length];
const ptInR=(x,y,rx,ry,rw,rh)=>x>=rx&&x<=rx+rw&&y>=ry&&y<=ry+rh;
const rcOv=(wx,wy,ww,wh,cx,cy,r)=>{const nx=clamp(cx,wx,wx+ww),ny=clamp(cy,wy,wy+wh);return(cx-nx)**2+(cy-ny)**2<r*r;};

function foes(ac){
  if(!ac)return[];
  if(gMode==='br')return allUnits.filter(a=>a!==ac&&!a.dead);
  return ac.team===TEAM.E?[player,...allies].filter(a=>a&&!a.dead):enemies.filter(a=>!a.dead);
}
function frds(ac){
  if(!ac)return[];
  if(gMode==='br')return[];
  return ac.team===TEAM.E?enemies.filter(a=>!a.dead&&a!==ac):[player,...allies].filter(a=>a&&!a.dead&&a!==ac);
}
function addKillLog(msg,side){killLog.push({msg,side,t:280});}
function addDmg(x,y,val,col='#fff'){
  dmgNums.push({x,y:y-20,vy:-1.2,val:Math.round(val),t:70,col});
}

// ═══════════════════════════════════════════
// MAP DATA (tile-based)
// ═══════════════════════════════════════════
const T_=(x,y,w,h,t)=>({x:x*TILE,y:y*TILE,w:w*TILE,h:h*TILE,tp:t,brk:t==='b',absorb:t==='a',hp:t==='b'?2000:Infinity,maxHp:t==='b'?2000:Infinity,active:true});
const MAP_DATA={
  normalA:()=>[
    T_(0,0,25,1,'s'),T_(0,34,25,1,'s'),T_(0,0,1,35,'s'),T_(24,0,1,35,'s'),
    T_(11,10,1,4,'a'),T_(13,10,1,4,'a'),T_(11,21,1,4,'a'),T_(13,21,4,'s'),
    T_(4,5,1,3,'b'),T_(4,12,2,1,'b'),T_(4,19,1,3,'b'),T_(4,26,2,1,'b'),
    T_(19,5,1,3,'b'),T_(19,12,2,1,'b'),T_(19,19,1,3,'b'),T_(19,26,2,1,'b'),
    T_(7,8,2,1,'s'),T_(16,8,2,1,'s'),T_(7,26,2,1,'s'),T_(16,26,2,1,'s'),
    T_(9,15,3,1,'b'),T_(13,19,3,1,'b'),
  ],
  normalB:()=>[
    T_(0,0,25,1,'s'),T_(0,34,25,1,'s'),T_(0,0,1,35,'s'),T_(24,0,1,35,'s'),
    T_(11,10,1,5,'a'),T_(13,10,1,5,'a'),T_(11,20,1,5,'a'),T_(13,20,1,5,'a'),
    T_(3,6,2,1,'b'),T_(3,14,1,2,'b'),T_(3,22,2,1,'b'),T_(3,28,1,2,'b'),
    T_(20,6,2,1,'b'),T_(21,14,1,2,'b'),T_(20,22,2,1,'b'),T_(21,28,1,2,'b'),
    T_(6,10,1,4,'s'),T_(18,10,1,4,'s'),T_(6,21,1,4,'s'),T_(18,21,1,4,'s'),
    T_(10,17,5,1,'b'),
  ],
  soccerA:()=>[
    T_(0,0,40,1,'s'),T_(0,24,40,1,'s'),
    T_(0,0,1,9,'s'),T_(0,16,1,9,'s'),
    T_(39,0,1,9,'s'),T_(39,16,1,9,'s'),
    T_(18,9,4,7,'s'),
  ],
  brA:()=>{const r=[];
    r.push(T_(0,0,45,1,'s'),T_(0,44,45,1,'s'),T_(0,0,1,45,'s'),T_(44,0,1,45,'s'));
    [[4,4,2,4],[4,10,4,2],[4,20,2,6],[4,32,4,2],[4,38,2,4],
     [39,4,2,4],[37,10,4,2],[39,20,2,6],[37,32,4,2],[39,38,2,4],
     [10,8,2,5],[10,14,5,2],[10,28,2,5],[10,32,5,2],
     [33,8,2,5],[30,14,5,2],[33,28,2,5],[30,32,5,2],
     [18,18,9,9],[15,20,3,5],[27,20,3,5]].forEach(([x,y,w,h])=>r.push(T_(x,y,w,h,'s')));
    [[8,18,2,5],[35,18,2,5],[18,8,5,2],[18,35,5,2]].forEach(([x,y,w,h])=>r.push(T_(x,y,w,h,'b')));
    return r;},
};
MAP_DATA.crystalA=()=>[...MAP_DATA.normalA()];
MAP_DATA.territoryA=()=>[...MAP_DATA.normalA()];
MAP_DATA.pointKoA=()=>[...MAP_DATA.normalB()];

function buildMap(key){
  W=key.startsWith('soccer')?WSC:key.startsWith('br')?WBR:WN;
  walls=(MAP_DATA[key]||MAP_DATA.normalA)();
  soccerBounds=null;tiles=[];
  if(key.startsWith('soccer')){
    soccerBounds={ox:TILE,oy:TILE,fw:W.w-2*TILE,fh:W.h-2*TILE};
    soccerBounds.gy0=soccerBounds.oy+soccerBounds.fh/2-350;
    soccerBounds.gy1=soccerBounds.oy+soccerBounds.fh/2+350;
  }
}
function wallColChar(nx,ny,sz){
  for(const w of walls){if(!w.active||w.hp<=0||w.absorb)continue;if(nx+sz>w.x&&nx-sz<w.x+w.w&&ny+sz>w.y&&ny-sz<w.y+w.h)return w;}
  return null;
}
function wallColBullet(x,y){
  for(const w of walls){if(!w.active||w.hp<=0||w.brk)continue;if(ptInR(x,y,w.x,w.y,w.w,w.h))return w;}
  return null;
}

// Tile system
function worldToTG(x,y){return{gx:Math.floor(x/TILE)*TILE,gy:Math.floor(y/TILE)*TILE};}
function setTile(x,y,type,ownerId,dur){
  const{gx,gy}=worldToTG(x,y);const ei=tiles.findIndex(t=>t.gx===gx&&t.gy===gy);
  if(ei>=0)tiles[ei]={gx,gy,type,ownerId,timer:dur};else tiles.push({gx,gy,type,ownerId,timer:dur});
}
function tilesAt(actor){
  const r=actor.sz,res=[];
  const xs=new Set([Math.floor((actor.x-r)/TILE)*TILE,Math.floor(actor.x/TILE)*TILE,Math.floor((actor.x+r)/TILE)*TILE]);
  const ys=new Set([Math.floor((actor.y-r)/TILE)*TILE,Math.floor(actor.y/TILE)*TILE,Math.floor((actor.y+r)/TILE)*TILE]);
  xs.forEach(gx=>ys.forEach(gy=>tiles.forEach(t=>{if(t.gx===gx&&t.gy===gy)res.push(t);})));
  return res;
}

// ═══════════════════════════════════════════
// PROJECTILES
// ═══════════════════════════════════════════
class Bullet{
  constructor(x,y,ang,spd,range,dmg,owner,r=8,col='#ffe040',fromSP=false){
    Object.assign(this,{x,y,sx:x,sy:y,ang,spd,range,dmg,owner,r,col,fromSP,active:true,trail:[]});
  }
  update(){
    this.trail.push({x:this.x,y:this.y});if(this.trail.length>7)this.trail.shift();
    this.x+=Math.cos(this.ang)*this.spd;this.y+=Math.sin(this.ang)*this.spd;
    if(this.x<-50||this.x>W.w+50||this.y<-50||this.y>W.h+50){this.active=false;return;}
    if(dst2(this.x,this.y,this.sx,this.sy)>this.range**2){this.active=false;return;}
    if(wallColBullet(this.x,this.y)){this.active=false;return;}
    for(const f of foes(this.owner)){
      if(!f.dead&&dst2(this.x,this.y,f.x,f.y)<(f.sz+this.r)**2){f.takeDmg(this.dmg,this.owner,this.fromSP);this.active=false;return;}
    }
  }
  draw(){
    // Trail
    if(this.trail.length>1){
      ctx.save();ctx.lineCap='round';ctx.lineWidth=this.r*1.2;
      for(let i=1;i<this.trail.length;i++){
        ctx.globalAlpha=(i/this.trail.length)*.35;ctx.strokeStyle=this.col;
        ctx.beginPath();ctx.moveTo(this.trail[i-1].x,this.trail[i-1].y);ctx.lineTo(this.trail[i].x,this.trail[i].y);ctx.stroke();
      }
      ctx.restore();
    }
    // Bullet
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=this.col;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.5;ctx.stroke();
    // Glow
    ctx.save();ctx.globalAlpha=.2;ctx.beginPath();ctx.arc(this.x,this.y,this.r*2.5,0,Math.PI*2);ctx.fillStyle=this.col;ctx.fill();ctx.restore();
  }
}
class FadeBullet extends Bullet{
  update(){
    this.trail.push({x:this.x,y:this.y});if(this.trail.length>5)this.trail.shift();
    this.x+=Math.cos(this.ang)*this.spd;this.y+=Math.sin(this.ang)*this.spd;
    if(dst2(this.x,this.y,this.sx,this.sy)>this.range**2){this.active=false;return;}
    if(wallColBullet(this.x,this.y)){this.active=false;return;}
    const ratio=Math.sqrt(dst2(this.x,this.y,this.sx,this.sy))/this.range;
    for(const f of foes(this.owner)){if(!f.dead&&dst2(this.x,this.y,f.x,f.y)<(f.sz+this.r)**2){f.takeDmg(this.dmg*(1-ratio*.5),this.owner,this.fromSP);this.active=false;return;}}
  }
}
class ExpBullet extends Bullet{
  constructor(x,y,ang,spd,range,dmg,owner,er,col='#ff8800'){super(x,y,ang,spd,range,dmg,owner,11,col);this.er=er;}
  update(){
    this.x+=Math.cos(this.ang)*this.spd;this.y+=Math.sin(this.ang)*this.spd;
    let hit=dst2(this.x,this.y,this.sx,this.sy)>this.range**2||wallColBullet(this.x,this.y);
    if(!hit)for(const f of foes(this.owner)){if(!f.dead&&dst2(this.x,this.y,f.x,f.y)<(f.sz+12)**2){hit=true;break;}}
    if(hit){areas.push(new Area(this.x,this.y,'expl',this.owner,this.er,this.dmg*.8,18));walls.forEach(w=>{if(w.brk&&w.active&&w.hp>0&&rcOv(w.x,w.y,w.w,w.h,this.x,this.y,this.er))w.hp-=1500;});this.active=false;}
  }
  draw(){
    ctx.fillStyle=this.col;ctx.beginPath();ctx.arc(this.x,this.y,11,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ffcc00';ctx.lineWidth=2.5;ctx.stroke();
  }
}
class Boomerang{

const THROW_SPD=12;
class Thrown{
  constructor(sx,sy,tx,ty,owner,aType,radius,dmg){

class Area{
  constructor(x,y,type,owner,radius,dmg,dur,ang,ref){
    Object.assign(this,{x,y,type,owner,radius,dmg,dur,ang:ang||0,f:0,active:true,hs:new Set(),ex:{},follow:(type==='pizza'||type==='channel'||type==='bliz')});
  }
  update(){
    this.f++;if(this.f>this.dur){this.active=false;return;}
    if(this.follow&&this.owner){if(this.owner.dead&&this.type!=='bliz'){this.active=false;return;}this.x=this.owner.x;this.y=this.owner.y;}
    const T=this.type,fo=foes(this.owner),fr=frds(this.owner);
    if(T==='shock'){fo.forEach(f=>{if(!f.dead&&!this.hs.has(f)&&dst(this,f)<this.radius+f.sz){f.takeDmg(this.dmg,this.owner,true);this.hs.add(f);}});}
    else if(T==='expl'){fo.forEach(f=>{if(!f.dead&&!this.hs.has(f)&&dst(this,f)<this.radius+f.sz){f.takeDmg(this.dmg,this.owner,true);this.hs.add(f);}});walls.forEach(w=>{if(w.brk&&w.active&&w.hp>0&&rcOv(w.x,w.y,w.w,w.h,this.x,this.y,this.radius))w.hp-=600;});}
    else if(T==='slash'){fo.forEach(f=>{if(!f.dead&&!this.hs.has(f)){const a=Math.atan2(f.y-this.y,f.x-this.x),da=Math.abs(((a-this.ang+Math.PI*3)%(Math.PI*2))-Math.PI);if(dst(this,f)<this.radius+f.sz&&da<Math.PI/1.7){f.takeDmg(this.dmg,this.owner);this.hs.add(f);if(this.silenceHit)f.silenced=180;}}});}
    else if(T==='pizza'){if(this.f%15===0)fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz)f.takeDmg(this.dmg,this.owner);});}
    else if(T==='channel'){
      projectiles.forEach(p=>{if(p.owner&&p.owner.team!==this.owner.team&&dst({x:p.x,y:p.y},this)<this.radius)p.active=false;});
      if(this.f%18===0)fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz){f.takeDmg(this.dmg,this.owner,true);const a=Math.atan2(f.y-this.y,f.x-this.x);const kx=f.x+Math.cos(a)*20,ky=f.y+Math.sin(a)*20;if(wallColChar(kx,ky,f.sz))f.state={t:'stun',f:18};else{f.x=kx;f.y=ky;}}});
    }
    else if(T==='maple'){if(this.f%27===0){fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz){f.takeDmg(this.dmg,this.owner);f.slowF=.5;f.slowT=60;}});fr.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz)f.hp=Math.min(f.maxHp,f.hp+750);});}}
    else if(T==='syrup'){if(this.f%20===0){fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz){f.slowF=.45;f.slowT=90;}});fr.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz){const k='h'+f.id;if(!this.ex[k]){f.hp=Math.min(f.maxHp,f.hp+4500);this.ex[k]=true;}else f.hp=Math.min(f.maxHp,f.hp+250);}});}}
    else if(T==='bliz'){if(this.f%60===0)fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius)f.takeDmg(this.dmg,this.owner,true);});fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius){f.slowF=.55;f.slowT=90;}});}
    else if(T==='wflag'){if(this.f>=this.dur-4)fr.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius){f.hp=f.maxHp;f.x=f.team===TEAM.E?W.w-200:200;f.y=W.h/2;}});}
    else if(T==='lux_land'){if(!this.hs.size)fo.forEach(f=>{if(!f.dead&&dst(this,f)<this.radius+f.sz){f.takeDmg(this.dmg,this.owner,true);f.state={t:'stun',f:90};this.hs.add(f);}});}
  }
  draw(){
    const pr=1-this.f/this.dur,T=this.type;ctx.save();
    if(T==='shock'){ctx.strokeStyle=`rgba(255,200,0,${pr*.9})`;ctx.lineWidth=10;ctx.beginPath();ctx.arc(this.x,this.y,this.radius*(1.1-pr*.1),0,Math.PI*2);ctx.stroke();}
    else if(T==='expl'){const r=this.radius*(1.3-pr*.3),g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r);g.addColorStop(0,`rgba(255,220,60,${pr})`);g.addColorStop(1,'rgba(255,60,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);ctx.fill();}
    else if(T==='slash'){ctx.translate(this.x,this.y);ctx.rotate(this.ang);ctx.fillStyle=`rgba(255,255,160,${pr*.65})`;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,this.radius,-Math.PI/1.7,Math.PI/1.7);ctx.closePath();ctx.fill();}
    else if(T==='pizza'){ctx.translate(this.x,this.y);ctx.rotate(this.f*.32);ctx.strokeStyle='rgba(255,80,60,.9)';ctx.lineWidth=12;ctx.beginPath();ctx.arc(0,0,this.radius,0,Math.PI*2);ctx.stroke();}
    else if(T==='channel'){ctx.strokeStyle=`rgba(100,180,255,${pr*.75})`;ctx.lineWidth=20;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.stroke();}
    else if(T==='wflag'){ctx.strokeStyle=`rgba(255,255,255,${pr*.4})`;ctx.lineWidth=3;ctx.setLineDash([8,8]);ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='rgba(0,50,200,.12)';ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();}
    else if(T==='maple'){ctx.fillStyle=`rgba(200,60,0,${pr*.4})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();}
    else if(T==='syrup'){ctx.fillStyle=`rgba(180,100,10,${pr*.45})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();}
    else if(T==='bliz'){ctx.fillStyle='rgba(180,220,255,.17)';ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(200,235,255,.45)';ctx.lineWidth=3;ctx.stroke();for(let i=0;i<8;i++){const a=this.f*.04+i*Math.PI/4,r2=this.radius*.7*(.5+.5*Math.sin(this.f*.03+i));ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.arc(this.x+Math.cos(a)*r2,this.y+Math.sin(a)*r2,4,0,Math.PI*2);ctx.fill();}}
    else if(T==='strike_mk'){ctx.strokeStyle=`rgba(255,40,40,${pr})`;ctx.lineWidth=3;ctx.setLineDash([6,6]);ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=`rgba(255,40,40,${pr*.2})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();}
    else if(T==='lux_land'){ctx.fillStyle=`rgba(239,51,64,${pr*.7})`;ctx.beginPath();ctx.arc(this.x,this.y,this.radius*(1.2-pr*.2),0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
}

// Soccer Ball
class Ball{
  constructor(x,y){Object.assign(this,{x,y,vx:0,vy:0,r:22,rot:0});}
  update(){
    this.x+=this.vx;this.y+=this.vy;this.rot+=Math.hypot(this.vx,this.vy)*.04;this.vx*=.96;this.vy*=.96;
    if(!soccerBounds)return;
    const b=soccerBounds;
    if(this.y-this.r<b.oy){this.y=b.oy+this.r;this.vy=Math.abs(this.vy);}
    if(this.y+this.r>b.oy+b.fh){this.y=b.oy+b.fh-this.r;this.vy=-Math.abs(this.vy);}
    if(this.x-this.r<b.ox){if(this.y>=b.gy0&&this.y<=b.gy1)scoreSoccer(0);else{this.x=b.ox+this.r;this.vx=Math.abs(this.vx);}return;}
    if(this.x+this.r>b.ox+b.fw){if(this.y>=b.gy0&&this.y<=b.gy1)scoreSoccer(1);else{this.x=b.ox+b.fw-this.r;this.vx=-Math.abs(this.vx);}return;}
    [player,...allies,...enemies].filter(a=>a&&!a.dead).forEach(a=>{const d=dst(a,this);if(d<a.sz+this.r){const ang=Math.atan2(this.y-a.y,this.x-a.x);this.vx+=Math.cos(ang)*1.5;this.vy+=Math.sin(ang)*1.5;const ov=a.sz+this.r-d+1;this.x+=Math.cos(ang)*ov;this.y+=Math.sin(ang)*ov;}});
  }
  kick(ang,power){this.vx=Math.cos(ang)*power;this.vy=Math.sin(ang)*power;}
  draw(){
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.fillStyle='#fff';ctx.strokeStyle='#222';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#222';for(let i=0;i<5;i++){const a=i*Math.PI*2/5;ctx.beginPath();ctx.arc(Math.cos(a)*this.r*.55,Math.sin(a)*this.r*.55,4,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
}
function scoreSoccer(t){soccerScore[t]++;document.getElementById('sb').textContent=`味方 ${soccerScore[0]} - ${soccerScore[1]} 敵`;if(soccerScore[t]>=2){gState='gameEnd';showWin(t===0?'VICTORY!':'DEFEAT',t===0?'サッカー勝利！':'サッカー敗北...');}else resetBall();}

// ═══════════════════════════════════════════
// ACTOR
// ═══════════════════════════════════════════
let _aid=0;
class Actor{
  constructor(x,y,team,type){
    this.x=x;this.y=y;this.team=team;this.type=type;
    const c=CD[type];
    this.hp=c.hp;this.maxHp=c.hp;this.sz=c.sz;this.spd=c.spd;
    this.ammo=c.am;this.maxAmmo=c.am;this.rt0=c.rt;this.reloadT=0;
    this.spGauge=0;this.spMax=c.spMax;
    this.dead=false;this.respawnT=0;
    this.atkPhase=0;this.atkCD=0;
    this.state=null;
    this.atkMult=1;this.spdMult=1;this.reloadMult=1;
    this.slowF=1;this.slowT=0;this.silenced=0;this.speedBoost=0;
    this.invisible=false;this.shield=0;this.poisonT=0;this.poisonDmg=350;
    this.hitFlash=0;this.inTank=false;this.tankHp=0;this.tankHits=0;
    this.yamato=false;this.yamatoInv=false;this.yamatoInvT=0;
    this.blizzard=false;this.spTimer=0;this.spTimerMax=0;
    this.nextBelShot='choco';
    this.id=_aid++;
    this.lastDmgT=0;this.recActive=false;this._recIv=null;this.recStep=0;
    this.vx=0;this.vy=0;
    this.isBot=false;
    this.aiT=0;this.lastEngageT=0;this.aiMode='advance';this.aiStuckT=0;this.lastPos={x,y};
  }
  get reloadTime(){return this.rt0/this.reloadMult;}
  get effSpd(){return this.spd*this.spdMult*(this.slowT>0?this.slowF:1)*(this.speedBoost>0?1.3:1);}
  addSP(v){if(this.isBot)return;this.spGauge=Math.min(this.spMax,this.spGauge+v);}

  takeDmg(dmg,src,fromSP=false){
    if(this.dead||this.yamatoInv)return;
    let m=1;
    areas.forEach(a=>{if(a.type==='wflag'&&a.owner&&a.owner.team!==this.team&&dst(this,a)<a.radius)m*=.75;});
    if(src){const st=tilesAt(src);if(st.some(t=>t.type==='trench'))m*=.6;}
    let d=dmg*m;
    if(this.shield>0){const ab=Math.min(this.shield,d);this.shield-=ab;d-=ab;if(d<=0)return;}
    if(this.yamato&&this.hp-d<=0&&!this.yamatoInv){
      this.hp=1;this.yamatoInv=true;this.yamatoInvT=60;
      this.spTimer=0;this.yamato=false;this.atkMult=1;this.spdMult=1;this.reloadMult=1;
      if(src&&!fromSP)src.addSP(d*.25);return;
    }
    this.hp-=d;this.hitFlash=8;
    this.lastDmgT=Date.now();
    if(this.recActive){clearInterval(this._recIv);this._recIv=null;this.recActive=false;}
    addDmg(this.x+(Math.random()-.5)*25,this.y-this.sz-5,d,src&&(src===player||src.team===player?.team)?'#ffee00':'#ff6666');
    if(src&&src!==this&&!fromSP)src.addSP(d*.4);
    if(this.hp<=0){this.hp=0;this.die(src);}
  }
  die(killer){
    this.dead=true;
    const noR=gMode==='knockout'||gMode==='br';
    this.respawnT=noR?Infinity:5000;
    if(this.yamato&&this.team===TEAM.P&&!noR)this.respawnT=3000;
    this.state=null;this.inTank=false;this.yamato=false;this.yamatoInv=false;this.blizzard=false;this.invisible=false;this.atkMult=1;this.spdMult=1;this.reloadMult=1;
    if(killer){const km=CD[killer.type]?.name||'?',nm=CD[this.type].name;if(killer.team===TEAM.P||killer.team===TEAM.A)addKillLog(`${km} ▶ ${nm}`,'p');else addKillLog(`${nm} ◀ ${km}`,'e');}
    if(gMode==='point_ko'&&killer){const pts=unitPoints[this.id]||2;const gain=Math.max(1,pts-1);if(killer.team===TEAM.P||killer.team===TEAM.A){pointScore.p+=gain;unitPoints[killer.id]=Math.min(7,(unitPoints[killer.id]||2)+1);}else{pointScore.e+=gain;unitPoints[killer.id]=Math.min(7,(unitPoints[killer.id]||2)+1);}unitPoints[this.id]=2;}
    if(this.team===TEAM.P)showDead(!noR);
    checkEnd();
  }
  respawn(){
    const c=CD[this.type];
    this.hp=c.hp;this.maxHp=c.hp;this.dead=false;this.respawnT=0;this.atkPhase=0;this.atkCD=0;this.ammo=c.am;this.reloadT=0;
    this.state=null;this.poisonT=0;this.silenced=0;this.atkMult=1;this.spdMult=1;this.reloadMult=1;this.slowF=1;this.slowT=0;
    this.invisible=false;this.shield=0;this.hitFlash=0;this.inTank=false;this.tankHp=0;this.yamato=false;this.yamatoInv=false;this.blizzard=false;this.spTimer=0;
    this.lastDmgT=0;this.recActive=false;this.aiMode='advance';
    const sp=spawnPos(this.team);this.x=sp.x;this.y=sp.y;this._resolveWalls();
    unitPoints[this.id]=2;
    if(this.team===TEAM.P)hideDead();
  }
  move(ax,ay){
    if(this.dead)return;
    if(this.state&&(this.state.t==='stun'||this.state.t==='jp_charge'))return;
    const sp=this.effSpd;this.vx=ax*sp;this.vy=ay*sp;
    let nx=clamp(this.x+this.vx,this.sz+2,W.w-this.sz-2);
    let ny=clamp(this.y+this.vy,this.sz+2,W.h-this.sz-2);
    if(wallColChar(nx,this.y,this.sz))nx=this.x;
    if(wallColChar(this.x,ny,this.sz))ny=this.y;
    this.x=nx;this.y=ny;
    this._resolveWalls();
  }
  _resolveWalls(){
    for(let iter=0;iter<6;iter++){
      let hit=false;
      for(const w of walls){
        if(!w.active||w.hp<=0||w.absorb)continue;
        const ol=this.x+this.sz-w.x,or_=w.x+w.w-(this.x-this.sz),ot=this.y+this.sz-w.y,ob=w.y+w.h-(this.y-this.sz);
        if(ol>0&&or_>0&&ot>0&&ob>0){
          const m=Math.min(ol,or_,ot,ob);
          if(m===ol)this.x=w.x-this.sz;else if(m===or_)this.x=w.x+w.w+this.sz;else if(m===ot)this.y=w.y-this.sz;else this.y=w.y+w.h+this.sz;
          this.x=clamp(this.x,this.sz+2,W.w-this.sz-2);this.y=clamp(this.y,this.sz+2,W.h-this.sz-2);hit=true;
        }
      }
      if(!hit)break;
    }
  }

  // ── ATTACKS ──
  atk(ang){
    if(this.dead||this.atkCD>0||this.silenced>0)return;
    if(gMode==='soccer'){if(ball&&dst(this,ball)<this.sz+ball.r+35&&this.ammo>0){ball.kick(ang,24);this.ammo--;this.atkCD=18;}return;}
    const T=this.type;
    ({soviet:()=>this.sovAtk(ang),usa:()=>this.usaAtk(ang),uk:()=>this.ukAtk(ang),france:()=>this.fraAtk(ang),
      germany:()=>this.inTank?this.tankAtk(ang):this.gerAtk(ang),japan:()=>this.jpAtk(ang),italy:()=>this.itaAtk(ang),
      china:()=>this.chiAtk(ang),canada:()=>this.canAtk(ang),

  }
  sovAtk(ang){

  }
  gerAtk(ang){if(this.ammo<=0)return;for(let i=0;i<15;i++)setTimeout(()=>{if(!this.dead)projectiles.push(new FadeBullet(this.x,this.y,ang+(Math.random()-.5)*.6,13,600,250*this.atkMult,this,6,'#ffee66'));},i*35);this.ammo--;this.atkCD=110;}
  tankAtk(ang){if(this.ammo<=0)return;projectiles.push(new ExpBullet(this.x,this.y,ang,8,850,2500*this.atkMult,this,160,'#ff8800'));this.ammo--;this.atkCD=90;this.tankHits++;this.addSP(500);}
  jpAtk(ang){
    if(this.atkPhase%2===0){this.state={t:'jp_charge',f:16,ang,dashHit:false,dashTarget:null};this.atkCD=12;}
    else{areas.push(new Area(this.x,this.y,'slash',this,200,2500*this.atkMult,13,ang));projectiles.push(new Bullet(this.x,this.y,ang,15,500,800*this.atkMult,this,8,'#eee'));this.atkCD=60;}
    this.atkPhase++;
  }
  itaAtk(ang){if(this.ammo<=0)return;areas.push(new Area(this.x,this.y,'pizza',this,88,2200*this.atkMult,300,ang,this));this.ammo--;this.atkCD=28;}
  chiAtk(ang){if(this.state&&this.state.t==='chi_ch')return;this.state={t:'chi_ch',f:15,ang};this.atkCD=80;}
  canAtk(ang){if(this.ammo<=0)return;const tx=clamp(spTarget.x,0,W.w),ty=clamp(spTarget.y,0,W.h);projectiles.push(new Thrown(this.x,this.y,tx,ty,this,'maple',90,1050*this.atkMult));this.ammo--;this.atkCD=70;}
  finSnipe(ang){if(this.ammo<=0)return;projectiles.push(new Bullet(this.x,this.y,ang,22,2000,3300*this.atkMult,this,10,'#88ccff'));this.ammo--;this.atkCD=100;}
  finSMG(ang){if(this.ammo<=0)return;for(let i=0;i<20;i++)setTimeout(()=>{if(!this.dead)projectiles.push(new Bullet(this.x,this.y,ang+(Math.random()-.5)*.9,14,280,450*this.atkMult,this,5,'#aaddff',true));},i*44);this.ammo--;this.atkCD=85;}
  belAtk(ang){
    if(this.ammo<=0)return;const shot=this.nextBelShot;this.nextBelShot=Math.random()<.5?'choco':'waffle';
    const b=shot==='choco'?new Bullet(this.x,this.y,ang,12,700,0,this,8,'#8B4513'):new Bullet(this.x,this.y,ang,12,700,1600*this.atkMult,this,9,'#ffcc88');
    b[shot==='choco'?'bChoco':'bWaffle']=true;b.belOwner=this;projectiles.push(b);this.ammo--;this.atkCD=50;
  }
  nlAtk(){const r=170;for(let dx=-r;dx<=r;dx+=TILE)for(let dy=-r;dy<=r;dy+=TILE)if(dx*dx+dy*dy<r*r)setTile(this.x+dx,this.y+dy,'reclaim',this.id,1200);areas.push(new Area(this.x,this.y,'shock',this,r,2100,12,0));this.atkCD=55;}
  luxAtk(ang){if(this.ammo<=0)return;this.state={t:'lux_dash',f:14,ang,hit:false};this.ammo--;this.atkCD=45;}

  // ── SPECIALS ──
  special(ang){
    if(this.dead||this.spGauge<this.spMax)return;
    if(gMode==='soccer'){if(ball&&dst(this,ball)<this.sz+ball.r+50){ball.kick(ang,42);return;}}

    ({soviet:()=>this.spSov(),usa:()=>this.spUSA(),uk:()=>this.spUK(),france:()=>this.spFra(),

      china:()=>this.spChi(),canada:()=>this.spCan(),finland:()=>this.spFin(),
      belgium:()=>this.spBel(ang),netherlands:()=>this.spNL(),luxembourg:()=>this.spLux()}[T]||(() => {}))();
  }
  spSov(){while(sovietBots.length>=10){const mi=sovietBots.reduce((a,b,i,arr)=>b.hp<arr[a].hp?i:a,0);sovietBots[mi].dead=true;sovietBots.splice(mi,1);}for(let i=0;i<3;i++){const b=new SovietBot(this.x+(Math.random()-.5)*160,this.y+(Math.random()-.5)*160,this.team,this);sovietBots.push(b);(this.team===TEAM.E?enemies:allies).push(b);}}
  spUSA(){areas.push(new Area(spTarget.x,spTarget.y,'strike_mk',this,260,0,120));setTimeout(()=>{for(let i=0;i<12;i++){const ox=(Math.random()-.5)*320,oy=(Math.random()-.5)*320;areas.push(new Area(spTarget.x+ox,spTarget.y+oy,'expl',this,140,5000,18));walls.forEach(w=>{if(w.brk&&w.active&&w.hp>0&&rcOv(w.x,w.y,w.w,w.h,spTarget.x+ox,spTarget.y+oy,140))w.hp-=2000;});}},2000);}
  spUK(){areas.push(new Area(this.x,this.y,'channel',this,200,850,300));this.spTimer=300;this.spTimerMax=300;}
  spFra(){areas.push(new Area(spTarget.x,spTarget.y,'wflag',this,260,0,480));}

  spTank(){if(this.tankHits<2)return;areas.push(new Area(spTarget.x,spTarget.y,'strike_mk',this,220,0,120));setTimeout(()=>{for(let i=0;i<7;i++){const ox=(Math.random()-.5)*200,oy=(Math.random()-.5)*200;areas.push(new Area(spTarget.x+ox,spTarget.y+oy,'expl',this,150,4500,18));}},2000);this.tankHits=0;}
  spJP(){this.yamato=true;this.atkMult=1.5;this.spdMult=1.25;this.reloadMult=1.5;this.spTimer=360;this.spTimerMax=360;}
  spIta(){for(let i=0;i<4;i++)items.push(new HealItem(this.x+Math.cos(i*Math.PI/2)*175,this.y+Math.sin(i*Math.PI/2)*175,this.team,2000));}
  spChi(){this.invisible=true;this.spdMult*=1.75;this.spTimer=240;this.spTimerMax=240;}
  spCan(){for(let i=0;i<10;i++)areas.push(new Area(spTarget.x+Math.cos(i*Math.PI*2/10)*190,spTarget.y+Math.sin(i*Math.PI*2/10)*190,'syrup',this,130,120,480));}
  spFin(){this.blizzard=true;areas.push(new Area(this.x,this.y,'bliz',this,540,550,600,0,this));this.spTimer=600;this.spTimerMax=600;}
  spBel(ang){const a=new Area(this.x,this.y,'slash',this,180,3200,13,ang);a.silenceHit=true;areas.push(a);}
  spNL(){tiles.forEach(t=>{if(t.type==='reclaim'&&t.ownerId===this.id){t.type='flood';t.timer=420;}});this.spTimer=420;this.spTimerMax=420;}
  spLux(){projectiles.push(new Thrown(this.x,this.y,spTarget.x,spTarget.y,this,'lux_land',140,3300));this.invisible=true;setTimeout(()=>{this.x=spTarget.x;this.y=spTarget.y;this.invisible=false;},450);}

  update(){
    if(this.dead){if(isFinite(this.respawnT)){this.respawnT-=16.67;if(this.respawnT<=0)this.respawn();}return;}
    if(this.state){
      const s=this.state;
      if(s.t==='stun'){s.f--;if(s.f<=0)this.state=null;}
      else if(s.t==='jp_charge'){
        s.f--;const a=s.ang;
        let nx=clamp(this.x+Math.cos(a)*17,this.sz+2,W.w-this.sz-2),ny=clamp(this.y+Math.sin(a)*17,this.sz+2,W.h-this.sz-2);
        if(!wallColChar(nx,this.y,this.sz))this.x=nx;if(!wallColChar(this.x,ny,this.sz))this.y=ny;
        if(!s.dashHit)for(const f of foes(this)){if(!f.dead&&dst(this,f)<this.sz+f.sz+10){f.takeDmg(1500*this.atkMult,this);s.dashHit=true;s.dashTarget=f;break;}}
        if(s.f<=0){const sa=new Area(this.x,this.y,'slash',this,105,2000*this.atkMult,11,a);if(s.dashTarget)sa.hs.add(s.dashTarget);areas.push(sa);this.state=null;}
      }
      else if(s.t==='chi_ch'){s.f--;if(s.f<=0){const a=s.ang;for(let i=0;i<5;i++)projectiles.push(new Bullet(this.x,this.y,a+(i-2)*.17,16,700,750*this.atkMult,this,7,'#ffee00'));this.state=null;}}
      else if(s.t==='lux_dash'){
        s.f--;const a=s.ang;
        let nx=clamp(this.x+Math.cos(a)*19,this.sz+2,W.w-this.sz-2),ny=clamp(this.y+Math.sin(a)*19,this.sz+2,W.h-this.sz-2);
        if(!wallColChar(nx,this.y,this.sz))this.x=nx;if(!wallColChar(this.x,ny,this.sz))this.y=ny;
        if(!s.hit)for(const f of foes(this)){if(!f.dead&&dst(this,f)<this.sz+f.sz+8){f.takeDmg(2400*this.atkMult,this);const kb=Math.atan2(f.y-this.y,f.x-this.x);const kx=f.x+Math.cos(kb)*20,ky=f.y+Math.sin(kb)*20;if(wallColChar(kx,ky,f.sz))f.state={t:'stun',f:18};else{f.x=kx;f.y=ky;}this.hp=Math.min(this.maxHp,this.hp+1000);s.hit=true;break;}}
        if(s.f<=0)this.state=null;
      }
    }
    if(this.spTimer>0){this.spTimer--;if(this.spTimer<=0){if(this.inTank){this.inTank=false;this.sz=CD['germany'].sz;this.spd=CD['germany'].spd;}if(this.yamato){this.yamato=false;this.atkMult=1;this.spdMult=1;this.reloadMult=1;}if(this.invisible&&this.type==='china'){this.invisible=false;this.spdMult=1;}if(this.blizzard)this.blizzard=false;}}
    if(this.yamatoInv){this.yamatoInvT--;if(this.yamatoInvT<=0)this.yamatoInv=false;}
    if(this.slowT>0)this.slowT--;if(this.silenced>0)this.silenced--;if(this.speedBoost>0)this.speedBoost--;
    if(this.poisonT>0){this.poisonT--;if(this.poisonT%60===0){this.hp=Math.max(1,this.hp-this.poisonDmg);addDmg(this.x,this.y-this.sz-10,this.poisonDmg,'#66ff66');}}
    if(this.ammo<this.maxAmmo){this.reloadT++;if(this.reloadT>=this.reloadTime){this.ammo++;this.reloadT=0;}}
    if(this.atkCD>0)this.atkCD--;if(this.hitFlash>0)this.hitFlash--;
    tilesAt(this).forEach(t=>{if(t.type==='flood'&&t.ownerId!==this.id){this.slowF=.5;this.slowT=40;}});
    items.forEach(it=>{if(it.active&&it.team===this.team&&!this.dead&&dst(this,it)<it.r+this.sz)it.apply(this);});
    const now=Date.now();
    if(!this.recActive&&this.lastDmgT>0&&now-this.lastDmgT>5000&&this.hp<this.maxHp){
      this.recActive=true;this.recStep=0;
      this._recIv=setInterval(()=>{if(this.dead||!this.recActive||this.hp>=this.maxHp||this.recStep>=REC.length){clearInterval(this._recIv);this._recIv=null;this.recActive=false;return;}this.hp=Math.min(this.maxHp,this.hp+this.maxHp*REC[this.recStep++]);},1000);
    }
  }

  // ── DRAW (Brawl Stars style) ──
  drawSelf(){
    if(this.dead)return;
    if(this.invisible&&this.team===TEAM.E)return;
    ctx.save();ctx.translate(this.x,this.y);
    if(this.hitFlash>0)ctx.globalAlpha=.4+.6*(this.hitFlash%2);
    const c=CD[this.type];
    // Shadow
    ctx.save();ctx.globalAlpha*=.3;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(0,this.sz*.6,this.sz*.8,this.sz*.25,0,0,Math.PI*2);ctx.fill();ctx.restore();
    // Tank body
    if(this.inTank){ctx.fillStyle='#555';ctx.beginPath();ctx.ellipse(0,0,this.sz+16,this.sz+11,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#888';ctx.lineWidth=3;ctx.stroke();}
    // Body gradient
    const grad=ctx.createRadialGradient(-this.sz*.25,-this.sz*.25,0,0,0,this.sz*1.1);
    grad.addColorStop(0,lerpColor(c.col,'#ffffff',.35));
    grad.addColorStop(.6,c.col);
    grad.addColorStop(1,c.color2);
    ctx.beginPath();ctx.arc(0,0,this.sz,0,Math.PI*2);
    ctx.fillStyle=this.invisible?'rgba(200,200,200,.25)':this.poisonT>0?'#336633':this.yamatoInv?'#ffdd00':grad;
    ctx.fill();
    // Outline (team color)
    const tc=this.team===TEAM.P?'#00ddff':this.team===TEAM.A?'#22ff88':this.team===TEAM.E?'#ff4444':'#ffffff';
    ctx.strokeStyle=tc;ctx.lineWidth=3.5;ctx.stroke();
    // Shield ring
    if(this.shield>0){ctx.strokeStyle='rgba(100,160,255,.8)';ctx.lineWidth=5;ctx.beginPath();ctx.arc(0,0,this.sz+8,0,Math.PI*2);ctx.stroke();}
    // Yamato aura
    if(this.yamato&&!this.yamatoInv){ctx.strokeStyle=`rgba(255,220,0,${.6+.4*Math.sin(FC*.25)})`;ctx.lineWidth=5;ctx.beginPath();ctx.arc(0,0,this.sz+13,0,Math.PI*2);ctx.stroke();}
    // Symbol
    ctx.fillStyle=this.hitFlash>0?'#ffaaaa':'#ffffff';
    ctx.font=`900 ${Math.max(10,Math.floor(this.sz*.52))}px Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.strokeStyle='rgba(0,0,0,.6)';ctx.lineWidth=3;ctx.strokeText(c.sym,0,0);
    ctx.fillText(c.sym,0,0);
    // Status icons
    let iy=-this.sz-14;
    if(this.state?.t==='stun'){ctx.font='15px Arial';ctx.textAlign='center';ctx.fillStyle='#ffff44';ctx.fillText('★',0,iy);iy-=18;}
    if(this.poisonT>0){ctx.font='13px Arial';ctx.fillStyle='#88ff88';ctx.fillText('☣',0,iy);iy-=16;}
    if(this.slowT>0){ctx.font='13px Arial';ctx.fillStyle='#aaaaff';ctx.fillText('❄',0,iy);}
    ctx.restore();
    this.drawHUD();
  }
  drawHUD(){
    const c=CD[this.type],bw=100,bx=this.x-bw/2,by=this.y-this.sz-58;
    // BG panel
    ctx.save();ctx.globalAlpha=.82;
    ctx.fillStyle='rgba(0,0,0,.75)';roundRect(ctx,bx-3,by-16,bw+6,56,5);ctx.fill();
    ctx.restore();
    // Name
    ctx.fillStyle='#ffffff';ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.fillText(c.name,this.x,by-7);
    // HP bar
    const hr=this.hp/this.maxHp;const hbh=11;
    ctx.fillStyle='rgba(0,0,0,.5)';roundRect(ctx,bx,by,bw,hbh,hbh/2);ctx.fill();
    const hcol=hr>.5?'#2ecc71':hr>.25?'#f39c12':'#e74c3c';
    ctx.fillStyle=hcol;roundRect(ctx,bx,by,bw*hr,hbh,hbh/2);ctx.fill();
    // HP shine
    ctx.save();ctx.globalAlpha=.3;ctx.fillStyle='#fff';roundRect(ctx,bx,by,bw*hr,hbh/2,hbh/2);ctx.fill();ctx.restore();
    // HP text
    ctx.fillStyle='#fff';ctx.font='bold 8px Arial';ctx.textAlign='center';ctx.fillText(Math.ceil(this.hp),this.x,by+hbh-1.5);
    // Shield
    if(this.shield>0){ctx.globalAlpha=.5;ctx.fillStyle='#6688ff';roundRect(ctx,bx,by,bw*Math.min(1,this.shield/this.maxHp),hbh,hbh/2);ctx.fill();ctx.globalAlpha=1;}
    // Ammo dots (Brawl Stars style)
    const am=this.maxAmmo,dotR=5,dotGap=3;const totalW=am*(dotR*2)+( am-1)*dotGap;const dotX=this.x-totalW/2;
    for(let i=0;i<am;i++){
      const cx2=dotX+i*(dotR*2+dotGap)+dotR,cy2=by+hbh+8;
      if(i<this.ammo){
        // Filled dot
        ctx.beginPath();ctx.arc(cx2,cy2,dotR,0,Math.PI*2);ctx.fillStyle='#f1c40f';ctx.fill();
        ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1;ctx.stroke();
        ctx.save();ctx.globalAlpha=.4;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx2-1,cy2-1.5,dotR*.5,0,Math.PI*2);ctx.fill();ctx.restore();
      }else if(i===this.ammo&&this.ammo<am){
        // Reloading dot
        ctx.beginPath();ctx.arc(cx2,cy2,dotR,0,Math.PI*2);ctx.fillStyle='#333';ctx.fill();ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.stroke();
        const prog=this.reloadT/this.reloadTime;
        ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.arc(cx2,cy2,dotR,-Math.PI/2,-Math.PI/2+Math.PI*2*prog);ctx.closePath();ctx.fillStyle='#e6a800';ctx.fill();
      }else{
        ctx.beginPath();ctx.arc(cx2,cy2,dotR,0,Math.PI*2);ctx.fillStyle='#222';ctx.fill();ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.stroke();
      }
    }
    // SP indicator (small bar below ammo)
    const spY=by+hbh+20;
    ctx.fillStyle='rgba(0,0,0,.4)';roundRect(ctx,bx,spY,bw,5,2.5);ctx.fill();
    ctx.fillStyle=this.spGauge>=this.spMax?'#d8b4fe':'#8855cc';roundRect(ctx,bx,spY,bw*(this.spGauge/this.spMax),5,2.5);ctx.fill();
    if(this.spGauge>=this.spMax){
      ctx.save();ctx.globalAlpha=.6+.4*Math.sin(FC*.3);ctx.strokeStyle='#d8b4fe';ctx.lineWidth=1.5;roundRect(ctx,bx,spY,bw,5,2.5);ctx.stroke();ctx.restore();
    }
    // Timed buff bar
    if(this.spTimer>0&&this.spTimerMax>0){
      const tr=this.spTimer/this.spTimerMax;const sec=(this.spTimer/60).toFixed(1);
      ctx.fillStyle='rgba(0,0,0,.4)';roundRect(ctx,bx,spY+7,bw,4,2);ctx.fill();
      ctx.fillStyle='#ffaa00';roundRect(ctx,bx,spY+7,bw*tr,4,2);ctx.fill();
      ctx.fillStyle='#ffcc88';ctx.font='7px Arial';ctx.textAlign='center';ctx.fillText(`${sec}s`,this.x,spY+18);
    }
    if(this.type==='belgium'){ctx.fillStyle='#ffcc00';ctx.font='7px Arial';ctx.textAlign='center';ctx.fillText('次:'+(this.nextBelShot==='choco'?'チョコ':'ワッフル'),this.x,spY+(this.spTimer>0?18:10));}
  }

  // ── AI ──
  aiUpdate(){
    if(this.dead)return;this.aiT++;
    const fo=foes(this).filter(f=>!f.dead),fr=frds(this).filter(f=>!f.dead);
    if(gMode==='soccer'){this._soccerAI();return;}
    if(gMode==='br'){this._brAI(fo);return;}
    if(!fo.length){const cx=W.w/2,cy=W.h/2;const ang=Math.atan2(cy-this.y,cx-this.x);this.move(Math.cos(ang),Math.sin(ang));return;}
    const near=fo.reduce((a,b)=>dst(this,b)<dst(this,a)?b:a);
    const d=dst(this,near),ang=Math.atan2(near.y-this.y,near.x-this.x);
    const hpR=this.hp/this.maxHp;
    if(hpR<.3)this.aiMode='retreat';
    else if(hpR>.6||this.aiT-this.lastEngageT>200)this.aiMode='advance';
    else this.aiMode='fight';
    // Stuck check
    if(this.aiT%30===0){const mv=Math.hypot(this.x-this.lastPos.x,this.y-this.lastPos.y);if(mv<5)this.aiStuckT+=30;else this.aiStuckT=0;this.lastPos={x:this.x,y:this.y};}
    const stuck=this.aiStuckT>90;
    const tooClose=fr.some(f=>dst(this,f)<this.sz+f.sz+18);
    if(this.aiMode==='retreat'){const rx=this.team===TEAM.E?W.w-300:300;const ra=Math.atan2(W.h/2-this.y,rx-this.x);this.move(Math.cos(ra),Math.sin(ra));}
    else if(this.aiMode==='advance'||stuck){stuck?(this.move(Math.cos(ang+Math.PI/2*(Math.random()>.5?1:-1)),Math.sin(ang+Math.PI/2*(Math.random()>.5?1:-1))),this.aiStuckT=0):this.move(Math.cos(ang),Math.sin(ang));}
    else{
      let dodge=null;for(const p of projectiles){if(p.owner&&p.owner.team===this.team)continue;if(dst({x:p.x,y:p.y},this)<200){dodge=ang+Math.PI/2*(Math.random()>.5?1:-1);break;}}
      if(tooClose){const aw=fr.reduce((a,b)=>dst(this,b)<dst(this,a)?b:a);this.move(Math.cos(Math.atan2(this.y-aw.y,this.x-aw.x)),Math.sin(Math.atan2(this.y-aw.y,this.x-aw.x)));}
      else if(dodge)this.move(Math.cos(dodge),Math.sin(dodge));
      else if(d>280)this.move(Math.cos(ang),Math.sin(ang));
      else if(d<130)this.move(-Math.cos(ang),-Math.sin(ang));
      else this.aiT%50<25?this.move(Math.cos(ang+Math.PI/2),Math.sin(ang+Math.PI/2)):this.move(Math.cos(ang-Math.PI/2),Math.sin(ang-Math.PI/2));
    }
    if(this.atkCD<=0&&d<820){spTarget={x:near.x+(Math.random()-.5)*60,y:near.y+(Math.random()-.5)*60};this.atk(ang);this.lastEngageT=this.aiT;}
    if(this.spGauge>=this.spMax){spTarget={x:near.x+(Math.random()-.5)*80,y:near.y+(Math.random()-.5)*80};this.special(ang);}
  }
  _soccerAI(){
    if(!ball||!soccerBounds)return;const b=soccerBounds;
    const goalX=this.team===TEAM.E?b.ox:b.ox+b.fw,goalY=b.oy+b.fh/2;
    const bd=dst(this,ball);
    if(bd<this.sz+ball.r+40){const ang=Math.atan2(goalY-this.y,goalX-this.x)+(Math.random()-.5)*.3;if(this.atkCD<=0){ball.kick(ang,22);this.atkCD=25;}}
    else{const ang=Math.atan2(ball.y-this.y,ball.x-this.x);this.move(Math.cos(ang),Math.sin(ang));}
    const fo=foes(this).filter(f=>!f.dead);
    if(fo.length&&this.aiT%35===0){const near=fo.reduce((a,b)=>dst(this,b)<dst(this,a)?b:a);if(dst(this,near)<700)this.atk(Math.atan2(near.y-this.y,near.x-this.x));}
    if(this.spGauge>=this.spMax)this.special(Math.atan2(goalY-this.y,goalX-this.x));
  }
  _brAI(fo){
    if(!fo.length)return;const near=fo.reduce((a,b)=>dst(this,b)<dst(this,a)?b:a);
    const d=dst(this,near),ang=Math.atan2(near.y-this.y,near.x-this.x);
    if(d>300)this.move(Math.cos(ang),Math.sin(ang));else if(d<150)this.move(-Math.cos(ang),-Math.sin(ang));
    if(this.atkCD<=0&&d<900){spTarget={x:near.x,y:near.y};this.atk(ang);}
    if(this.spGauge>=this.spMax){spTarget={x:near.x,y:near.y};this.special(ang);}
  }
}

// Soviet Bot
class SovietBot extends Actor{
  constructor(x,y,team,master){
    super(x,y,team,'usa');this.master=master;this.hp=1200;this.maxHp=1200;this.sz=18;this.spd=4.0;this.isBot=true;this.maxAmmo=99;this.ammo=99;this.rt0=50;
    sovietBots.filter(b=>b!==this).forEach(b=>{if(dst(b,this)<40){const a=Math.random()*Math.PI*2;this.x+=Math.cos(a)*50;this.y+=Math.sin(a)*50;}});
  }
  aiUpdate(){
    if(this.dead)return;this.aiT++;
    if(dst(this,this.master)>280){const a=Math.atan2(this.master.y-this.y,this.master.x-this.x);this.move(Math.cos(a),Math.sin(a));return;}
    sovietBots.forEach(b=>{if(b===this||b.dead)return;const d=dst(this,b);if(d<36){const a=Math.atan2(this.y-b.y,this.x-b.x);this.x+=Math.cos(a)*2;this.y+=Math.sin(a)*2;}});
    const fo=foes(this).filter(f=>!f.dead&&!f.isBot);if(!fo.length)return;
    const near=fo.reduce((a,b)=>dst(this,b)<dst(this,a)?b:a);
    const ang=Math.atan2(near.y-this.y,near.x-this.x);
    if(dst(this,near)>200)this.move(Math.cos(ang),Math.sin(ang));
    if(this.aiT%40===0&&dst(this,near)<580)projectiles.push(new Bullet(this.x,this.y,ang,11,500,500,this,6,'#ffaa00'));
  }
  drawSelf(){
    if(this.dead)return;ctx.save();ctx.translate(this.x,this.y);
    ctx.beginPath();ctx.arc(0,0,this.sz,0,Math.PI*2);ctx.fillStyle='#aa0000';ctx.fill();ctx.strokeStyle=this.team===TEAM.E?'#ff4444':'#22ff88';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',0,0);ctx.restore();
    ctx.fillStyle='#111';ctx.fillRect(this.x-20,this.y-this.sz-14,40,5);ctx.fillStyle='#e44';ctx.fillRect(this.x-20,this.y-this.sz-14,40*(this.hp/this.maxHp),5);
  }
}

class Crystal{

    ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();ctx.restore();
    ctx.fillStyle='#fff';ctx.font='20px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('💎',0,0);ctx.restore();

// Helpers
function lerpColor(a,b,t){const ah=parseInt(a.slice(1),16),bh=parseInt(b.slice(1),16);const ar=(ah>>16)&0xff,ag=(ah>>8)&0xff,ab=ah&0xff,br=(bh>>16)&0xff,bg=(bh>>8)&0xff,bb=bh&0xff;return`rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;}
function roundRect(ctx,x,y,w,h,r){const rr=Math.min(r,h/2,w/2);ctx.beginPath();ctx.moveTo(x+rr,y);ctx.lineTo(x+w-rr,y);ctx.arcTo(x+w,y,x+w,y+h,rr);ctx.lineTo(x+w,y+h-rr);ctx.arcTo(x+w,y+h,x,y+h,rr);ctx.lineTo(x+rr,y+h);ctx.arcTo(x,y+h,x,y,rr);ctx.lineTo(x,y+rr);ctx.arcTo(x,y,x+w,y,rr);ctx.closePath();}

// INPUT (Brawl Stars 完全準拠)
// ═══════════════════════════════════════════
const stk={mv:{a:false,bx:0,by:0,cx:0,cy:0,id:null},at:{a:false,bx:0,by:0,cx:0,cy:0,id:null},sp:{a:false,bx:0,by:0,cx:0,cy:0,id:null}};
const keys={};
const SUPER_BTN={x:0,y:0,r:44};// set each frame in drawHUD

function zone(x,y){
  // Super button check handled separately in touchstart
  if(x<innerWidth*.45)return'mv';
  return'at';
}
function asgn(s,t){s.a=true;s.bx=t.clientX;s.by=t.clientY;s.cx=t.clientX;s.cy=t.clientY;s.id=t.identifier;}
function updSP(ang,mag){if(!player)return;const d=Math.min(mag/36*1400,1400);spTarget={x:player.x+Math.cos(ang)*d,y:player.y+Math.sin(ang)*d};}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    // Super button (priority check)
    const sb2=SUPER_BTN;const ddx=t.clientX-sb2.x,ddy=t.clientY-sb2.y;
    if(ddx*ddx+ddy*ddy<(sb2.r+20)**2){
      asgn(stk.sp,t);continue;// start drag from super button
    }
    const z=zone(t.clientX,t.clientY);
    if(!stk[z].a)asgn(stk[z],t);
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    for(const k of['mv','at','sp'])if(stk[k].id===t.identifier){stk[k].cx=t.clientX;stk[k].cy=t.clientY;}
  }
  // Update spTarget from attack stick (BS: aim as you drag)
  if(stk.at.a&&player&&!player.dead){
    const dx=stk.at.cx-stk.at.bx,dy=stk.at.cy-stk.at.by;
    if(Math.hypot(dx,dy)>12)updSP(Math.atan2(dy,dx),Math.hypot(dx,dy));
  }
  // Update spTarget from super button drag
  if(stk.sp.a&&player&&!player.dead){
    const dx=stk.sp.cx-stk.sp.bx,dy=stk.sp.cy-stk.sp.by;
    if(Math.hypot(dx,dy)>12)updSP(Math.atan2(dy,dx),Math.hypot(dx,dy));
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    // Attack stick release
    if(stk.at.id===t.identifier){
      if(player&&!player.dead){
        const dx=stk.at.cx-stk.at.bx,dy=stk.at.cy-stk.at.by;const mag=Math.hypot(dx,dy);
        if(mag<14){
          // Tap → auto-aim nearest
          const near=foes(player).filter(f=>!f.dead).reduce((a,b)=>!a||dst(player,b)<dst(player,a)?b:a,null);
          if(near)player.atk(Math.atan2(near.y-player.y,near.x-player.x));
        }else{
          // Hold+drag → manual aim, release = fire
          const ang=Math.atan2(dy,dx);updSP(ang,mag);player.atk(ang);
        }
      }
      stk.at.a=false;stk.at.id=null;
    }
    // Super button release
    if(stk.sp.id===t.identifier){
      if(player&&!player.dead&&player.spGauge>=player.spMax){
        const dx=stk.sp.cx-stk.sp.bx,dy=stk.sp.cy-stk.sp.by;const mag=Math.hypot(dx,dy);
        const ang=mag>14?Math.atan2(dy,dx):Math.atan2(
          (foes(player).filter(f=>!f.dead).reduce((a,b)=>!a||dst(player,b)<dst(player,a)?b:a,null)||{y:player.y-1}).y-player.y,
          (foes(player).filter(f=>!f.dead).reduce((a,b)=>!a||dst(player,b)<dst(player,a)?b:a,null)||{x:player.x+1}).x-player.x
        );
        updSP(ang,Math.max(mag,200));player.special(ang);
      }
      stk.sp.a=false;stk.sp.id=null;
    }
    // Move stick release
    if(stk.mv.id===t.identifier){stk.mv.a=false;stk.mv.id=null;}
  }
},{passive:false});

canvas.addEventListener('mousedown',e=>{
  if(!player||player.dead||gState!=='play')return;
  const cx=innerWidth/2,cy=innerHeight/2;const ang=Math.atan2(e.clientY-cy,e.clientX-cx);
  if(e.button===2){updSP(ang,800);player.special(ang);}
  else{const near=foes(player).filter(f=>!f.dead).reduce((a,b)=>!a||dst(player,b)<dst(player,a)?b:a,null);if(near)player.atk(Math.atan2(near.y-player.y,near.x-player.x));else player.atk(ang);}
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('mousemove',e=>{if(gState!=='play'||!player||player.dead)return;const cx=innerWidth/2,cy=innerHeight/2;updSP(Math.atan2(e.clientY-cy,e.clientX-cx),Math.hypot(e.clientX-cx,e.clientY-cy)*2);});
window.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '&&player&&!player.dead&&gState==='play'&&player.spGauge>=player.spMax)player.special(0);});
window.addEventListener('keyup',e=>delete keys[e.key]);

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════
function loop(){
  if(gState!=='play'&&gState!=='roundEnd'){requestAnimationFrame(loop);return;}
  FC++;ctx.clearRect(0,0,canvas.width,canvas.height);
  if(gMode==='soccer'&&soccerBounds){const b=soccerBounds;cam.x=b.ox+b.fw/2;cam.y=b.oy+b.fh/2;}
  else if(player&&!player.dead){cam.x+=(player.x-cam.x)*.1;cam.y+=(player.y-cam.y)*.1;}

  ctx.save();ctx.translate(canvas.width/2-cam.x,canvas.height/2-cam.y);

  // Background - grass tile pattern (Brawl Stars style)
  const gt=TILE*2;// grass tile size
  for(let gx=0;gx<=W.w;gx+=gt){for(let gy=0;gy<=W.h;gy+=gt){
    const even=((gx/gt)+(gy/gt))%2===0;
    ctx.fillStyle=gMode==='soccer'?(even?'#2a6b2a':'#256125'):(even?'#2d4a22':'#273f1e');
    ctx.fillRect(gx,gy,gt,gt);
  }}
  // Subtle edge lines between tiles
  ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=1;
  for(let x=0;x<=W.w;x+=gt){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,W.h);ctx.stroke();}
  for(let y=0;y<=W.h;y+=gt){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W.w,y);ctx.stroke();}

  // Soccer
  if(gMode==='soccer'&&soccerBounds){
    const b=soccerBounds;ctx.fillStyle='#1a4a1a';ctx.fillRect(b.ox,b.oy,b.fw,b.fh);
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=5;ctx.strokeRect(b.ox,b.oy,b.fw,b.fh);
    ctx.beginPath();ctx.moveTo(b.ox+b.fw/2,b.oy);ctx.lineTo(b.ox+b.fw/2,b.oy+b.fh);ctx.stroke();
    ctx.beginPath();ctx.arc(b.ox+b.fw/2,b.oy+b.fh/2,120,0,Math.PI*2);ctx.stroke();
    ctx.lineWidth=8;ctx.strokeStyle='#ffcc00';ctx.strokeRect(b.ox-32,b.gy0,32,b.gy1-b.gy0);ctx.strokeRect(b.ox+b.fw,b.gy0,32,b.gy1-b.gy0);
  }
  // Territory
  if(gMode==='territory'){const tz={x:W.w/2-160,y:W.h/2-160,w:320,h:320};ctx.fillStyle='rgba(200,200,50,.1)';ctx.fillRect(tz.x,tz.y,tz.w,tz.h);ctx.strokeStyle='rgba(255,255,100,.35)';ctx.lineWidth=3;ctx.strokeRect(tz.x,tz.y,tz.w,tz.h);}

  // Tiles
  tiles.forEach(t=>{
    const colors={reclaim:['rgba(255,160,40,.2)','rgba(255,160,40,.35)'],flood:['rgba(30,100,210,.3)','rgba(80,160,255,.5)'],trench:['rgba(139,100,30,.3)','rgba(180,140,60,.5)']};
    const c=colors[t.type];if(!c)return;
    ctx.fillStyle=c[0];ctx.fillRect(t.gx,t.gy,TILE,TILE);ctx.strokeStyle=c[1];ctx.lineWidth=1;ctx.strokeRect(t.gx,t.gy,TILE,TILE);
  });
  // Walls (Brawl Stars style)
  walls.forEach(w=>{
    if(!w.active||w.hp<=0)return;
    ctx.save();
    if(w.absorb){
      // Purple crystal block
      ctx.fillStyle='#3d1a6e';ctx.fillRect(w.x,w.y,w.w,w.h);
      ctx.fillStyle='rgba(180,100,255,.35)';ctx.fillRect(w.x+2,w.y+2,w.w-4,w.h/2-2);
      ctx.strokeStyle='rgba(200,120,255,.7)';ctx.lineWidth=2;ctx.strokeRect(w.x,w.y,w.w,w.h);
      ctx.fillStyle='rgba(180,100,255,.6)';ctx.font='12px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✦',w.x+w.w/2,w.y+w.h/2);
    }else if(w.brk){
      // Wooden crate (breakable)
      const r=isFinite(w.maxHp)?w.hp/w.maxHp:1;
      const woodBase=`rgb(${Math.round(160*r+20)},${Math.round(110*r+15)},${Math.round(40*r+5)})`;
      ctx.fillStyle=woodBase;ctx.fillRect(w.x,w.y,w.w,w.h);
      // Wood grain lines
      ctx.strokeStyle=`rgba(0,0,0,${.15+.1*(1-r)})`;ctx.lineWidth=1;
      const gs=Math.min(w.w,w.h)/3;
      for(let i=1;i<3;i++){if(w.w>w.h){ctx.beginPath();ctx.moveTo(w.x+i*gs,w.y);ctx.lineTo(w.x+i*gs,w.y+w.h);ctx.stroke();}else{ctx.beginPath();ctx.moveTo(w.x,w.y+i*gs);ctx.lineTo(w.x+w.w,w.y+i*gs);ctx.stroke();}}
      // Border
      ctx.strokeStyle=`rgba(200,160,80,${.6*r})`;ctx.lineWidth=1.5;ctx.strokeRect(w.x,w.y,w.w,w.h);
      // HP crack overlay
      if(r<.6){ctx.fillStyle=`rgba(0,0,0,${(1-r)*.35})`;ctx.fillRect(w.x,w.y,w.w,w.h);}
      // HP bar on top
      if(isFinite(w.maxHp)){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(w.x,w.y,w.w,4);ctx.fillStyle=r>.5?'#f39c12':'#e74c3c';ctx.fillRect(w.x,w.y,w.w*r,4);}
    }else{
      // Stone wall (solid)
      ctx.fillStyle='#3a3c4a';ctx.fillRect(w.x,w.y,w.w,w.h);
      // Stone face highlights
      ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(w.x+1,w.y+1,w.w-2,4);ctx.fillRect(w.x+1,w.y+1,4,w.h-2);
      ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(w.x,w.y+w.h-3,w.w,3);ctx.fillRect(w.x+w.w-3,w.y,3,w.h);
      ctx.strokeStyle='rgba(80,90,130,.5)';ctx.lineWidth=1.5;ctx.strokeRect(w.x,w.y,w.w,w.h);
    }
    ctx.restore();
  });
  if(crystals.p)crystals.p.draw();if(crystals.e)crystals.e.draw();
  areas.forEach(a=>a.draw());items.forEach(it=>it.draw());
  if(ball)ball.draw();
  projectiles.forEach(p=>p.draw());

  // ── BRAWL STARS AIM GUIDE ──
  if(gState==='play'&&player&&!player.dead){
    const T2=player.type;
    if(stk.at.a){
      const dx=stk.at.cx-stk.at.bx,dy=stk.at.cy-stk.at.by;const mag=Math.hypot(dx,dy);
      if(mag>12){
        const ang=Math.atan2(dy,dx);
        if(T2==='canada'){
          drawThrowGuide(spTarget.x,spTarget.y,90,false);
        }else{
          // Beam or cone (Brawl Stars style)
          ctx.save();ctx.globalAlpha=.18;ctx.translate(player.x,player.y);ctx.rotate(ang);
          if(T2==='japan'&&player.atkPhase%2===0){// dash
            ctx.fillStyle='#fff';ctx.fillRect(0,-28,380,56);
          }else if(T2==='italy'||T2==='france'||T2==='netherlands'){// arc
            ctx.fillStyle='#ffee88';ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,180,-Math.PI/1.9,Math.PI/1.9);ctx.closePath();ctx.fill();
          }else{
            const range=T2==='uk'||T2==='finland'?1800:T2==='usa'?900:650;
            const ww=T2==='usa'?100:T2==='germany'?90:T2==='soviet'?140:30;
            ctx.fillStyle='#ffee88';
            // Tapered beam
            ctx.beginPath();ctx.moveTo(0,-ww*.35);ctx.lineTo(range,-ww*.5);ctx.lineTo(range,ww*.5);ctx.lineTo(0,ww*.35);ctx.closePath();ctx.fill();
          }
          ctx.restore();
          // Nearest enemy highlight
          const near=foes(player).filter(f=>!f.dead).reduce((a,b)=>!a||dst(player,b)<dst(player,a)?b:a,null);
          if(near){ctx.save();ctx.globalAlpha=.35+.2*Math.sin(FC*.3);ctx.strokeStyle='#ffee88';ctx.lineWidth=3;ctx.setLineDash([6,4]);ctx.beginPath();ctx.arc(near.x,near.y,near.sz+10,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.restore();}
        }
      }
    }
    // SP aim (right side top)
    if(player.spGauge>=player.spMax){
      if(T2==='canada'||T2==='luxembourg')drawThrowGuide(spTarget.x,spTarget.y,T2==='canada'?130:140,true);
      else{ctx.save();ctx.globalAlpha=.25;ctx.fillStyle='#c4f';ctx.beginPath();ctx.arc(spTarget.x,spTarget.y,90,0,Math.PI*2);ctx.fill();ctx.restore();}
    }
  }

  // Characters
  if(gMode==='br')allUnits.forEach(a=>a.drawSelf());
  else{allies.forEach(a=>a.drawSelf());sovietBots.forEach(b=>b.drawSelf());enemies.forEach(e=>e.drawSelf());if(player)player.drawSelf();}
  ctx.restore();

  // === UPDATE ===
  if(gState==='play'){
    if(player&&!player.dead){
      let ax=0,ay=0;
      if(keys['w']||keys['ArrowUp'])ay=-1;if(keys['s']||keys['ArrowDown'])ay=1;
      if(keys['a']||keys['ArrowLeft'])ax=-1;if(keys['d']||keys['ArrowRight'])ax=1;
      if(ax||ay){const l=Math.hypot(ax,ay);player.move(ax/l,ay/l);}
      if(stk.mv.a){const dx=stk.mv.cx-stk.mv.bx,dy=stk.mv.cy-stk.mv.by;const l=Math.hypot(dx,dy);if(l>12)player.move(dx/l,dy/l);}
      // Auto-fire burst chars while holding attack stick
      if(stk.at.a&&FC%20===0){const dx=stk.at.cx-stk.at.bx,dy=stk.at.cy-stk.at.by;if(Math.hypot(dx,dy)>18&&['usa','germany'].includes(player.type)){player.atk(Math.atan2(dy,dx));}}
      // SP target from super button drag (real-time aim preview)
      if(stk.sp.a){const dx=stk.sp.cx-stk.sp.bx,dy=stk.sp.cy-stk.sp.by;if(Math.hypot(dx,dy)>12)updSP(Math.atan2(dy,dx),Math.hypot(dx,dy));}
    }
    const acts=gMode==='br'?allUnits:[player,...allies,...enemies,...sovietBots].filter(a=>a);
    acts.forEach(a=>a.update());
    const ais=gMode==='br'?allUnits.filter(a=>a!==player):[...allies,...enemies,...sovietBots].filter(a=>a);
    ais.forEach(a=>a.aiUpdate());
    if(ball)ball.update();
    // Belgium effects
    projectiles.forEach(p=>{if(p.bChoco){for(const f of foes(p.belOwner)){if(!f.dead&&dst2(p.x,p.y,f.x,f.y)<(f.sz+8)**2){f.poisonT=300;f.poisonDmg=350;p.active=false;return;}}for(const fr of frds(p.belOwner)){if(!fr.dead&&dst2(p.x,p.y,fr.x,fr.y)<(fr.sz+8)**2){fr.speedBoost=120;p.active=false;return;}}}else if(p.bWaffle)for(const fr of frds(p.belOwner)){if(!fr.dead&&dst2(p.x,p.y,fr.x,fr.y)<(fr.sz+9)**2){fr.shield=Math.min(fr.maxHp*.25,fr.shield+500);p.active=false;return;}}});
    projectiles.forEach(p=>p.update());projectiles=projectiles.filter(p=>p.active);
    areas.forEach(a=>a.update());areas=areas.filter(a=>a.active);
    items.forEach(it=>it.update());items=items.filter(it=>it.active);
    tiles.forEach(t=>t.timer--);tiles=tiles.filter(t=>t.timer>0);
    sovietBots=sovietBots.filter(b=>!b.dead);
    if(gMode==='territory'&&FC%30===0){const tz={x:W.w/2-160,y:W.h/2-160,w:320,h:320};const ina=a=>a&&!a.dead&&a.x>tz.x&&a.x<tz.x+tz.w&&a.y>tz.y&&a.y<tz.y+tz.h;const pa=[player,...allies].filter(ina).length,ea=enemies.filter(ina).length;if(pa>ea)terrGauge.p=Math.min(100,terrGauge.p+.5);else if(ea>pa)terrGauge.e=Math.min(100,terrGauge.e+.5);document.getElementById('sb').textContent=`陣地: 味方${terrGauge.p.toFixed(0)}% 敵${terrGauge.e.toFixed(0)}%`;checkEnd();}
    if(gMode==='crystal_defense'){const eU=enemies.filter(a=>!a.dead);eU.forEach(e=>{if(crystals.p&&dst(e,crystals.p)<e.sz+crystals.p.r+50&&e.atkCD<=0){crystals.p.takeDmg(400);e.atkCD=25;}});const pU=[player,...allies].filter(a=>a&&!a.dead);pU.forEach(u=>{if(crystals.e&&dst(u,crystals.e)<u.sz+crystals.e.r+50&&u.atkCD<=0){crystals.e.takeDmg(400);u.atkCD=25;}});}
    if(gMode==='br'&&FC%60===0){brAlive=allUnits.filter(a=>!a.dead).length;document.getElementById('sb').style.display='block';document.getElementById('sb').textContent=`生存者: ${brAlive}/10`;}
    if(gMode==='point_ko'&&FC%60===0)document.getElementById('sb').textContent=`味方 ${pointScore.p} pt  -  ${pointScore.e} pt 敵`;
    killLog.forEach(k=>k.t--);killLog=killLog.filter(k=>k.t>0);
    dmgNums.forEach(d=>{d.t--;d.y+=d.vy;});dmgNums=dmgNums.filter(d=>d.t>0);
    checkEnd();
  }

  // ── HUD ──
  drawHUD();
  requestAnimationFrame(loop);
}

function drawHUD(){
  const W2=canvas.width,H2=canvas.height;

  // ── TOP BAR (BS style: team health at top) ──
  if(gMode!=='br'){
    const barW=Min(W2*.38,240),barH=22,barY=8;
    // Player team (left)
    const pTeam=[player,...allies].filter(a=>a);
    const pBarX=W2/2-barW-8;
    ctx.fillStyle='rgba(0,0,0,.6)';roundRect(ctx,pBarX-4,barY-4,barW+8,barH+8,8);ctx.fill();
    pTeam.forEach((a,i)=>{
      const bx=pBarX+i*(barW/3),bw2=barW/3-3;
      ctx.fillStyle='rgba(0,0,0,.4)';roundRect(ctx,bx,barY,bw2,barH,barH/2);ctx.fill();
      if(!a.dead){ctx.fillStyle=a.hp/a.maxHp>.5?'#2ecc71':a.hp/a.maxHp>.25?'#f39c12':'#e74c3c';roundRect(ctx,bx,barY,bw2*(a.hp/a.maxHp),barH,barH/2);ctx.fill();}
      ctx.fillStyle='#fff';ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.fillText(CD[a.type].sym,bx+bw2/2,barY+barH/2+3.5);
    });
    // Enemy team (right)
    const eTeam=enemies.filter(a=>a);
    const eBarX=W2/2+8;
    ctx.fillStyle='rgba(0,0,0,.6)';roundRect(ctx,eBarX-4,barY-4,barW+8,barH+8,8);ctx.fill();
    eTeam.forEach((a,i)=>{
      const bx=eBarX+i*(barW/3),bw2=barW/3-3;
      ctx.fillStyle='rgba(0,0,0,.4)';roundRect(ctx,bx,barY,bw2,barH,barH/2);ctx.fill();
      if(!a.dead){ctx.fillStyle=a.hp/a.maxHp>.5?'#e74c3c':a.hp/a.maxHp>.25?'#e67e22':'#c0392b';roundRect(ctx,bx,barY,bw2*(a.hp/a.maxHp),barH,barH/2);ctx.fill();}
      ctx.fillStyle='#fff';ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.fillText(CD[a.type].sym,bx+bw2/2,barY+barH/2+3.5);
    });
  }

  // ── LEFT STICK (movement) ──
  const lx=90,ly=H2-115;
  drawJoystick(lx,ly,stk.mv,'rgba(255,255,255,.12)','rgba(255,255,255,.4)',48);

  // ── RIGHT STICK (attack) ── BS: larger, yellow when can fire
  const rx=W2-120,ry=H2-120;
  const atkReady=player&&player.ammo>0&&player.atkCD<=0;
  drawJoystick(rx,ry,stk.at,atkReady?'rgba(255,220,50,.15)':'rgba(255,255,255,.1)',atkReady?'rgba(255,220,50,.6)':'rgba(255,255,255,.3)',52);
  // Attack label
  ctx.fillStyle='rgba(255,255,255,.55)';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.fillText('通常',rx,ry+68);

  // ── SUPER BUTTON (BS style: top-right of right stick) ──
  const spReady=player&&player.spGauge>=player.spMax;
  const sbx=W2-50,sby=H2-235;
  SUPER_BTN.x=sbx;SUPER_BTN.y=sby;SUPER_BTN.r=40;
  ctx.save();
  // Outer glow ring
  if(spReady){ctx.beginPath();ctx.arc(sbx,sby,SUPER_BTN.r+8,0,Math.PI*2);ctx.fillStyle=`rgba(255,200,0,${.12+.08*Math.sin(FC*.35)})`;ctx.fill();}
  // SP arc progress ring
  if(player){
    const ra=SUPER_BTN.r+5;
    ctx.beginPath();ctx.arc(sbx,sby,ra,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=4;ctx.stroke();
    ctx.beginPath();ctx.arc(sbx,sby,ra,-Math.PI/2,-Math.PI/2+Math.PI*2*(player.spGauge/player.spMax));
    ctx.strokeStyle=spReady?'#ffcc00':'#aa66ff';ctx.lineWidth=4;ctx.stroke();
  }
  // Button body
  const g2=ctx.createRadialGradient(sbx-9,sby-9,0,sbx,sby,SUPER_BTN.r);
  if(spReady){g2.addColorStop(0,'#fff066');g2.addColorStop(.55,'#ffaa00');g2.addColorStop(1,'#cc5500');}
  else{g2.addColorStop(0,'rgba(120,90,180,.9)');g2.addColorStop(.7,'rgba(60,40,100,.9)');g2.addColorStop(1,'rgba(30,20,60,.9)');}
  ctx.beginPath();ctx.arc(sbx,sby,SUPER_BTN.r,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
  ctx.strokeStyle=spReady?'rgba(255,200,0,.9)':'rgba(180,140,255,.4)';ctx.lineWidth=2.5;ctx.stroke();
  // Shine
  ctx.save();ctx.globalAlpha=.22;ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(sbx-6,sby-9,SUPER_BTN.r*.52,SUPER_BTN.r*.26,-.3,0,Math.PI*2);ctx.fill();ctx.restore();
  // SP label
  ctx.fillStyle=spReady?'#5a2d00':'rgba(220,200,255,.9)';ctx.font=`900 ${spReady?14:12}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=3;ctx.strokeText('SP',sbx,sby);ctx.fillText('SP',sbx,sby);
  // Super drag aim indicator (BS: shows aim line while dragging SP button)
  if(stk.sp.a&&player&&!player.dead&&player.spGauge>=player.spMax){
    const dx=stk.sp.cx-stk.sp.bx,dy=stk.sp.cy-stk.sp.by;
    if(Math.hypot(dx,dy)>14){
      ctx.strokeStyle='rgba(255,200,0,.7)';ctx.lineWidth=2;ctx.setLineDash([8,5]);
      const ang=Math.atan2(dy,dx);
      // Draw line from button to drag point (screen coords)
      ctx.beginPath();ctx.moveTo(sbx,sby);ctx.lineTo(stk.sp.cx,stk.sp.cy);ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  if(spReady&&player){ctx.fillStyle='rgba(255,200,0,.9)';ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(CD[player.type].spName.slice(0,8),sbx,sby+SUPER_BTN.r+6);}
  ctx.restore();

  // ── MINIMAP ──
  const mw=88,mh=88,mx=12,my=36;
  ctx.fillStyle='rgba(0,0,0,.72)';roundRect(ctx,mx-3,my-3,mw+6,mh+6,8);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1.5;roundRect(ctx,mx-3,my-3,mw+6,mh+6,8);ctx.stroke();
  const msx=mw/W.w,msy=mh/W.h;
  walls.forEach(w=>{if(w.active&&w.hp>0){ctx.fillStyle=w.absorb?'#604':w.brk?'#654':'#445';ctx.fillRect(mx+w.x*msx,my+w.y*msy,Math.max(1,w.w*msx),Math.max(1,w.h*msy));}});
  const dot=(a,c2,r2=3.5)=>{if(!a||a.dead)return;ctx.fillStyle=c2;ctx.beginPath();ctx.arc(mx+a.x*msx,my+a.y*msy,r2,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1;ctx.stroke();};
  if(gMode==='br')allUnits.forEach(a=>dot(a,a===player?'#00ddff':'#ff6666'));
  else{dot(player,'#00ddff',4.5);allies.forEach(a=>dot(a,'#22ff88'));sovietBots.forEach(b=>dot(b,b.team===TEAM.E?'#ff6666':'#22ff88'));enemies.forEach(e=>dot(e,'#ff6666'));}
  if(ball){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(mx+ball.x*msx,my+ball.y*msy,4,0,Math.PI*2);ctx.fill();}

  // ── KILL LOG ──
  let pi=0,ei=0;
  killLog.filter(k=>k.t>0).forEach(k=>{
    const a=Math.min(1,k.t/40);ctx.save();ctx.globalAlpha=a;ctx.font='bold 11px Arial';
    if(k.side==='p'){ctx.fillStyle='rgba(0,0,0,.65)';roundRect(ctx,4,H2-175-pi*22,220,19,4);ctx.fill();ctx.fillStyle='#44ff88';ctx.textAlign='left';ctx.fillText('▶ '+k.msg,8,H2-162-pi*22);pi++;}
    else{ctx.fillStyle='rgba(0,0,0,.65)';roundRect(ctx,W2-224,H2-175-ei*22,220,19,4);ctx.fill();ctx.fillStyle='#ff6666';ctx.textAlign='right';ctx.fillText(k.msg+' ◀',W2-8,H2-162-ei*22);ei++;}
    ctx.restore();
  });

  // ── DAMAGE NUMBERS ──
  dmgNums.forEach(d=>{
    const a=d.t/70;const sx=d.x+W2/2-cam.x,sy=d.y+H2/2-cam.y;
    ctx.save();ctx.globalAlpha=a;ctx.font=`900 ${d.val>1500?16:13}px Arial`;ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,.9)';ctx.lineWidth=3.5;ctx.strokeText(d.val,sx,sy);ctx.fillStyle=d.col;ctx.fillText(d.val,sx,sy);ctx.restore();
  });

  // ── POINT KO HUD ──
  if(gMode==='point_ko'){
    const all=[player,...allies,...enemies].filter(a=>a&&!a.dead);
    let yi=H2/2-all.length*17;
    ctx.fillStyle='rgba(0,0,0,.68)';roundRect(ctx,2,yi-6,140,all.length*34+12,6);ctx.fill();
    all.forEach(a=>{const pt=unitPoints[a.id]||2;const tc=a.team===TEAM.E?'#ff8888':'#88ddff';ctx.fillStyle=tc;ctx.font='bold 11px Arial';ctx.textAlign='left';ctx.fillText(`${CD[a.type].sym} ${pt}pt`,8,yi+12);yi+=22;});
  }
}

function Min(a,b){return a<b?a:b;}

function drawJoystick(x,y,s,bgCol,knobCol,r){
  ctx.save();ctx.globalAlpha=.72;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=bgCol;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=2;ctx.stroke();
  if(s.a){
    const ang=Math.atan2(s.cy-s.by,s.cx-s.bx);const d=Math.min(r*.78,Math.hypot(s.cx-s.bx,s.cy-s.by));
    const kx=x+Math.cos(ang)*d,ky=y+Math.sin(ang)*d;
    const kg=ctx.createRadialGradient(kx-r*.12,ky-r*.12,0,kx,ky,r*.44);
    kg.addColorStop(0,'rgba(255,255,255,.95)');kg.addColorStop(1,knobCol);
    ctx.beginPath();ctx.arc(kx,ky,r*.44,0,Math.PI*2);ctx.fillStyle=kg;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1.5;ctx.stroke();
  }else{
    ctx.beginPath();ctx.arc(x,y,r*.26,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.12)';ctx.fill();
  }
  ctx.globalAlpha=1;ctx.restore();
}

buildHomeUI();
</script>
