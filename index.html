<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Global Brawl</title>

<style>

body{
margin:0;
overflow:hidden;
background:#000;
font-family:sans-serif;
color:white;
}

canvas{display:block}

#menu{
position:absolute;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

#chars{
display:grid;
grid-template-columns:repeat(3,120px);
gap:10px;
}

.btn{
padding:16px;
background:#222;
border:2px solid #555;
border-radius:8px;
cursor:pointer;
text-align:center;
}

#countdown{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
display:none;
}

#killLog{
position:absolute;
right:10px;
top:10px;
width:220px;
font-size:14px;
}

#ultBtn{
position:absolute;
right:40px;
bottom:40px;
width:90px;
height:90px;
border-radius:50%;
border:4px solid white;
display:flex;
align-items:center;
justify-content:center;
background:#111;
}

#stickBase{
position:absolute;
left:40px;
bottom:40px;
width:140px;
height:140px;
border-radius:50%;
background:rgba(255,255,255,0.1);
}

#stick{
position:absolute;
left:70px;
bottom:70px;
width:80px;
height:80px;
border-radius:50%;
background:rgba(255,255,255,0.3);
}

</style>

</head>

<body>

<div id="menu">
<h1>GLOBAL BRAWL</h1>
<div id="chars"></div>
</div>

<div id="countdown"></div>
<div id="killLog"></div>
<div id="ultBtn">ULT</div>

<div id="stickBase"></div>
<div id="stick"></div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

const WORLD={w:1200,h:1200}

let player
let enemies=[]
let bullets=[]
let killLogs=[]

let camX=0
let camY=0

let state="menu"

const CHAR={
soviet:{hp:8000,spd:2.5,size:55,col:"#c00"},
usa:{hp:4500,spd:5,size:40,col:"#346"},
uk:{hp:4000,spd:6,size:35,col:"#048"},
france:{hp:5000,spd:4,size:40,col:"#e33"},
germany:{hp:5500,spd:5,size:40,col:"#333"},
japan:{hp:4500,spd:6.5,size:38,col:"#fff"}
}

class Actor{

constructor(x,y,type,team){

this.x=x
this.y=y
this.type=type
this.team=team

this.hp=CHAR[type].hp
this.maxHp=this.hp
this.spd=CHAR[type].spd
this.size=CHAR[type].size

this.ult=0
this.dead=false

}

draw(){

if(this.dead)return

ctx.beginPath()
ctx.arc(this.x-camX,this.y-camY,this.size,0,Math.PI*2)
ctx.fillStyle=CHAR[this.type].col
ctx.fill()

ctx.fillStyle="#0f0"
ctx.fillRect(this.x-40-camX,this.y-this.size-20-camY,80*(this.hp/this.maxHp),6)

}

}

class Bullet{

constructor(x,y,ang,owner){

this.x=x
this.y=y
this.ang=ang
this.spd=14
this.owner=owner
this.life=120

}

update(){

this.x+=Math.cos(this.ang)*this.spd
this.y+=Math.sin(this.ang)*this.spd

this.life--

if(this.life<0)this.dead=true

let tgts=this.owner.team==="p"?enemies:[player]

for(let t of tgts){

if(t.dead)continue

let d=Math.hypot(this.x-t.x,this.y-t.y)

if(d<t.size){

t.hp-=400
this.dead=true

if(t.hp<=0){

t.dead=true
addKill(this.owner.type,t.type)

}

if(this.owner.team==="p")
player.ult=Math.min(100,player.ult+10)

}

}

}

draw(){

ctx.beginPath()
ctx.arc(this.x-camX,this.y-camY,6,0,Math.PI*2)
ctx.fillStyle="#fff"
ctx.fill()

}

}

function addKill(a,b){

killLogs.unshift(a+" defeated "+b)
if(killLogs.length>6)killLogs.pop()

let div=document.getElementById("killLog")
div.innerHTML=""

killLogs.forEach(k=>{
let d=document.createElement("div")
d.innerText=k
div.appendChild(d)
})

}

function fire(actor,ang){

bullets.push(new Bullet(actor.x,actor.y,ang,actor))

}

function useUlt(){

if(player.ult<100)return
player.ult=0

for(let e of enemies){

if(e.dead)continue
e.hp-=1500

if(e.hp<=0){
e.dead=true
addKill(player.type,e.type)
}

}

}

function ai(){

for(let e of enemies){

if(e.dead)continue

let ang=Math.atan2(player.y-e.y,player.x-e.x)

e.x+=Math.cos(ang)*e.spd*0.6
e.y+=Math.sin(ang)*e.spd*0.6

if(Math.random()<0.02)
fire(e,ang)

}

}

let moveX=0
let moveY=0

function update(){

player.x+=moveX*player.spd
player.y+=moveY*player.spd

player.x=Math.max(0,Math.min(WORLD.w,player.x))
player.y=Math.max(0,Math.min(WORLD.h,player.y))

ai()

bullets.forEach(b=>b.update())
bullets=bullets.filter(b=>!b.dead)

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

camX=player.x-canvas.width/2
camY=player.y-canvas.height/2

player.draw()

enemies.forEach(e=>e.draw())
bullets.forEach(b=>b.draw())

drawUlt()

}

function drawUlt(){

let x=canvas.width-85
let y=canvas.height-85
let r=45

ctx.beginPath()
ctx.arc(x,y,r,0,Math.PI*2)
ctx.strokeStyle="#444"
ctx.lineWidth=6
ctx.stroke()

let p=player.ult/100

ctx.beginPath()
ctx.arc(x,y,r,-Math.PI/2,-Math.PI/2+Math.PI*2*p)
ctx.strokeStyle="#ff0"
ctx.lineWidth=6
ctx.stroke()

ctx.fillStyle="#fff"
ctx.textAlign="center"
ctx.fillText("ULT",x,y+5)

}

function loop(){

if(state==="play"){
update()
draw()
}

requestAnimationFrame(loop)

}

function start(type){

document.getElementById("menu").style.display="none"

const cd=document.getElementById("countdown")
cd.style.display="block"

let t=3
cd.innerText=t

let timer=setInterval(()=>{

t--

if(t>0){
cd.innerText=t
}else{

cd.innerText="START"

clearInterval(timer)

setTimeout(()=>{

cd.style.display="none"

player=new Actor(600,600,type,"p")

enemies=[
new Actor(900,700,"germany","e"),
new Actor(800,900,"soviet","e"),
new Actor(700,900,"usa","e")
]

state="play"
loop()

},800)

}

},1000)

}

function createMenu(){

let div=document.getElementById("chars")

for(let k in CHAR){

let b=document.createElement("div")
b.className="btn"
b.innerText=k
b.onclick=()=>start(k)

div.appendChild(b)

}

}

canvas.addEventListener("mousedown",e=>{

let ang=Math.atan2(e.clientY-canvas.height/2,e.clientX-canvas.width/2)
fire(player,ang)

})

document.getElementById("ultBtn").onclick=useUlt

/* 仮想スティック */

let stick=document.getElementById("stick")
let base=document.getElementById("stickBase")

base.addEventListener("touchmove",e=>{

let t=e.touches[0]

let rect=base.getBoundingClientRect()

let x=t.clientX-(rect.left+70)
let y=t.clientY-(rect.top+70)

let d=Math.hypot(x,y)

if(d>60){

x*=60/d
y*=60/d

}

stick.style.transform=`translate(${x}px,${y}px)`

moveX=x/60
moveY=y/60

})

base.addEventListener("touchend",()=>{

stick.style.transform="translate(0px,0px)"
moveX=0
moveY=0

})

createMenu()

</script>

</body>
</html>
