<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Global Brawl Ultimate</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif}
canvas{display:block}
#ui{
position:absolute;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white
}
.btn{
padding:14px;
background:#222;
border:2px solid #555;
margin:6px;
cursor:pointer;
}
.hidden{display:none}
</style>
</head>

<body>

<div id="ui">
<h1>GLOBAL BRAWL</h1>
<div id="chars"></div>

<div id="respawn" class="hidden">
<h2>DEFEATED</h2>
<div class="btn" onclick="respawn()">RESPAWN</div>
</div>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=innerWidth
canvas.height=innerHeight
}
resize()
addEventListener("resize",resize)

let player
let enemies=[]
let bullets=[]
let areas=[]
let fields=[]
let bots=[]

let state="menu"

const CHAR={

soviet:{hp:8000,spd:2.5,size:60,color:"#c00"},
usa:{hp:4500,spd:5,size:45,color:"#346"},
uk:{hp:4000,spd:6.5,size:30,color:"#048"},
france:{hp:5000,spd:4,size:40,color:"#e33"},
germany:{hp:5500,spd:5,size:40,color:"#333"},
japan:{hp:4500,spd:6.8,size:38,color:"#fff"},
italy:{hp:5000,spd:4.2,size:40,color:"#094"},
china:{hp:6000,spd:4,size:45,color:"#e12"},
canada:{hp:6500,spd:3,size:50,color:"#f00"},
finland:{hp:4800,spd:5,size:40,color:"#ccc"}

}

class Actor{

constructor(x,y,type,team){

this.x=x
this.y=y
this.type=type
this.team=team

this.hp=CHAR[type].hp
this.maxHp=this.hp
this.spd=CHAR[type].spd
this.size=CHAR[type].size

this.ammo=3
this.reload=0

this.combo=0
this.comboTimer=0

this.ult=0
this.dead=false

this.invis=false

}

update(){

if(this.dead)return

if(this.ammo<3){
this.reload++
if(this.reload>80){
this.ammo++
this.reload=0
}
}

if(Date.now()>this.comboTimer){
this.combo=0
}

}

draw(){

if(this.dead)return

ctx.save()

if(this.invis)ctx.globalAlpha=0.2

ctx.translate(this.x,this.y)

ctx.beginPath()
ctx.arc(0,0,this.size,0,Math.PI*2)
ctx.fillStyle=CHAR[this.type].color
ctx.fill()

ctx.restore()

let hpw=80
ctx.fillStyle="#000"
ctx.fillRect(this.x-40,this.y-this.size-20,hpw,6)

ctx.fillStyle="#0f0"
ctx.fillRect(this.x-40,this.y-this.size-20,hpw*(this.hp/this.maxHp),6)

}

}

class Bullet{

constructor(x,y,ang,spd,dmg,owner){

this.x=x
this.y=y
this.ang=ang
this.spd=spd
this.dmg=dmg
this.owner=owner

this.life=120

}

update(){

this.x+=Math.cos(this.ang)*this.spd
this.y+=Math.sin(this.ang)*this.spd

this.life--

if(this.life<0)this.dead=true

let tgts=this.owner.team==="p"?enemies:[player]

for(let t of tgts){

if(t.dead)continue

let d=Math.hypot(this.x-t.x,this.y-t.y)

if(d<t.size){

t.hp-=this.dmg
this.dead=true

if(t.hp<=0)t.dead=true

}

}

}

draw(){

ctx.beginPath()
ctx.arc(this.x,this.y,8,0,Math.PI*2)
ctx.fillStyle="#fff"
ctx.fill()

}

}

class Area{

constructor(x,y,r,dmg,owner){

this.x=x
this.y=y
this.r=r
this.dmg=dmg
this.owner=owner

this.life=20

}

update(){

this.life--

let tgts=this.owner.team==="p"?enemies:[player]

for(let t of tgts){

if(t.dead)continue

let d=Math.hypot(this.x-t.x,this.y-t.y)

if(d<this.r){

t.hp-=this.dmg

}

}

if(this.life<0)this.dead=true

}

draw(){

ctx.beginPath()
ctx.arc(this.x,this.y,this.r,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,0.2)"
ctx.fill()

}

}

function fire(actor,ang){

if(actor.ammo<=0)return

actor.combo++
actor.comboTimer=Date.now()+1000

if(actor.type==="usa"){

for(let i=0;i<5;i++){

bullets.push(
new Bullet(actor.x,actor.y,ang+(Math.random()-0.5)*0.2,18,250,actor)
)

}

}

else if(actor.type==="uk"){

bullets.push(
new Bullet(actor.x,actor.y,ang,25,900,actor)
)

}

else{

bullets.push(
new Bullet(actor.x,actor.y,ang,20,400,actor)
)

}

actor.ammo--

}

function respawn(){

document.getElementById("respawn").classList.add("hidden")

player.dead=false
player.hp=player.maxHp
player.x=600
player.y=600

}

function start(type){

document.getElementById("ui").classList.add("hidden")

player=new Actor(600,600,type,"p")

enemies=[
new Actor(1000,800,"germany","e"),
new Actor(1200,600,"soviet","e"),
new Actor(900,900,"usa","e")
]

state="play"

loop()

}

function createMenu(){

let div=document.getElementById("chars")

for(let k in CHAR){

let b=document.createElement("div")
b.className="btn"
b.innerText=k

b.onclick=()=>start(k)

div.appendChild(b)

}

}

function ai(){

for(let e of enemies){

if(e.dead)continue

let ang=Math.atan2(player.y-e.y,player.x-e.x)

e.x+=Math.cos(ang)*e.spd*0.6
e.y+=Math.sin(ang)*e.spd*0.6

if(Math.random()<0.02)fire(e,ang)

}

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(state==="play"){

player.update()

ai()

for(let b of bullets)b.update()
bullets=bullets.filter(b=>!b.dead)

for(let a of areas)a.update()
areas=areas.filter(a=>!a.dead)

player.draw()

for(let e of enemies)e.draw()

for(let b of bullets)b.draw()

for(let a of areas)a.draw()

if(player.hp<=0 && !player.dead){

player.dead=true
document.getElementById("respawn").classList.remove("hidden")

}

}

requestAnimationFrame(loop)

}

addEventListener("mousedown",e=>{

if(state!=="play")return

let ang=Math.atan2(
e.clientY-player.y,
e.clientX-player.x
)

fire(player,ang)

})

createMenu()

</script>

</body>
</html>
