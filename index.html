<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Brawl - Final</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Arial', sans-serif; user-select: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); color: white; flex-direction: column; z-index: 10; }
        .char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .char-btn { padding: 15px; background: #333; border: 2px solid #555; cursor: pointer; text-align: center; border-radius: 8px; }
        .char-btn:hover { background: #555; border-color: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h1>GLOBAL BRAWL</h1>
        <p>キャラクターを選択してスタート</p>
        <div class="char-grid" id="charGrid"></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let gameState = 'home';
        let player;
        let enemies = [];
        let bullets = [];
        let walls = [];
        let gameObjects = [];

        const WORLD = { w: 3000, h: 3000, grid: 100 };
        const CHAR_CONFIG = {
            soviet:  { name: "ソビエト", hp: 8000, speed: 2.8, size: 50, color: "#cc0000", symbol: "★", reload: 2000, dmg: 800 },
            usa:     { name: "アメリカ", hp: 4500, speed: 4.5, size: 35, color: "#3c3b6e", symbol: "☆", reload: 1500, dmg: 250 },
            uk:      { name: "イギリス", hp: 4000, speed: 4.8, size: 30, color: "#00247d", symbol: "✠", reload: 1800, dmg: 1500 },
            france:  { name: "フランス", hp: 5000, speed: 3.5, size: 35, color: "#ed2939", symbol: "🇫🇷", reload: 1700, dmg: 900 },
            germany: { name: "ドイツ", hp: 5500, speed: 4.0, size: 35, color: "#333", symbol: "✠", reload: 1500, dmg: 150 },
            japan:   { name: "日本", hp: 4500, speed: 5.0, size: 35, color: "#fff", symbol: "☉", reload: 1000, dmg: 1000 },
            italy:   { name: "イタリア", hp: 5000, speed: 3.5, size: 35, color: "#009246", symbol: "🍕", reload: 4000, dmg: 200 },
            china:   { name: "中国", hp: 6000, speed: 3.5, size: 40, color: "#ee1c25", symbol: "五", reload: 1800, dmg: 300 },
            canada:  { name: "カナダ", hp: 6500, speed: 3.0, size: 40, color: "#ff0000", symbol: "🍁", reload: 2000, dmg: 400 },
            finland: { name: "フィンランド", hp: 4800, speed: 4.5, size: 35, color: "#003580", symbol: "❄", reload: 2000, dmg: 1800 }
        };

        // --- 初期化 ---
        function initHome() {
            const grid = document.getElementById("charGrid");
            Object.keys(CHAR_CONFIG).forEach(key => {
                const btn = document.createElement("div");
                btn.className = "char-btn";
                btn.innerHTML = `${CHAR_CONFIG[key].symbol}<br><small>${CHAR_CONFIG[key].name}</small>`;
                btn.onclick = () => startGame(key);
                grid.appendChild(btn);
            });
        }

        function startGame(charKey) {
            document.getElementById("ui-layer").classList.add("hidden");
            player = new Actor(500, 1500, "player", charKey);
            enemies = [
                new Actor(2500, 1000, "enemy", "usa"),
                new Actor(2500, 2000, "enemy", "germany")
            ];
            // AIのスピードを少し下方修正
            enemies.forEach(e => e.speed *= 0.8);
            
            walls = [
                new Wall(1000, 500, 100, 2000, 0),
                new Wall(1500, 1200, 500, 100, 2)
            ];
            gameState = 'playing';
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- クラス ---
        class Actor {
            constructor(x, y, team, type) {
                this.x = x; this.y = y; this.team = team; this.type = type;
                const c = CHAR_CONFIG[type];
                this.hp = c.hp; this.maxHp = c.hp;
                this.speed = c.speed; this.size = c.size;
                this.ammo = 3; this.maxAmmo = (type==='italy'?1:3);
                this.ult = 0;
                this.lastReload = Date.now();
                this.lastCombat = Date.now(); // 自然回復用
                this.dead = false; this.deathT = 0;
            }

            update(angle, moving) {
                const now = Date.now();
                if (this.dead) {
                    if (now - this.deathT > 5000) {
                        this.dead = false; this.hp = this.maxHp; this.x = (this.team==='player'?500:2500);
                    }
                    return;
                }

                // 自然回復: 3秒間ダメージも攻撃もなければ、秒間5%回復
                if (now - this.lastCombat > 3000 && this.hp < this.maxHp) {
                    this.hp = Math.min(this.maxHp, this.hp + (this.maxHp * 0.002));
                }

                // リロード
                if (this.ammo < this.maxAmmo && now - this.lastReload > CHAR_CONFIG[this.type].reload) {
                    this.ammo++; this.lastReload = now;
                }

                if (moving) {
                    let nx = this.x + Math.cos(angle) * this.speed;
                    let ny = this.y + Math.sin(angle) * this.speed;
                    // 衝突判定。少し余裕を持たせて「動けなくなる」のを防ぐ
                    if (!this.isColliding(nx, this.y)) this.x = nx;
                    if (!this.isColliding(this.x, ny)) this.y = ny;
                    this.x = Math.max(this.size, Math.min(WORLD.w - this.size, this.x));
                    this.y = Math.max(this.size, Math.min(WORLD.h - this.size, this.y));
                }
            }

            isColliding(nx, ny) {
                for (let w of walls) {
                    if (!w.alive || w.type === 1) continue;
                    if (nx + this.size*0.4 > w.x && nx - this.size*0.4 < w.x + w.w &&
                        ny + this.size*0.4 > w.y && ny - this.size*0.4 < w.y + w.h) return true;
                }
                return false;
            }

            draw() {
                if (this.dead) return;
                ctx.save(); ctx.translate(this.x, this.y);
                ctx.beginPath(); ctx.arc(0, 0, this.size, 0, Math.PI*2);
                ctx.fillStyle = CHAR_CONFIG[this.type].color; ctx.fill();
                ctx.fillStyle = "#fff"; ctx.font = "bold 20px Arial"; ctx.textAlign = "center";
                ctx.fillText(CHAR_CONFIG[this.type].symbol, 0, 7);
                ctx.restore();

                // UI
                ctx.fillStyle = "white"; ctx.font = "14px Arial"; ctx.textAlign = "center";
                ctx.fillText(Math.floor(this.hp), this.x, this.y - this.size - 20);
                for(let i=0; i<this.maxAmmo; i++) {
                    ctx.fillStyle = i < this.ammo ? "#ffee00" : "#555";
                    ctx.fillRect(this.x - 25 + i*18, this.y - this.size - 10, 15, 5);
                }
            }
        }

        class Wall {
            constructor(x, y, w, h, type) {
                this.x = x; this.y = y; this.w = w; this.h = h;
                this.type = type; this.hp = 1500; this.alive = true;
            }
            draw() {
                if (!this.alive) return;
                ctx.fillStyle = this.type === 0 ? "#444" : "#8b4513";
                ctx.fillRect(this.x, this.y, this.w, this.h);
            }
        }

        class Bullet {
            constructor(x, y, angle, speed, dmg, owner, color="yellow") {
                this.x = x; this.y = y; this.sx = x; this.sy = y;
                this.angle = angle; this.speed = speed; this.dmg = dmg || 500;
                this.owner = owner; this.color = color; this.active = true;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                if (Math.hypot(this.x - this.sx, this.y - this.sy) > 600) this.active = false;
                
                for(let w of walls) {
                    if (w.alive && w.type !== 1 && this.x > w.x && this.x < w.x+w.w && this.y > w.y && this.y < w.y+w.h) {
                        if (w.type === 2) w.hp -= this.dmg;
                        if (w.hp <= 0) w.alive = false;
                        this.active = false;
                    }
                }
            }
        }

        // --- 操作 ---
        let sticks = {
            move: { active: false, id: null, bx: 0, by: 0, cx: 0, cy: 0 },
            atk: { active: false, id: null, bx: 0, by: 0, cx: 0, cy: 0 },
            ult: { active: false, id: null, bx: 0, by: 0, cx: 0, cy: 0 }
        };

        canvas.addEventListener("touchstart", (e) => {
            if (gameState !== 'playing') return;
            for (let t of e.changedTouches) {
                if (t.clientX < canvas.width / 2) startStick('move', t);
                else if (t.clientY > canvas.height / 2) startStick('atk', t);
                else startStick('ult', t);
            }
        });

        function startStick(k, t) { sticks[k].active = true; sticks[k].id = t.identifier; sticks[k].bx = sticks[k].cx = t.clientX; sticks[k].by = sticks[k].cy = t.clientY; }
        canvas.addEventListener("touchmove", (e) => { for (let t of e.changedTouches) { for (let k in sticks) if (sticks[k].id === t.identifier) { sticks[k].cx = t.clientX; sticks[k].cy = t.clientY; } } });
        canvas.addEventListener("touchend", (e) => { for (let t of e.changedTouches) { for (let k in sticks) if (sticks[k].id === t.identifier) {
            if (k !== 'move') fire(player, sticks[k], k === 'ult');
            sticks[k].active = false; sticks[k].id = null;
        } } });

        function fire(a, s, isUlt) {
            if (a.dead || (!isUlt && a.ammo <= 0) || (isUlt && a.ult < 100)) return;
            const angle = Math.atan2(s.cy - s.by, s.cx - s.bx);
            const dmg = CHAR_CONFIG[a.type].dmg || 500;
            
            bullets.push(new Bullet(a.x, a.y, angle, 15, isUlt ? dmg*2 : dmg, a, isUlt ? "orange" : "yellow"));
            if (!isUlt) a.ammo--; else a.ult = 0;
            a.lastCombat = Date.now();
        }

        // --- ループ ---
        function loop() {
            if (gameState === 'playing') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 更新
                let mvAng = Math.atan2(sticks.move.cy - sticks.move.by, sticks.move.cx - sticks.move.bx);
                player.update(mvAng, sticks.move.active);

                enemies.forEach(en => {
                    let d = Math.hypot(player.x - en.x, player.y - en.y);
                    let a = Math.atan2(player.y - en.y, player.x - en.x);
                    if (!en.dead && d < 500 && Math.random() < 0.02) fire(en, {bx:0,by:0,cx:Math.cos(a),cy:Math.sin(a)}, false);
                    en.update(a, !en.dead && d > 300);
                });

                // 描画
                ctx.save(); ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);
                ctx.fillStyle = "#1a331a"; ctx.fillRect(0,0,WORLD.w,WORLD.h);
                walls.forEach(w => w.draw());
                
                bullets = bullets.filter(b => {
                    b.update();
                    let tgs = b.owner.team === 'player' ? enemies : [player];
                    for (let t of tgs) {
                        if (!t.dead && Math.hypot(b.x - t.x, b.y - t.y) < t.size) {
                            t.hp -= b.dmg;
                            t.lastCombat = Date.now();
                            if (b.owner.team === 'player') b.owner.ult = Math.min(100, b.owner.ult + 25); // 4発で溜まる
                            if (t.hp <= 0) { t.dead = true; t.deathT = Date.now(); }
                            return false;
                        }
                    }
                    ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill();
                    return b.active;
                });

                player.draw();
                enemies.forEach(e => e.draw());
                ctx.restore();

                // UIスティック
                drawUI();
            }
            requestAnimationFrame(loop);
        }

        function drawUI() {
            // スティック描画省略（前のコードと同様）
            const drawS = (x, y, s, color, prog=null) => {
                ctx.beginPath(); ctx.arc(x, y, 60, 0, Math.PI*2); ctx.strokeStyle = color; ctx.stroke();
                if (prog !== null) { ctx.beginPath(); ctx.arc(x, y, 60, -Math.PI/2, -Math.PI/2+(Math.PI*2*(prog/100))); ctx.strokeStyle="#fff"; ctx.lineWidth=8; ctx.stroke(); ctx.lineWidth=1; }
                if (s.active) {
                    let a = Math.atan2(s.cy-s.by, s.cx-s.bx); let d = Math.min(60, Math.hypot(s.cx-s.bx, s.cy-s.by));
                    ctx.beginPath(); ctx.arc(x+Math.cos(a)*d, y+Math.sin(a)*d, 30, 0, Math.PI*2); ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.fill();
                }
            };
            drawS(120, canvas.height-120, sticks.move, "#fff");
            drawS(canvas.width-120, canvas.height-120, sticks.atk, "#ffee00");
            drawS(canvas.width-120, 120, sticks.ult, player.ult>=100?"#f00":"#555", player.ult);
        }

        initHome();
        loop();
    </script>
</body>
</html>
