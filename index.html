<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Global Brawl</title>
<style>

body{
margin:0;
overflow:hidden;
background:#000;
font-family:sans-serif;
color:white;
}

canvas{display:block}

#ui{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#chars{
display:grid;
grid-template-columns:repeat(3,120px);
gap:10px;
}

.btn{
padding:16px;
background:#222;
border:2px solid #555;
border-radius:8px;
cursor:pointer;
text-align:center;
}

.btn:hover

#countdown{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
font-weight:bold;
display:none;
}

#killLog{
position:absolute;
top:10px;
right:10px;
width:220px;
font-size:14px;
}

.kill{
margin-bottom:4px;
opacity:0.9;
}

#ultBtn{
position:absolute;
right:40px;
bottom:40px;
width:90px;
height:90px;
border-radius:50%;
border:4px solid white;
display:flex;
align-items:center;
justify-content:center;
background:#111;
}

</style>
</head>

<body>

<div id="ui">
<h1>GLOBAL BRAWL</h1>
<div id="chars"></div>
</div>

<div id="countdown"></div>
<div id="killLog"></div>
<div id="ultBtn">ULT</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

const WORLD={w:1800,h:1800}

let player
let enemies=[]
let bullets=[]
let areas=[]
let state="menu"

let killLogs=[]

const CHAR={

soviet:{hp:8000,spd:2.5,size:60,col:"#c00"},
usa:{hp:4500,spd:5,size:45,col:"#346"},
uk:{hp:4000,spd:6.5,size:30,col:"#048"},
france:{hp:5000,spd:4,size:40,col:"#e33"},
germany:{hp:5500,spd:5,size:40,col:"#333"},
japan:{hp:4500,spd:6.8,size:38,col:"#fff"},
italy:{hp:5000,spd:4.2,size:40,col:"#094"},
china:{hp:6000,spd:4,size:45,col:"#e12"},
canada:{hp:6500,spd:3,size:50,col:"#f00"},
finland:{hp:4800,spd:5,size:40,col:"#ccc"}

}

class Actor{

constructor(x,y,type,team){

this.x=x
this.y=y
this.type=type
this.team=team

this.hp=CHAR[type].hp
this.maxHp=this.hp
this.spd=CHAR[type].spd
this.size=CHAR[type].size

this.ammo=3
this.reload=0
this.ult=0

this.dead=false

}

update(){

if(this.dead)return

if(this.ammo<3){

this.reload++

if(this.reload>80){

this.ammo++
this.reload=0

}

}

}

draw(){

if(this.dead)return

ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)
ctx.fillStyle=CHAR[this.type].col
ctx.fill()

let hpw=80

ctx.fillStyle="#000"
ctx.fillRect(this.x-40,this.y-this.size-20,hpw,6)

ctx.fillStyle="#0f0"
ctx.fillRect(this.x-40,this.y-this.size-20,hpw*(this.hp/this.maxHp),6)

}

}

class Bullet{

constructor(x,y,ang,spd,dmg,owner){

this.x=x
this.y=y
this.ang=ang
this.spd=spd
this.dmg=dmg
this.owner=owner
this.life=120

}

update(){

this.x+=Math.cos(this.ang)*this.spd
this.y+=Math.sin(this.ang)*this.spd

this.life--

if(this.life<0)this.dead=true

let tgts=this.owner.team==="p"?enemies:[player]

for(let t of tgts){

if(t.dead)continue

let d=Math.hypot(this.x-t.x,this.y-t.y)

if(d<t.size){

t.hp-=this.dmg
this.dead=true

if(t.hp<=0){

t.dead=true
addKillLog(this.owner.type,t.type)

}

if(this.owner.team==="p")
player.ult=Math.min(100,player.ult+5)

}

}

}

draw(){

ctx.beginPath()
ctx.arc(this.x,this.y,8,0,Math.PI*2)
ctx.fillStyle="#fff"
ctx.fill()

}

}

function addKillLog(a,b){

let log=a+" defeated "+b

killLogs.unshift(log)

if(killLogs.length>6)killLogs.pop()

renderKillLog()

}

function renderKillLog(){

const div=document.getElementById("killLog")
div.innerHTML=""

killLogs.forEach(l=>{

let d=document.createElement("div")
d.className="kill"
d.innerText=l
div.appendChild(d)

})

}

function fire(actor,ang){

if(actor.ammo<=0)return

bullets.push(
new Bullet(actor.x,actor.y,ang,18,400,actor)
)

actor.ammo--

}

function useUlt(){

if(player.ult<100)return

player.ult=0

for(let i=0;i<10;i++){

setTimeout(()=>{

areas.push({
x:player.x+Math.random()*400-200,
y:player.y+Math.random()*400-200,
r:120,
life:20
})

},i*120)

}

}

function drawUltGauge(){

let x=canvas.width-85
let y=canvas.height-85
let r=45

ctx.beginPath()
ctx.arc(x,y,r,0,Math.PI*2)
ctx.strokeStyle="#444"
ctx.lineWidth=6
ctx.stroke()

let p=player.ult/100

ctx.beginPath()
ctx.arc(x,y,r,-Math.PI/2,-Math.PI/2+Math.PI*2*p)
ctx.strokeStyle="#ff0"
ctx.lineWidth=6
ctx.stroke()

ctx.fillStyle="#fff"
ctx.textAlign="center"
ctx.fillText("ULT",x,y+5)

}

function ai(){

for(let e of enemies){

if(e.dead)continue

let ang=Math.atan2(player.y-e.y,player.x-e.x)

e.x+=Math.cos(ang)*e.spd*0.6
e.y+=Math.sin(ang)*e.spd*0.6

if(Math.random()<0.02)fire(e,ang)

}

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(state==="play"){

player.update()
ai()

bullets.forEach(b=>b.update())
bullets=bullets.filter(b=>!b.dead)

player.draw()
enemies.forEach(e=>e.draw())
bullets.forEach(b=>b.draw())

areas.forEach(a=>{

ctx.beginPath()
ctx.arc(a.x,a.y,a.r,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,0.2)"
ctx.fill()

a.life--

if(a.life<0)a.dead=true

})

areas=areas.filter(a=>!a.dead)

drawUltGauge()

if(player.hp<=0 && !player.dead){

player.dead=true
document.getElementById("ui").style.display="flex"

}

}

requestAnimationFrame(loop)

}

function start(type){

document.getElementById("ui").style.display="none"

const cd=document.getElementById("countdown")
cd.style.display="block"

let t=3
cd.innerText=t

let timer=setInterval(()=>{

t--

if(t>0){

cd.innerText=t

}else{

cd.innerText="START!"

clearInterval(timer)

setTimeout(()=>{

cd.style.display="none"

player=new Actor(600,600,type,"p")

enemies=[
new Actor(900,700,"germany","e"),
new Actor(1000,900,"soviet","e"),
new Actor(800,1000,"usa","e")
]

state="play"
loop()

},800)

}

},1000)

}

function createMenu(){

let div=document.getElementById("chars")

for(let k in CHAR){

let b=document.createElement("div")
b.className="btn"
b.innerText=k

b.onclick=()=>start(k)

div.appendChild(b)

}

}

addEventListener("mousedown",e=>{

if(state!=="play")return

let ang=Math.atan2(e.clientY-player.y,e.clientX-player.x)

fire(player,ang)

})

document.getElementById("ultBtn").onclick=useUlt

createMenu()

</script>

</body>
</html>
