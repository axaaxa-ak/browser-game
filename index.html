<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const WORLD_SIZE = 3000;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // キャラクターテンプレート
        class Character {
            constructor(x, y, team, type) {
                this.x = x; this.y = y; this.team = team; this.type = type;
                this.hp = 5000; this.maxHp = 5000;
                this.ammo = 3; this.maxAmmo = 3;
                this.size = 30; this.speed = 3;
                this.ultGauge = 0;
                this.lastReload = Date.now();
                this.isDead = false;
                this.respawnTimer = 0;
                this.attackStep = 1; // ソビエト用
            }

            draw() {
                if(this.isDead) return;
                // 自キャラ中心描画
                ctx.fillStyle = this.team === "player" ? "#00a2ff" : "#ff4444";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();

                // 頭上UI
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.fillText(`HP: ${Math.floor(this.hp)}`, this.x, this.y - this.size - 20);
                ctx.fillText("●".repeat(this.ammo), this.x, this.y - this.size - 5);
            }
        }

        let p1 = new Character(1500, 1500, "player", "soviet");
        let enemies = [new Character(1700, 1700, "enemy", "usa")];
        let walls = [
            {x: 1400, y: 1300, w: 200, h: 50, dest: true, bulletPass: true, hp: 1000}, // 弾すり抜け・壊れる壁
            {x: 1600, y: 1500, w: 50, h: 200, dest: false, bulletPass: false} // 絶対壊れない壁
        ];

        let sticks = {
            move: { active: false, id: null, bx: 0, by: 0, cx: 0, cy: 0 },
            atk: { active: false, id: null, bx: 0, by: 0, cx: 0, cy: 0 },
            ult: { active: false, id: null, bx: 0, by: 0, cx: 0, cy: 0 }
        };

        canvas.addEventListener("touchstart", (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < canvas.width * 0.4) setupStick('move', t);
                else if (t.clientY > canvas.height * 0.5) setupStick('atk', t);
                else setupStick('ult', t);
            }
        });

        function setupStick(type, t) {
            sticks[type].active = true;
            sticks[type].id = t.identifier;
            sticks[type].bx = sticks[type].cx = t.clientX;
            sticks[type].by = sticks[type].cy = t.clientY;
        }

        canvas.addEventListener("touchmove", (e) => {
            for (let t of e.changedTouches) {
                for (let key in sticks) {
                    if (sticks[key].id === t.identifier) {
                        sticks[key].cx = t.clientX;
                        sticks[key].cy = t.clientY;
                    }
                }
            }
        });

        canvas.addEventListener("touchend", (e) => {
            for (let t of e.changedTouches) {
                for (let key in sticks) {
                    if (sticks[key].id === t.identifier) {
                        if(key === 'atk') performAttack(p1, sticks.atk);
                        sticks[key].active = false;
                        sticks[key].id = null;
                    }
                }
            }
        });

        function performAttack(char, stick) {
            if (char.ammo <= 0) return;
            const angle = Math.atan2(stick.cy - stick.by, stick.cx - stick.bx);
            // ソビエトの段階的革命論ロジックをここに実装
            console.log("Attack step:", char.attackStep, "Angle:", angle);
            char.ammo--;
            char.attackStep = (char.attackStep % 3) + 1;
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // プレイヤー移動 & 衝突
            if (sticks.move.active) {
                let dx = sticks.move.cx - sticks.move.bx;
                let dy = sticks.move.cy - sticks.move.by;
                let angle = Math.atan2(dy, dx);
                p1.x += Math.cos(angle) * p1.speed;
                p1.y += Math.sin(angle) * p1.speed;
            }

            // カメラ開始
            ctx.save();
            ctx.translate(canvas.width/2 - p1.x, canvas.height/2 - p1.y);

            // 壁とステージ境界
            walls.forEach(w => {
                ctx.fillStyle = w.dest ? "#44aa44" : "#555";
                ctx.fillRect(w.x, w.y, w.w, w.h);
            });

            p1.draw();
            enemies.forEach(e => e.draw());

            ctx.restore();

            // スティック描画
            for(let key in sticks) {
                if(sticks[key].active) {
                    ctx.beginPath(); ctx.arc(sticks[key].bx, sticks[key].by, 40, 0, Math.PI*2);
                    ctx.strokeStyle = "white"; ctx.stroke();
                }
            }

            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
